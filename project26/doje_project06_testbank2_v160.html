<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>문제은행 대시보드</title>
<style>
  :root{
    --bg:#f7f8fb;
    --surface:#ffffff;
    --border:#e5e7eb;
    --text:#111827;
    --text-secondary:#6b7280;
    --primary:#4f46e5;
    --primary-light:#eef2ff;
    --success:#10b981;
    --warning:#f59e0b;
    --danger:#ef4444;
    --essay:#3b82f6;
    --question:#8b5cf6;
    --presentation:#f59e0b;
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.5;
  }
  #app{min-height:100vh;display:flex;flex-direction:column;}

  .header{
    display:flex;justify-content:space-between;align-items:center;
    padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);
    flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:10;
  }
  .header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;white-space:nowrap;}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .input{
    padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:280px;outline:none;transition:border-color .15s;
  }
  .input:focus{border-color:var(--primary);}
  textarea.input{resize:vertical;font-family:inherit;width:100%;}
  select.input{cursor:pointer;}
  .btn{
    padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);
    font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text);
  }
  .btn:hover{background:#f3f4f6;}
  .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
  .btn-primary:hover{background:#4338ca;}
  .btn-ghost{border:none;background:transparent;font-size:16px;padding:8px 10px;}
  .btn-sm{padding:6px 12px;font-size:12px;}
  .icon-btn{border:none;background:none;cursor:pointer;font-size:13px;padding:4px 6px;border-radius:6px;}
  .icon-btn:hover{background:#f3f4f6;}
  .status-dot{width:9px;height:9px;border-radius:50%;background:#d1d5db;display:inline-block;transition:background .2s;}
  .status-dot.on{background:var(--success);}
  .status-dot.error{background:var(--danger);}
  .status-dot.loading{background:var(--warning);}

  .tabs{
    display:flex;gap:4px;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;
  }
  .tab-btn{
    padding:14px 16px;border:none;background:none;font-size:14px;font-weight:600;color:var(--text-secondary);
    cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;
  }
  .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}
  .tab-btn:hover{color:var(--text);}

  main{flex:1;padding:24px;max-width:1100px;width:100%;margin:0 auto;}

  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
  .summary-card .num{font-size:28px;font-weight:800;color:var(--text);}
  .summary-card .label{font-size:13px;color:var(--text-secondary);margin-top:4px;}
  button.summary-card{cursor:pointer;text-align:left;font:inherit;width:100%;transition:all .15s;color:var(--text);}
  button.summary-card:hover{border-color:var(--primary);background:var(--primary-light);}

  .warning-box{
    background:#fffbeb;border:1px solid #fde68a;border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;
  }
  .warning-box.ok{background:#ecfdf5;border-color:#a7f3d0;}
  .warning-box h3{font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .warning-box ul{padding-left:20px;font-size:13px;color:var(--text-secondary);}
  .warning-box li{margin-bottom:4px;}

  .layout-2col{display:grid;grid-template-columns:320px 1fr;gap:20px;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
  .panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
  .company-card{
    padding:14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .15s;
  }
  .company-card:hover{border-color:var(--primary);background:var(--primary-light);}
  .company-card.active{border-color:var(--primary);background:var(--primary-light);}
  .company-card .name{font-weight:700;font-size:14px;}
  .company-card .meta{font-size:12px;color:var(--text-secondary);margin-top:4px;}
  .card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card-actions{display:flex;gap:2px;flex-shrink:0;}

  .subject-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0;}
  .subject-chip{
    padding:12px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;
  }
  .subject-chip:hover,.subject-chip.active{border-color:var(--primary);background:var(--primary-light);}
  .subject-chip .sname{font-weight:600;font-size:13px;}
  .subject-chip .scount{font-size:11px;color:var(--text-secondary);margin-top:4px;}
  .subject-chip .scount.incomplete{color:var(--danger);}
  .subject-order-label{font-size:10px;font-weight:700;color:var(--primary);margin-bottom:4px;letter-spacing:0.3px;}
  .subject-order-btns{display:flex;gap:2px;margin-top:6px;}
  .order-btn{
    border:1px solid var(--border);background:#f9fafb;border-radius:5px;
    font-size:11px;padding:2px 7px;cursor:pointer;color:var(--text-secondary);
    transition:all .15s;line-height:1.4;
  }
  .order-btn:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary);}
  .share-tag{font-size:10px;color:var(--text-secondary);font-weight:500;}

  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;}
  .badge-essay{background:var(--essay);}
  .badge-question{background:var(--question);}
  .badge-presentation{background:var(--presentation);}
  .badge-default{background:#9ca3af;}

  .question-item{
    border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;
  }
  .question-item .qhead{display:flex;align-items:center;margin-bottom:6px;gap:8px;}
  .question-item .qnum{font-weight:700;font-size:13px;}
  .question-item .qpoint{font-size:12px;color:var(--text-secondary);margin-left:auto;}
  .ncs-answer{
    display:flex;gap:10px;
    font-size:13.5px;color:#374151;
    background:#f9fafb;border-left:3px solid var(--border);
    padding:8px 12px;margin-left:14px;
  }
  .ncs-answer-label{
    font-weight:700;color:var(--text-secondary);
    white-space:nowrap;flex-shrink:0;font-size:13.5px;
  }
  .ncs-answer-content{white-space:pre-wrap;line-height:1.8;font-size:13.5px;}
  .qanswer{
    display:flex;gap:10px;
    font-size:13.5px;color:var(--text-secondary);
    margin-top:8px;padding:8px 10px;
    background:#f9fafb;border-left:3px solid var(--border);
  }
  .qanswer-label{font-weight:700;white-space:nowrap;flex-shrink:0;font-size:13.5px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:10px 12px;color:var(--text-secondary);font-weight:600;border-bottom:1px solid var(--border);}
  td{padding:10px 12px;border-bottom:1px solid #f3f4f6;}
  tr.row-warning td{color:var(--danger);}

  .empty-state{
    text-align:center;padding:60px 20px;color:var(--text-secondary);
  }
  .empty-state .icon{font-size:40px;margin-bottom:12px;}

  .bar-row{margin-bottom:16px;}
  .bar-row .bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;align-items:center;}
  .bar-track{height:10px;background:#f3f4f6;border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;transition:width .3s;}

  .section-title{font-size:15px;font-weight:700;margin-bottom:12px;}

  /* 개요 탭 */
  .overview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
  .overview-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:14px;transition:all .15s;}
  .overview-card:hover{border-color:var(--primary);box-shadow:0 4px 14px rgba(15,23,42,0.06);}
  .overview-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .overview-num{font-size:26px;font-weight:800;color:var(--text);line-height:1.1;}
  .overview-label{font-size:12px;color:var(--text-secondary);margin-top:2px;}

  .status-banner{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:12px;}
  .status-banner.ok{background:#ecfdf5;border:1px solid #a7f3d0;}
  .status-banner.warn{background:#fffbeb;border:1px solid #fde68a;margin-bottom:16px;}
  .status-icon{font-size:24px;flex-shrink:0;}
  .status-title{font-weight:700;font-size:14px;}
  .status-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}

  .warning-list{display:flex;flex-direction:column;gap:8px;}
  .warning-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fafafa;border:1px solid var(--border);border-radius:8px;font-size:13px;}
  .warning-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;flex-shrink:0;white-space:nowrap;}
  .warning-tag.company{background:#e0e7ff;color:#4338ca;}
  .warning-tag.subject{background:#fef3c7;color:#92400e;}
  .warning-tag.student{background:#fee2e2;color:#b91c1c;}

  .mini-progress{display:flex;align-items:center;gap:8px;}
  .mini-progress-track{flex:1;height:8px;background:#f3f4f6;border-radius:6px;overflow:hidden;max-width:120px;}
  .mini-progress-fill{height:100%;border-radius:6px;transition:width .3s;}
  .mini-progress span{font-size:12px;color:var(--text-secondary);flex-shrink:0;width:34px;}
  .badge-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;}
  .badge-status.complete{background:#d1fae5;color:#065f46;}
  .badge-status.incomplete{background:#fef3c7;color:#92400e;}

  .subtab-nav{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .subtab-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all .15s;}
  .subtab-btn:hover{border-color:var(--primary);color:var(--text);}
  .subtab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .subtab-btn .count-badge{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:10px;font-size:11px;background:#fee2e2;color:#b91c1c;}
  .subtab-btn.active .count-badge{background:rgba(255,255,255,0.3);color:#fff;}

  /* 데이터 입력 탭 */
  .stat-strip{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow-x:auto;}
  .stats-inline-row{display:flex;align-items:center;overflow-x:auto;}
  .panel-divider{border-top:1px solid var(--border);margin:18px -16px;}
  .stat-strip-item{flex:1;text-align:center;padding:16px 8px;position:relative;min-width:90px;}
  .stat-strip-item:not(:last-child)::after{content:'';position:absolute;right:0;top:22%;bottom:22%;width:1px;background:var(--border);}
  .stat-strip-num{font-size:22px;font-weight:800;color:var(--text);}
  .stat-strip-label{font-size:11px;color:var(--text-secondary);margin-top:3px;}

  .entry-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .entry-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px;display:flex;align-items:center;gap:14px;text-align:left;cursor:pointer;
    transition:all .15s;font:inherit;color:var(--text);width:100%;
  }
  .entry-card:hover{border-color:var(--primary);box-shadow:0 6px 16px rgba(15,23,42,0.08);transform:translateY(-1px);}
  .entry-card-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
  .entry-card-body{flex:1;min-width:0;}
  .entry-card-title{font-weight:700;font-size:14px;}
  .entry-card-desc{font-size:11px;color:var(--text-secondary);margin-top:3px;line-height:1.4;}
  .entry-card-arrow{color:var(--text-secondary);font-size:16px;flex-shrink:0;opacity:0;transition:opacity .15s;}
  .entry-card:hover .entry-card-arrow{opacity:1;color:var(--primary);}

  .usage-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block;}
  .usage-pill.usage-none{background:#f3f4f6;color:var(--text-secondary);}
  .usage-pill.usage-single{background:#e0e7ff;color:#4338ca;}
  .usage-pill.usage-shared{background:#d1fae5;color:#065f46;}
  .info-note{font-size:12px;color:var(--text-secondary);margin-top:14px;padding:10px 14px;background:#f9fafb;border-radius:8px;border:1px solid var(--border);}
  .student-cell{display:flex;align-items:center;gap:10px;}
  .student-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}

  /* 통계 탭 */
  .donut-row{display:flex;align-items:center;gap:32px;flex-wrap:wrap;}
  .donut{width:140px;height:140px;border-radius:50%;position:relative;flex-shrink:0;}
  .donut-center{position:absolute;inset:20px;background:var(--surface);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .donut-num{font-size:22px;font-weight:800;color:var(--text);}
  .donut-label{font-size:10px;color:var(--text-secondary);}
  .legend-list{display:flex;flex-direction:column;gap:10px;flex:0 1 260px;min-width:200px;max-width:300px;}
  .legend-row{display:flex;align-items:center;gap:10px;font-size:13px;}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .legend-label{flex:1;}
  .legend-value{color:var(--text-secondary);font-size:12px;font-weight:600;}
  .readiness-row{display:flex;align-items:center;gap:32px;flex-wrap:wrap;}
  .readiness-detail{display:flex;flex-direction:column;gap:10px;flex:1;min-width:200px;}
  .readiness-item{font-size:13px;color:var(--text);}
  .readiness-item strong{color:var(--primary);}
  .student-count-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px;}
  .student-count-card{background:#fafafa;border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:all .15s;}
  .student-count-card:hover{border-color:#d1d5db;}
  .student-count-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;}
  .student-count-num{font-size:11px;font-weight:700;color:var(--success);background:#d1fae5;padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap;}
  .student-chip-list{display:flex;flex-wrap:wrap;gap:6px;}
  .student-chip{
    padding:4px 11px;border-radius:7px;border:none;background:#fff;
    font-size:11px;font-weight:600;color:var(--text-secondary);cursor:default;
    box-shadow:0 1px 2px rgba(15,23,42,0.05);
  }
  @media (max-width:860px){ .student-count-grid{grid-template-columns:1fr;} }
  .subject-share-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .subject-share-card{background:#fafafa;border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:all .15s;}
  .subject-share-card:hover{border-color:#d1d5db;}
  .subject-share-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;}
  .subject-share-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;}
  .subject-share-count{font-size:11px;font-weight:700;color:var(--primary);background:var(--primary-light);padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap;}
  .company-chip-list{display:flex;flex-wrap:wrap;gap:6px;}
  .company-chip{
    padding:4px 11px;border-radius:7px;border:none;background:#fff;
    font-size:11px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all .15s;
    box-shadow:0 1px 2px rgba(15,23,42,0.05);
  }
  .company-chip:hover{background:var(--primary);color:#fff;box-shadow:0 3px 8px rgba(79,70,229,0.3);}
  @media (max-width:860px){ .subject-share-grid{grid-template-columns:1fr;} }
  .company-badge{
    display:inline-flex;align-items:center;padding:4px 12px;border-radius:8px;border:none;
    font-size:12px;font-weight:700;line-height:1.4;
  }
  button.company-badge{cursor:pointer;transition:all .15s;}
  button.company-badge:hover{filter:brightness(0.93);transform:translateY(-1px);}

  /* 시험지 배포 탭 */
  .deploy-controls{margin-bottom:24px;}
  .deploy-subject-row{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);
    border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .15s;
  }
  .deploy-subject-row:hover{border-color:var(--primary);}
  .deploy-subject-row.selected{border-color:var(--primary);background:var(--primary-light);}
  .deploy-subject-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;}
  .deploy-question-list{margin:-4px 0 10px 30px;padding-left:12px;border-left:2px solid var(--border);display:flex;flex-direction:column;gap:2px;}
  .deploy-question-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:12px;cursor:pointer;transition:background .15s;}
  .deploy-question-row:hover{background:#f9fafb;}
  .deploy-question-row input[type=checkbox]{width:14px;height:14px;cursor:pointer;flex-shrink:0;}
  .deploy-counter{
    font-size:13px;color:var(--primary);margin:10px 0;padding:8px 12px;background:var(--primary-light);
    border-radius:8px;display:inline-block;font-weight:600;
  }
  .mode-toggle-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .exam-paper{
    background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:32px;
    max-width:760px;margin:0 auto;
  }
  .exam-subject{margin-bottom:36px;}
  .exam-subject-pagetitle{font-size:15px;font-weight:700;margin-bottom:12px;}

  .ncs-table{width:100%;border-collapse:collapse;margin-bottom:18px;font-size:13px;}
  .ncs-table td{border:1px solid #555;padding:8px 10px;vertical-align:top;}
  .ncs-table td.lbl{background:#f3f4f6;font-weight:700;width:110px;white-space:nowrap;}

  .ncs-question{margin-bottom:16px;}
  .ncs-qtext{font-size:13px;margin-bottom:6px;overflow:hidden;}
  .ncs-point-right{float:right;font-size:12px;color:var(--text-secondary);margin-left:8px;white-space:nowrap;}
  .ncs-answer{font-size:12px;color:#374151;background:#f9fafb;border-left:3px solid var(--border);padding:8px 12px;margin-left:14px;white-space:pre-wrap;}
  .answer-line{border-bottom:1px solid #cbd5e1;height:20px;margin-bottom:3px;margin-left:14px;}
  .exam-subject-label{font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:14px;}
  .ncs-table{page-break-inside:avoid;}
  .ncs-question{page-break-inside:avoid;}

  .exam-footer{text-align:right;font-weight:700;margin-top:8px;border-top:2px solid var(--text);padding-top:12px;}

  /* 모달 */
  @keyframes modalFadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes modalScaleIn{ from{opacity:0;transform:scale(.96) translateY(8px);} to{opacity:1;transform:scale(1) translateY(0);} }
  .modal-overlay{
    position:fixed;inset:0;background:rgba(17,24,39,0.55);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;
    z-index:100;padding:20px;animation:modalFadeIn .15s ease;
  }
  .modal-box{
    background:#fff;border-radius:18px;padding:0;max-width:440px;width:100%;max-height:90vh;
    display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 24px 64px rgba(15,23,42,0.28),0 0 0 1px rgba(15,23,42,0.04);
    animation:modalScaleIn .22s cubic-bezier(.16,1,.3,1);
  }
  .modal-box.modal-lg{max-width:660px;}
  .modal-header{
    display:flex;justify-content:space-between;align-items:center;
    padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .modal-header h3{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .modal-body-scroll{padding:22px 24px;overflow-y:auto;flex:1;}
  .modal-footer{
    display:flex;justify-content:flex-end;gap:10px;
    padding:16px 24px;border-top:1px solid var(--border);background:#fafafa;flex-shrink:0;
  }
  .btn-ghost-close{
    border:none;background:#f3f4f6;width:30px;height:30px;border-radius:50%;

    transition:all .15s;flex-shrink:0;

  .form-group{margin-bottom:18px;}
  .form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:7px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
  .form-row .form-group{margin-bottom:0;}

  .print-hide{}
  @media print{
    .print-hide{display:none !important;}
    .exam-subject-pagetitle{display:none !important;}

    .exam-subject:last-child{page-break-after:auto;}

  @media (max-width:860px){

  }

<body>

          </h1>

    </div>
    <main id="main"></main>
    <footer class="footer print-hide">
      <div style="max-width:1200px;margin:0 auto;background:#fff;border:1.5px solid var(--border);border-radius:16px;box-shadow:0 4px 16px rgba(15,23,42,0.06);padding:14px 24px;display:flex;flex-direction:row;align-items:center;justify-content:space-between;">
        <div style="display:flex;flex-direction:row;align-items:center;gap:12px;">
          <div style="width:38px;height:38px;border-radius:10px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">📊</div>
          <div>
            <div style="font-weight:700;font-size:14px;color:var(--text);">성일정보고등학교 도제 (3-12)</div>
            <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">문제은행 평가 관리 시스템</div>
          </div>

        <div style="font-size:11px;color:var(--text-secondary);">NCS 기반 능력단위 평가 관리 · © 성일정보고등학교</div>
      </div>

  <div id="modalOverlay" class="modal-overlay print-hide">
    <div class="modal-box" id="modalBox">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button id="modalCloseBtn" class="btn-ghost-close">✕</button>
      </div>

        <div id="modalBody"></div>
      </div>
      <div class="modal-footer">
        <button id="modalCancelBtn" class="btn">취소</button>
        <button id="modalSaveBtn" class="btn btn-primary">저장</button>
      </div>
    </div>
  </div>

<script>
  var GAS_CONFIG_URL = 'doje_project06_gasurl.json'; // html 파일과 같은 폴더에 위치해야 합니다

  var state = {
    url: '',
    students: [], companies: [], subjects: [], questions: [], assignments: [],
    loaded: false,
    activeTab: 'overview',
    overviewTab: 'company',
    statsTab: 'readiness',
    selectedCompanyId: null,
    selectedSubjectId: null,
    searchQuery: '',
    studentCompanyFilter: '',
    statsSubjectSearch: '',
    error: null,
    deploy: { companyId: null, subjectIds: [], studentId: '', viewMode: 'student', examDate: todayISO(), questionIds: [] },
    modal: null,
    authenticated: false,
    fetchedPassword: '',
    loginError: null
  };

  var main = document.getElementById('main');
  var ID_FIELD = {'기업':'기업ID','학생':'학생ID','과목':'과목ID','문제':'문제ID','배정':'배정ID'};
  var ARR_KEY = {'기업':'companies','학생':'students','과목':'subjects','문제':'questions','배정':'assignments'};
  var EVAL_METHOD_MAP = {'서술형':'서술형시험', '질문형':'면접형시험', '발표형':'발표형시험'};

  function escapeHtml(str){
    if(str===undefined || str===null) return '';
    return String(str).replace(/[&<>"']/g, function(m){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
    });
  }

  function nl2br(str){
    if(str===undefined || str===null) return '';
    return escapeHtml(String(str)).replace(/\n/g,'<br>');
  }

  function localGet(key){
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }
  function localSet(key, value){
    try{ localStorage.setItem(key, value); }catch(e){}
  }

  function typeBadge(type){
    var map = {'서술형':'badge-essay','질문형':'badge-question','발표형':'badge-presentation'};
    var cls = map[type] || 'badge-default';
    return '<span class="badge ' + cls + '">' + escapeHtml(type || '미정') + '</span>';
  }

  var COMPANY_COLORS = [
    {bg:'#eef2ff', text:'#4338ca'},
    {bg:'#ecfdf5', text:'#047857'},
    {bg:'#fef3c7', text:'#b45309'},
    {bg:'#fee2e2', text:'#b91c1c'},
    {bg:'#f3e8ff', text:'#7e22ce'},
    {bg:'#e0f2fe', text:'#0369a1'},
    {bg:'#fce7f3', text:'#be185d'},
    {bg:'#ecfccb', text:'#4d7c0f'},
    {bg:'#ffedd5', text:'#c2410c'},
    {bg:'#e0e7ff', text:'#3730a3'}
  ];
  function getCompanyColor(companyId){
    var str = String(companyId);
    var hash = 0;
    for(var i=0;i<str.length;i++){ hash = (hash*31 + str.charCodeAt(i)) >>> 0; }
    return COMPANY_COLORS[hash % COMPANY_COLORS.length];
  }
  function companyChip(companyId, companyName, clickable){
    var color = getCompanyColor(companyId);
    if(clickable){
      return '<button type="button" class="company-badge" data-action="goto-company" data-company-id="'+escapeHtml(companyId)+'" style="background:'+color.bg+';color:'+color.text+';">'+escapeHtml(companyName)+'</button>';
    }
    return '<span class="company-badge" style="background:'+color.bg+';color:'+color.text+';">'+escapeHtml(companyName)+'</span>';
  }

  function formatTodayDate(){
    var d = new Date();
    var yyyy = d.getFullYear();
    var mm = String(d.getMonth()+1).padStart(2,'0');
    var dd = String(d.getDate()).padStart(2,'0');
    return yyyy+'.'+mm+'.'+dd+'.';
  }
  function todayISO(){
    var d = new Date();
    var yyyy = d.getFullYear();
    var mm = String(d.getMonth()+1).padStart(2,'0');
    var dd = String(d.getDate()).padStart(2,'0');
    return yyyy+'-'+mm+'-'+dd;
  }
  function formatDisplayDate(isoStr){
    if(!isoStr) return '';
    var parts = isoStr.split('-');
    if(parts.length!==3) return isoStr;
    return parts[0]+'.'+parts[1]+'.'+parts[2]+'.';
  }

  function getCompanySubjects(companyId){
    var assignedList = state.assignments
      .filter(function(a){ return String(a.기업ID)===String(companyId); })
      .sort(function(a,b){ return (parseInt(a.순서,10)||999) - (parseInt(b.순서,10)||999); });
    return assignedList.map(function(a){
      return state.subjects.find(function(s){ return String(s.과목ID)===String(a.과목ID); });
    }).filter(Boolean);
  }

  function getCompanyAssignments(companyId){
    return state.assignments
      .filter(function(a){ return String(a.기업ID)===String(companyId); })
      .sort(function(a,b){ return (parseInt(a.순서,10)||999) - (parseInt(b.순서,10)||999); });
  }

  async function handleReorder(companyId, subjectId, dir){
    var assigns = getCompanyAssignments(companyId);
    var idx = assigns.findIndex(function(a){ return String(a.과목ID)===String(subjectId); });
    var swapIdx = dir==='up' ? idx-1 : idx+1;
    if(swapIdx<0 || swapIdx>=assigns.length) return;

    var a = assigns[idx];
    var b = assigns[swapIdx];
    var aOrder = parseInt(a.순서,10) || (idx+1);
    var bOrder = parseInt(b.순서,10) || (swapIdx+1);

    // 로컬 즉시 반영
    a.순서 = bOrder;
    b.순서 = aOrder;

    if(state.url){
      await writeData('배정','update', Object.assign({},a));
      await writeData('배정','update', Object.assign({},b));
      await fetchData(state.url);
    } else {
      render();
    }
  }

  function subjectUsageCount(subjectId){
    return state.assignments.filter(function(a){ return String(a.과목ID)===String(subjectId); }).length;
  }

  function setStatus(s){
    var dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (s==='on'?' on': s==='error'?' error': s==='loading'?' loading':'');
  }

  function setMain(html){
    var errorHtml = state.error ? (
      '<div class="warning-box print-hide" style="background:#fef2f2;border-color:#fecaca;margin-bottom:16px;">' +
        '<h3>❌ 오류</h3>' +
        '<div style="font-size:13px;color:var(--text-secondary);">' + escapeHtml(state.error) + '</div>' +
      '</div>'
    ) : '';
    main.innerHTML = errorHtml + html;
  }

  function getSampleData(){
    var companies=[
      {기업ID:'C1',기업명:'네이버'},
      {기업ID:'C2',기업명:'삼성전자'},
      {기업ID:'C3',기업명:'카카오'}
    ];
    var subjectDefs=[
      {id:'S1',name:'자료구조',type:'서술형'},
      {id:'S2',name:'알고리즘',type:'질문형'},
      {id:'S3',name:'데이터베이스',type:'발표형'},
      {id:'S4',name:'네트워크',type:'서술형'},
      {id:'S5',name:'운영체제',type:'질문형'},
      {id:'S6',name:'소프트웨어공학',type:'발표형'}
    ];
    var subjects = subjectDefs.map(function(d){
      return {
        과목ID:d.id, 과목명:d.name, 문제유형:d.type, 난이도:'중', 평가시간:'50분',
        능력단위요소명:'1. '+d.name+' 분석하기\n2. '+d.name+' 요구사항 확인하기\n3. '+d.name+' 결과 확인하기'
      };
    });
    var questions=[];
    subjects.forEach(function(s){
      for(var i=1;i<=5;i++){
        if(s.과목ID==='S1' && i===5) continue; // 문제 누락 예시
        questions.push({
          문제ID:s.과목ID+'-Q'+i,
          과목ID:s.과목ID,
          문제번호:i,
          문제내용: s.과목명+' 관련 '+i+'번 문제 내용입니다.',
          모범답안: s.과목명+' '+i+'번 문제에 대한 모범답안 예시입니다.',
          배점:20
        });
      }
    });
    // 배정: S1은 세 기업이 공유, C2는 일부러 5개만 배정(과목 누락 경고 예시)
    var assignments=[
      {배정ID:'C1_S1',기업ID:'C1',과목ID:'S1'},
      {배정ID:'C1_S2',기업ID:'C1',과목ID:'S2'},
      {배정ID:'C1_S3',기업ID:'C1',과목ID:'S3'},
      {배정ID:'C1_S4',기업ID:'C1',과목ID:'S4'},
      {배정ID:'C1_S5',기업ID:'C1',과목ID:'S5'},
      {배정ID:'C1_S6',기업ID:'C1',과목ID:'S6'},
      {배정ID:'C2_S1',기업ID:'C2',과목ID:'S1'},
      {배정ID:'C2_S2',기업ID:'C2',과목ID:'S2'},
      {배정ID:'C2_S3',기업ID:'C2',과목ID:'S3'},
      {배정ID:'C2_S4',기업ID:'C2',과목ID:'S4'},
      {배정ID:'C2_S5',기업ID:'C2',과목ID:'S5'},
      {배정ID:'C3_S1',기업ID:'C3',과목ID:'S1'},
      {배정ID:'C3_S2',기업ID:'C3',과목ID:'S2'},
      {배정ID:'C3_S3',기업ID:'C3',과목ID:'S3'},
      {배정ID:'C3_S4',기업ID:'C3',과목ID:'S4'},
      {배정ID:'C3_S5',기업ID:'C3',과목ID:'S5'},
      {배정ID:'C3_S6',기업ID:'C3',과목ID:'S6'}
    ];
    var students=[];
    var sid=1;
    companies.forEach(function(c){
      for(var i=1;i<=4;i++){
        students.push({학생ID:'ST'+String(sid).padStart(3,'0'),이름:c.기업명+' 학생'+i,기업ID:c.기업ID});
        sid++;
      }
    });
    students.push({학생ID:'ST099',이름:'매칭오류 학생',기업ID:'C99'});
    return {companies:companies,subjects:subjects,questions:questions,students:students,assignments:assignments};
  }

  async function fetchData(url){
    state.url = url;
    state.error = null;
    setStatus('loading');
    render();
    try{
      var res = await fetch(url);
      if(!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      state.students = Array.isArray(data.students) ? data.students : [];
      state.companies = Array.isArray(data.companies) ? data.companies : [];
      state.subjects = Array.isArray(data.subjects) ? data.subjects : [];
      state.questions = Array.isArray(data.questions) ? data.questions : [];
      state.assignments = Array.isArray(data.assignments) ? data.assignments : [];
      state.fetchedPassword = data.password || '';
      if(!state.fetchedPassword){
        state.authenticated = true;
      } else {
        var savedAuth = localGet('auth-pw');
        if(savedAuth && String(savedAuth).trim() === String(state.fetchedPassword).trim()){
          state.authenticated = true;
        }
      }
      state.loaded = true;
      setStatus('on');
      localSet('webapp-url', url);
    }catch(err){
      state.error = '데이터를 불러오지 못했습니다 (' + err.message + '). URL과 배포 설정(액세스 권한: 모든 사용자)을 확인해주세요.';
      setStatus('error');
    }
    render();
  }

  async function writeData(sheetName, action, data){
    try{
      var res = await fetch(state.url, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({sheet:sheetName, action:action, data:data})
      });
      var result = await res.json();
      if(!result.success) throw new Error(result.error || '알 수 없는 오류');
      return true;
    }catch(err){
      alert('저장에 실패했습니다: ' + err.message);
      return false;
    }
  }

  async function persist(sheetName, action, data, idField){
    if(state.url){
      var ok = await writeData(sheetName, action, data);
      if(!ok) return false;
      await fetchData(state.url);
      return true;
    } else {
      var arr = state[ARR_KEY[sheetName]];
      if(action==='create'){
        arr.push(data);
      } else if(action==='update'){
        var idx = arr.findIndex(function(item){ return String(item[idField])===String(data[idField]); });
        if(idx>-1) arr[idx] = data;
      } else if(action==='delete'){
        var idx2 = arr.findIndex(function(item){ return String(item[idField])===String(data[idField]); });
        if(idx2>-1) arr.splice(idx2,1);
      }
      render();
      return true;
    }
  }

  async function handleDelete(type, id, message){
    if(!confirm(message || '정말 삭제하시겠습니까?')) return;
    var idField = ID_FIELD[type];
    var data = {}; data[idField] = id;
    await persist(type, 'delete', data, idField);
  }

  async function handleUnassign(companyId, subjectId){
    if(!confirm('이 기업에서 과목 배정을 해제하시겠습니까? (과목 자체와 등록된 문제는 삭제되지 않습니다)')) return;
    var assignId = companyId + '_' + subjectId;
    await persist('배정', 'delete', {배정ID:assignId}, '배정ID');
  }

  async function deleteSubjectCompletely(subjectId){
    if(!confirm('정말 이 과목을 완전히 삭제하시겠습니까? 등록된 문제도 함께 삭제됩니다.')) return;
    var relatedQuestions = state.questions.filter(function(q){ return String(q.과목ID)===String(subjectId); });
    for(var i=0;i<relatedQuestions.length;i++){
      await persist('문제', 'delete', {문제ID:relatedQuestions[i].문제ID}, '문제ID');
    }
    await persist('과목', 'delete', {과목ID:subjectId}, '과목ID');
  }

  function nextId(prefix, list, idField){
    var max = 0;
    list.forEach(function(item){
      var m = String(item[idField]).match(new RegExp('^'+prefix+'(\\d+)$'));
      if(m){ var n = parseInt(m[1],10); if(n>max) max = n; }
    });
    return prefix + (max+1);
  }
  function nextStudentId(list){
    var max = 0;
    list.forEach(function(s){
      var m = String(s.학생ID).match(/^ST(\d+)$/);
      if(m){ var n = parseInt(m[1],10); if(n>max) max=n; }
    });
    return 'ST' + String(max+1).padStart(3,'0');
  }
  function nextSubjectId(){
    return nextId('S', state.subjects, '과목ID');
  }
  function nextQuestionNum(subjectId){
    var used = state.questions.filter(function(q){ return String(q.과목ID)===String(subjectId); }).map(function(q){ return parseInt(q.문제번호,10); });
    var n = 1;
    while(used.indexOf(n)>-1){ n++; }
    return n;
  }
  function nextQuestionId(subjectId){
    return subjectId+'-Q'+nextQuestionNum(subjectId);
  }
  function nextAssignmentId(companyId, subjectId){
    return companyId + '_' + subjectId;
  }

  function openModal(type, mode, data, context){
    state.modal = {type:type, mode:mode, data:data||{}, context:context||{}, assignMode:'existing'};
    var titleMap = {기업:'기업', 학생:'학생', 과목:'과목', 문제:'문제', 과목배정:'과목 배정'};
    var iconMap = {기업:'🏢', 학생:'🎓', 과목:'📚', 문제:'📝', 과목배정:'🔗'};
    document.getElementById('modalTitle').innerHTML = '<span>'+(iconMap[type]||'')+'</span> ' + (mode==='create'?'추가: ':'수정: ') + titleMap[type];
    document.getElementById('modalBody').innerHTML = buildModalForm(type, mode, data||{}, context||{});
    var modalBoxEl = document.getElementById('modalBox');
    if(modalBoxEl && modalBoxEl.classList){ modalBoxEl.classList.toggle('modal-lg', type==='문제'); }
    document.getElementById('modalOverlay').style.display = 'flex';
  }
  function closeModal(){
    document.getElementById('modalOverlay').style.display = 'none';
    state.modal = null;
  }

  function buildModalForm(type, mode, data, context){
    if(type==='기업'){
      var id = data.기업ID || nextId('C', state.companies, '기업ID');
      return '<div class="form-group"><label>🆔 기업ID</label><input id="f_id" class="input" style="width:100%;" value="'+escapeHtml(id)+'" '+(mode==='edit'?'readonly':'')+'></div>'+

        var subjOptions = state.subjects.map(function(s){
          var sel = String(s.과목ID)===String(subjectId) ? 'selected':'';
          return '<option value="'+escapeHtml(s.과목ID)+'" '+sel+'>'+escapeHtml(s.과목명)+' ('+escapeHtml(s.문제유형)+')</option>';

  function renderTabsActive(){
    document.querySelectorAll('.tab-btn').forEach(function(btn){
      if(btn && btn.classList){ btn.classList.toggle('active', btn.dataset.tab === state.activeTab); }
    });
  }

  function renderLogin(){
    setMain(
      '<div style="max-width:360px;margin:60px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center;">' +
        '<div style="font-size:40px;margin-bottom:12px;">🔒</div>' +
        '<div style="font-size:16px;font-weight:700;margin-bottom:16px;">비밀번호를 입력해주세요</div>' +
        '<input id="passwordInput" type="password" class="input" style="width:100%;margin-bottom:12px;" placeholder="비밀번호">' +
        '<button id="loginBtn" class="btn btn-primary" style="width:100%;">입장하기</button>' +
        (state.loginError ? '<div style="color:var(--danger);font-size:12px;margin-top:10px;">'+escapeHtml(state.loginError)+'</div>' : '') +
      '</div>'
    );
    var pwInput = document.getElementById('passwordInput');
    if(pwInput) pwInput.focus();
  }

  async function checkPassword(){
    var pwInput = document.getElementById('passwordInput');
    var entered = pwInput ? pwInput.value.trim() : '';
    var expected = String(state.fetchedPassword).trim();
    if(expected && entered === expected){
      state.authenticated = true;
      state.loginError = null;
      localSet('auth-pw', expected);
      render();
    } else {
      state.loginError = '비밀번호가 올바르지 않습니다';
      render();
    }
  }

  function render(){
    renderTabsActive();
    if(!state.loaded){
      setMain(
        '<div class="empty-state">' +
          '<div class="icon">📊</div>' +
          '<div style="font-size:16px;font-weight:700;margin-bottom:8px;">연동된 데이터가 없습니다</div>' +
          '<div style="margin-bottom:20px;">상단에 Apps Script 웹앱 URL을 입력하고 연결해주세요</div>' +
          '<button class="btn btn-primary" id="sampleBtn">샘플 데이터로 미리보기</button>' +
        '</div>'
      );
      return;
    }
    if(!state.authenticated){
      renderLogin();
      return;
    }
    if(state.activeTab==='overview') renderOverview();
    else if(state.activeTab==='entry') renderEntry();
    else if(state.activeTab==='companies') renderCompanies();
    else if(state.activeTab==='students') renderStudents();
    else if(state.activeTab==='stats') renderStats();
    else if(state.activeTab==='deploy') renderDeploy();
  }

  function renderOverview(){
    var companyWarnings = [];
    state.companies.forEach(function(c){
      var cnt = getCompanySubjects(c.기업ID).length;
      if(cnt < 6) companyWarnings.push({tag:'company', text: c.기업명 + ': 과목 ' + cnt + '/6개 배정'});
    });
    var unmatched = state.students.filter(function(s){
      return !state.companies.find(function(c){ return String(c.기업ID)===String(s.기업ID); });
    });
    if(unmatched.length>0) companyWarnings.push({tag:'student', text: unmatched.length + '명의 학생이 기업과 매칭되지 않았습니다'});

    var subjectWarnings = [];
    state.subjects.forEach(function(s){
      var cnt = state.questions.filter(function(q){ return String(q.과목ID)===String(s.과목ID); }).length;
      if(cnt < 5){
        var usingNames = state.assignments.filter(function(a){return String(a.과목ID)===String(s.과목ID);})
          .map(function(a){ var c = state.companies.find(function(cc){return String(cc.기업ID)===String(a.기업ID);}); return c?c.기업명:'?'; });
        subjectWarnings.push({tag:'subject', text: s.과목명 + ': 문제 ' + cnt + '/5개 등록' + (usingNames.length? ' (사용: '+usingNames.join(', ')+')' : ' (미배정 과목)')});
      }
    });

    var tagLabel = {company:'기업 배정', subject:'문제 등록', student:'학생 매칭'};

    function warningListHtml(list, okTitle, okSub){
      if(list.length===0){
        return '<div class="status-banner ok"><div class="status-icon">✅</div><div><div class="status-title">'+okTitle+'</div><div class="status-sub">'+okSub+'</div></div></div>';
      }
      return '<div class="warning-list">' +
        list.map(function(w){
          return '<div class="warning-row"><span class="warning-tag '+w.tag+'">'+tagLabel[w.tag]+'</span><span>'+escapeHtml(w.text)+'</span></div>';
        }).join('') +
      '</div>';
    }

    var fullyAssignedCount = state.companies.filter(function(c){ return getCompanySubjects(c.기업ID).length>=6; }).length;
    var completionPct = state.companies.length ? Math.round(fullyAssignedCount/state.companies.length*100) : 0;

    var rowsHtml = state.companies.map(function(c){
      var subjs = getCompanySubjects(c.기업ID);
      var studCount = state.students.filter(function(s){ return String(s.기업ID)===String(c.기업ID); }).length;
      var qCount = subjs.reduce(function(sum,s){
        return sum + state.questions.filter(function(q){ return String(q.과목ID)===String(s.과목ID); }).length;
      }, 0);
      var pct = Math.round(subjs.length/6*100);
      var complete = subjs.length>=6;
      return '<tr>' +
        '<td>'+companyChip(c.기업ID, c.기업명, true)+'</td>' +
        '<td>' +
          '<div class="mini-progress">' +
            '<div class="mini-progress-track"><div class="mini-progress-fill" style="width:'+pct+'%;background:'+(complete?'var(--success)':'var(--warning)')+';"></div></div>' +
            '<span>'+subjs.length+'/6</span>' +
          '</div>' +
        '</td>' +
        '<td>'+studCount+'명</td>' +
        '<td>'+qCount+'개</td>' +
        '<td><span class="badge-status '+(complete?'complete':'incomplete')+'">'+(complete?'완료':'진행중')+'</span></td>' +
      '</tr>';
    }).join('');

    var activeSub = state.overviewTab || 'company';
    var subContentHtml = '';
    if(activeSub==='company'){
      subContentHtml = warningListHtml(companyWarnings, '모든 기업이 6과목을 정상적으로 배정했습니다', '학생 매칭도 누락 없이 잘 연결되어 있어요');
    } else if(activeSub==='subject'){
      subContentHtml = warningListHtml(subjectWarnings, '모든 과목에 문제가 5개씩 등록되어 있습니다', '문제 등록 누락 항목이 없어요');
    } else {
      subContentHtml =
        '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">전체 '+state.companies.length+'개 기업 중 '+fullyAssignedCount+'개 완료 ('+completionPct+'%)</div>' +
        '<table><thead><tr><th>기업명</th><th>배정 현황</th><th>소속 학생</th><th>전체 문제 수</th><th>상태</th></tr></thead>' +
        '<tbody>' + (rowsHtml || '<tr><td colspan="5" style="text-align:center;color:var(--text-secondary);">데이터 없음</td></tr>') + '</tbody></table>';
    }

    function subtabBtn(key, label, count){
      var active = activeSub===key ? 'active':'';
      var countBadge = (count>0) ? '<span class="count-badge">'+count+'</span>' : '';
      return '<button class="subtab-btn '+active+'" data-overview-tab="'+key+'">'+label+countBadge+'</button>';
    }

    setMain(
      '<div class="overview-grid">' +
        '<div class="overview-card"><div class="overview-icon" style="background:#eef2ff;color:#4f46e5;">🏢</div><div><div class="overview-num">'+state.companies.length+'</div><div class="overview-label">기업 수</div></div></div>' +
        '<div class="overview-card"><div class="overview-icon" style="background:#ecfdf5;color:#059669;">🎓</div><div><div class="overview-num">'+state.students.length+'</div><div class="overview-label">학생 수</div></div></div>' +
        '<div class="overview-card"><div class="overview-icon" style="background:#fef3c7;color:#b45309;">📚</div><div><div class="overview-num">'+state.subjects.length+'</div><div class="overview-label">과목 수 (공유 풀)</div></div></div>' +
        '<div class="overview-card"><div class="overview-icon" style="background:#fee2e2;color:#b91c1c;">📝</div><div><div class="overview-num">'+state.questions.length+'</div><div class="overview-label">문제 수</div></div></div>' +
      '</div>' +
      '<div class="panel">' +
        '<div class="subtab-nav">' +
          subtabBtn('company','🏢 기업 배정', companyWarnings.length) +
          subtabBtn('subject','📝 문제 등록', subjectWarnings.length) +
          subtabBtn('status','📊 기업별 배정현황', 0) +
        '</div>' +
        subContentHtml +
      '</div>'
    );
  }

        entryCard('📚','#fef3c7','#b45309','과목 추가','공유 과목 풀에 새 과목을 등록합니다','add-subject-generic') +

      '</div>' +
      '<div class="panel">' +
        '<div class="panel-head">' +
          '<div><div class="section-title" style="margin-bottom:2px;">📚 공유 과목 목록</div>' +

  function updateStudentsTable(){
    var wrap = document.getElementById('studentTableWrap');
    if(!wrap) return;
    var q = state.searchQuery.trim().toLowerCase();
    var companyMap = {};
    state.companies.forEach(function(c){ companyMap[String(c.기업ID)] = c.기업명; });

    var filtered = state.students.filter(function(s){
      if(state.studentCompanyFilter && String(s.기업ID)!==String(state.studentCompanyFilter)) return false;
      if(!q) return true;
      var companyName = (companyMap[String(s.기업ID)] || '').toLowerCase();
      return String(s.이름).toLowerCase().indexOf(q)>-1 ||
             String(s.학생ID).toLowerCase().indexOf(q)>-1 ||
             companyName.indexOf(q)>-1;
    });

    if(filtered.length===0){
      wrap.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div>검색 결과가 없습니다</div></div>';
      return;
    }

    wrap.innerHTML =
      '<table><thead><tr><th>학생</th><th>소속 기업</th><th>배정 과목 수</th><th>매칭 상태</th><th>관리</th></tr></thead><tbody>' +
      filtered.map(function(s){
        var companyName = companyMap[String(s.기업ID)];
        var isMatched = !!companyName;
        var subjCount = isMatched ? getCompanySubjects(s.기업ID).length : 0;
        return '<tr>' +
          '<td><div class="student-cell"><div class="student-avatar">'+escapeHtml((s.이름||'?').charAt(0))+'</div><div><div style="font-weight:600;">'+escapeHtml(s.이름)+'</div><div style="font-size:11px;color:var(--text-secondary);">'+escapeHtml(s.학생ID)+'</div></div></div></td>' +
          '<td>'+(isMatched ? companyChip(s.기업ID, companyName, true) : '<span style="color:var(--text-secondary);">매칭 없음</span>')+'</td>' +
          '<td>'+(isMatched? subjCount+'개':'-')+'</td>' +
          '<td><span class="badge-status '+(isMatched?'complete':'incomplete')+'">'+(isMatched? '✅ 정상':'⚠️ 매칭 오류')+'</span></td>' +

        '</tr>';
      }).join('') +

  function getSubjectUsageList(){
    return state.subjects.slice().sort(function(a,b){

      return {name: s.과목명, type: s.문제유형, companies: companies};

      var subjectSelectEl = document.getElementById('f_subject');
      var subjectId4 = subjectSelectEl ? subjectSelectEl.value : (m.context.subjectId || m.data.과목ID);
      if(!subjectId4){ alert('소속 과목을 선택해주세요 (먼저 과목을 등록해주세요)'); return; }
      if(!content4 || !num4){ alert('문제번호와 문제내용을 입력해주세요'); return; }
      payload = {문제ID:id4, 과목ID:subjectId4, 문제번호:num4, 문제내용:content4, 모범답안:answer4, 배점:point4};
    }

    if(!payload) return;
    saveBtn.disabled = true; saveBtn.textContent = '저장 중...';
    var ok = await persist(sheetName, action, payload, ID_FIELD[sheetName]);
    saveBtn.disabled = false; saveBtn.textContent = '저장';
    if(ok) closeModal();
  });

  async function loadGasUrlFromConfig(){
    if(!GAS_CONFIG_URL) return '';
    try{
      var res = await fetch(GAS_CONFIG_URL);
      if(!res.ok) return '';
      var data = await res.json();
      return data.gas_url || '';
    }catch(e){
      return '';
    }
  }

  async function init(){
    var configUrl = await loadGasUrlFromConfig();
    if(configUrl){
      document.getElementById('urlInput').value = configUrl;
      fetchData(configUrl);
      return;
    }
    var savedUrl = localGet('webapp-url');
    if(savedUrl){
      document.getElementById('urlInput').value = savedUrl;
      fetchData(savedUrl);
      return;
    }
    render();
  }

  init();

  // 이전에 중복 등록되었을 수 있는 탭/햄버거 클릭 리스너를 모두 제거하고 단일 핸들러로 재등록
  (function setupTabsHandlerOnce(){
    var oldTabsEl = document.getElementById('tabs');
    if(!oldTabsEl) return;
    var freshTabsEl = oldTabsEl.cloneNode(true);
    oldTabsEl.parentNode.replaceChild(freshTabsEl, oldTabsEl);

    freshTabsEl.addEventListener('click', function(e){
      try{
        var btn = e.target.closest('.tab-btn');
        if(!btn) return;
        state.activeTab = btn.dataset.tab;
        state.selectedCompanyId = null;
        state.selectedSubjectId = null;
        render();
      }catch(err){ console.error('tab click error', err); }
    });
  })();
</script>
</body>
</html>
