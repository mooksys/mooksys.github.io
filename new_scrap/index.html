<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스크랩 URL 생성기 v2</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />

    <style>
      :root {
        --bg-body: #f4f5f7;
        --bg-card: #ffffff;
        --primary: #0f172a; /* Slate 900 */
        --primary-hover: #1e293b;
        --accent: #3b82f6; /* Blue 500 */
        --accent-light: #eff6ff;
        --text-main: #0f172a;
        --text-sub: #64748b;
        --border: #e2e8f0;
        --radius-lg: 24px;
        --radius-md: 16px;
        --shadow-soft: 0 12px 30px -10px rgba(0, 0, 0, 0.08);
        --shadow-pop: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          Roboto,
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .app-container {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: var(--shadow-soft);
        position: relative;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }
      .header h1 {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .header p {
        color: var(--text-sub);
        font-size: 14px;
        margin-top: 6px;
      }

      .form-group {
        margin-bottom: 24px;
        position: relative;
      }
      .form-label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-sub);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* ✨ 세련된 토글형 서비스 선택기 ✨ */
      .segment-control {
        display: flex;
        background: #f1f5f9;
        border-radius: var(--radius-md);
        padding: 6px;
        position: relative;
      }
      .segment-btn {
        flex: 1;
        padding: 12px 0;
        border: none;
        background: transparent;
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-sub);
        cursor: pointer;
        position: relative;
        z-index: 2;
        transition: color 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .segment-btn.active {
        color: var(--primary);
      }
      .segment-indicator {
        position: absolute;
        top: 6px;
        bottom: 6px;
        left: 6px;
        width: calc(50% - 6px);
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1;
      }
      /* 오른쪽 버튼 클릭 시 인디케이터 이동 */
      .segment-control[data-active="mnc"] .segment-indicator {
        transform: translateX(100%);
      }

      /* ✨ 100% 커스텀 날짜 선택기 (드롭다운 디자인) ✨ */
      .date-display {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        background: #fff;
        border: 2px solid var(--border);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.2s;
        font-weight: 600;
        font-size: 16px;
        color: var(--primary);
      }
      .date-display:hover {
        border-color: #cbd5e1;
      }
      .date-display.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-light);
      }
      .date-display i {
        color: var(--accent);
      }

      /* 달력 팝업 컨테이너 */
      .calendar-popup {
        position: absolute;
        top: calc(100% + 10px);
        left: 0;
        width: 100%;
        background: #fff;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-pop);
        padding: 20px;
        z-index: 100;
        opacity: 0;
        visibility: hidden;
        transform: translateY(10px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid var(--border);
      }
      .calendar-popup.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }

      .cal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }
      .cal-nav {
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 5px 10px;
        color: var(--text-sub);
        border-radius: 8px;
        transition: 0.2s;
      }
      .cal-nav:hover {
        background: #f1f5f9;
        color: var(--primary);
      }
      .cal-month-year {
        font-weight: 700;
        font-size: 16px;
        color: var(--primary);
      }

      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
        text-align: center;
      }
      .cal-day-name {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-sub);
        padding-bottom: 8px;
      }

      .cal-day {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 50%;
        color: var(--text-main);
        transition: 0.2s;
      }
      .cal-day:hover:not(.empty) {
        background: #f1f5f9;
      }
      .cal-day.empty {
        cursor: default;
      }
      .cal-day.today {
        color: var(--accent);
        font-weight: 800;
      }
      .cal-day.selected {
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
      }
      .cal-day.selected:hover {
        background: var(--accent);
      }

      /* 실행 버튼 */
      .btn-generate {
        width: 100%;
        padding: 18px;
        border: none;
        border-radius: var(--radius-md);
        background: var(--primary);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 10px;
      }
      .btn-generate:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
      }
      .btn-generate:active {
        transform: translateY(0);
      }

      /* 결과 영역 */
      #result {
        margin-top: 20px;
      }
      .result-link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 18px;
        background: var(--accent-light);
        color: var(--accent);
        text-decoration: none;
        border-radius: var(--radius-md);
        font-weight: 700;
        font-size: 15px;
        border: 1px solid rgba(59, 130, 246, 0.2);
        animation: slideUp 0.4s ease-out;
        transition: all 0.2s;
      }
      .result-link:hover {
        background: var(--accent);
        color: #fff;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 배경 클릭 시 달력 닫기를 위한 오버레이 */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 90;
        display: none;
      }
      .overlay.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay"></div>

    <div class="app-container">
      <div class="header">
        <h1>스크랩 생성기</h1>
        <p>뉴스 모니터링 URL을 쉽고 세련되게</p>
      </div>

      <div class="form-group">
        <span class="form-label">플랫폼 선택</span>
        <div class="segment-control" id="serviceSegment" data-active="iitp">
          <div class="segment-indicator"></div>
          <button class="segment-btn active" onclick="setService('iitp')">
            <i class="fas fa-microchip"></i> IITP
          </button>
          <button class="segment-btn" onclick="setService('mnc')">
            <i class="fas fa-graduation-cap"></i> 교육부
          </button>
        </div>
      </div>

      <div class="form-group">
        <span class="form-label">날짜 선택</span>
        <div class="date-display" id="dateDisplay" onclick="toggleCalendar()">
          <span id="dateText">날짜를 선택하세요</span>
          <i class="fas fa-calendar-alt"></i>
        </div>

        <div class="calendar-popup" id="calendarPopup">
          <div class="cal-header">
            <button class="cal-nav" onclick="changeMonth(-1)">
              <i class="fas fa-chevron-left"></i>
            </button>
            <div class="cal-month-year" id="calMonthYear">2023년 10월</div>
            <button class="cal-nav" onclick="changeMonth(1)">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
          <div class="cal-grid">
            <div class="cal-day-name" style="color: #ef4444">일</div>
            <div class="cal-day-name">월</div>
            <div class="cal-day-name">화</div>
            <div class="cal-day-name">수</div>
            <div class="cal-day-name">목</div>
            <div class="cal-day-name">금</div>
            <div class="cal-day-name" style="color: #3b82f6">토</div>
          </div>
          <div class="cal-grid" id="calDays"></div>
        </div>
      </div>

      <button class="btn-generate" onclick="generateURL()">
        링크 생성하기
      </button>

      <div id="result"></div>
    </div>

    <script>
      /* --- 1. 상태 관리 --- */
      let currentService = "iitp";
      let currentDate = new Date(); // 달력에서 보고 있는 달
      let selectedDate = new Date(); // 실제 선택된 날짜 (초기값: 오늘)

      // 초기화
      document.addEventListener("DOMContentLoaded", () => {
        updateDateDisplay();
        renderCalendar();
      });

      /* --- 2. 서비스 선택 로직 (세그먼트 컨트롤) --- */
      function setService(service) {
        currentService = service;
        const segmentContainer = document.getElementById("serviceSegment");
        segmentContainer.setAttribute("data-active", service);

        const btns = document.querySelectorAll(".segment-btn");
        btns[0].classList.toggle("active", service === "iitp");
        btns[1].classList.toggle("active", service === "mnc");

        document.getElementById("result").innerHTML = ""; // 결과 초기화
      }

      /* --- 3. 커스텀 달력 로직 --- */
      const calendarPopup = document.getElementById("calendarPopup");
      const overlay = document.getElementById("overlay");
      const dateDisplay = document.getElementById("dateDisplay");

      function toggleCalendar() {
        const isShowing = calendarPopup.classList.contains("show");
        if (isShowing) closeCalendar();
        else openCalendar();
      }

      function openCalendar() {
        // 달력을 열 때, 선택된 날짜가 있는 달로 이동
        currentDate = new Date(
          selectedDate.getFullYear(),
          selectedDate.getMonth(),
          1,
        );
        renderCalendar();
        calendarPopup.classList.add("show");
        overlay.classList.add("show");
        dateDisplay.classList.add("active");
      }

      function closeCalendar() {
        calendarPopup.classList.remove("show");
        overlay.classList.remove("show");
        dateDisplay.classList.remove("active");
      }

      overlay.addEventListener("click", closeCalendar);

      function changeMonth(delta) {
        currentDate.setMonth(currentDate.getMonth() + delta);
        renderCalendar();
      }

      function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        document.getElementById("calMonthYear").innerText =
          `${year}년 ${month + 1}월`;

        const firstDayIndex = new Date(year, month, 1).getDay();
        const lastDayDate = new Date(year, month + 1, 0).getDate();

        const daysContainer = document.getElementById("calDays");
        daysContainer.innerHTML = "";

        const today = new Date();

        // 빈 칸 채우기 (첫째 날 이전)
        for (let i = 0; i < firstDayIndex; i++) {
          const emptyDiv = document.createElement("div");
          emptyDiv.className = "cal-day empty";
          daysContainer.appendChild(emptyDiv);
        }

        // 날짜 채우기
        for (let i = 1; i <= lastDayDate; i++) {
          const dayDiv = document.createElement("div");
          dayDiv.className = "cal-day";
          dayDiv.innerText = i;

          // 오늘 날짜 하이라이트
          if (
            year === today.getFullYear() &&
            month === today.getMonth() &&
            i === today.getDate()
          ) {
            dayDiv.classList.add("today");
          }

          // 선택된 날짜 하이라이트
          if (
            year === selectedDate.getFullYear() &&
            month === selectedDate.getMonth() &&
            i === selectedDate.getDate()
          ) {
            dayDiv.classList.add("selected");
          }

          // 날짜 클릭 이벤트
          dayDiv.onclick = () => {
            selectedDate = new Date(year, month, i);
            updateDateDisplay();
            closeCalendar();
          };

          daysContainer.appendChild(dayDiv);
        }
      }

      function updateDateDisplay() {
        const y = selectedDate.getFullYear();
        const m = String(selectedDate.getMonth() + 1).padStart(2, "0");
        const d = String(selectedDate.getDate()).padStart(2, "0");
        document.getElementById("dateText").innerText = `${y}년 ${m}월 ${d}일`;
      }

      /* --- 4. URL 생성 로직 --- */
      // (기존의 복잡한 한자 변환 로직 유지)
      function createIitpQuery(dateObj) {
        const y = String(dateObj.getFullYear());
        const m = String(dateObj.getMonth() + 1).padStart(2, "0");
        const d = String(dateObj.getDate()).padStart(2, "0");

        const yyyymmdd0 = y + m + d + "0";
        const hanjaBytes = [
          [0xec, 0xed],
          [0xea, 0xc5],
          [0xfb, 0xfd],
          [0xe2, 0xa9],
          [0xd9, 0xca],
          [0xd1, 0xd1],
          [0xf7, 0xcf],
        ];
        const hj = hanjaBytes[dateObj.getDay()];

        const bytes = [];
        const addStr = (s) => {
          for (let i = 0; i < s.length; i++) bytes.push(s.charCodeAt(i));
        };

        addStr("iitp|");
        addStr(yyyymmdd0);
        addStr("|");
        addStr(y);
        bytes.push(0xb3, 0xe2);
        addStr(" ");
        addStr(m);
        bytes.push(0xbf, 0xf9);
        addStr(" ");
        addStr(d);
        bytes.push(0xc0, 0xcf);
        addStr("  (");
        hj.forEach((b) => bytes.push(b));
        addStr(") ");
        bytes.push(0xc1, 0xb6, 0xb0, 0xa3);

        const binary = String.fromCharCode(...new Uint8Array(bytes));
        return { q: btoa(binary), info: yyyymmdd0 };
      }

      function generateURL() {
        const resultDiv = document.getElementById("result");

        // 날짜 포맷팅 (YYYY-MM-DD)
        const y = selectedDate.getFullYear();
        const m = String(selectedDate.getMonth() + 1).padStart(2, "0");
        const d = String(selectedDate.getDate()).padStart(2, "0");
        const dateInputStr = `${y}-${m}-${d}`;

        let fullUrl = "";
        let title = "";

        if (currentService === "iitp") {
          const { q, info } = createIitpQuery(selectedDate);
          fullUrl = `https://mail2.scrapmaster.co.kr/mail/include/iitp_list_pop.php?scrapinfo=${info}&q=${encodeURIComponent(q)}&from=display`;
          title = "IITP 뉴스 보기";
        } else {
          const params = new URLSearchParams({
            scrapBookNo: "13459",
            search_date: dateInputStr,
            flag: "1",
            id: "moego2009",
            div: "0",
            srch_disp: "N",
            page: "1",
            back_url: "mb_list",
          });
          fullUrl = `https://mnc.scrapmaster.co.kr/v1_75/mb_home.php?${params.toString()}`;
          title = "교육부 뉴스 보기";
        }

        resultDiv.innerHTML = `
          <a href="${fullUrl}" target="_blank" class="result-link">
            ${title} (${y}.${m}.${d})
            <i class="fas fa-arrow-right"></i>
          </a>
        `;
      }
    </script>
  </body>
</html>
