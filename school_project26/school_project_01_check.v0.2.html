<!DOCTYPE html>

<head>

  <style>
    /* 🎨 CSS 변수를 활용한 다이나믹 테마 설정 */
    :root {

    }

  <script>
    // Tailwind 설정에 CSS 변수 매핑
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ch-dark': 'var(--ch-dark)',
            'ch-secondary': 'var(--ch-secondary)',
            'ch-primary': 'var(--ch-primary)',
            'ch-primary-hover': 'var(--ch-primary-hover)',
            'ch-primary-light': 'var(--ch-primary-light)',
            'ch-primary-border': 'var(--ch-primary-border)',
            'ch-light': 'var(--ch-light)',

    .tab-active { 
      border-bottom: 3px solid var(--ch-primary); 
      color: var(--ch-primary);

</head>

  <script>
    let API_URL = "";
    const SECRET_API_KEY = "VIBE_SMART_CHECK_2026_SECURE_KEY";
    
    let sheetNames = [];
    let currentSheetName = "";
    let sheetData = { headers: [], students: [] };
    
    let currentSelectedTask = "";
    let pendingUpdates = {};
    
    let currentTaskPage = 1; const tasksPerPage = 5;
    let currentViewPage = 1; const viewTasksPerPage = 6; 
    let currentClassPage = 1; const classesPerPage = 5;

    // 🍔 메인 메뉴 토글 로직
    function toggleMobileMenu() {
      const nav = document.getElementById('main-nav');
      if (nav.classList.contains('hidden')) {
        nav.classList.remove('hidden'); nav.classList.add('flex');
      } else {
        nav.classList.add('hidden'); nav.classList.remove('flex');
      }
    }

    function closeMobileMenu() {
      if (window.innerWidth < 768) {
        const nav = document.getElementById('main-nav');
        nav.classList.add('hidden'); nav.classList.remove('flex');
      }
    }

    // 🍔 반 선택 메뉴 토글 로직 (새로 추가됨)
    function toggleMobileClassMenu() {
      const classSelector = document.getElementById('class-selector');
      if (classSelector.classList.contains('hidden')) {
        classSelector.classList.remove('hidden'); classSelector.classList.add('flex');
      } else {
        classSelector.classList.add('hidden'); classSelector.classList.remove('flex');
      }
    }

    function closeMobileClassMenu() {
      if (window.innerWidth < 768) {
        const classSelector = document.getElementById('class-selector');
        classSelector.classList.add('hidden'); classSelector.classList.remove('flex');
      }
    }

    // 🎨 테마 설정
    const colorThemes = [
      { dark: '#222831', secondary: '#393E46', primary: '#00ADB5', hover: '#00939A', lightBg: '#E6F7F8', border: '#80D6DA', light: '#EEEEEE', bg: '#FAFAFA' },
      { dark: '#1e1b4b', secondary: '#312e81', primary: '#6366f1', hover: '#4f46e5', lightBg: '#e0e7ff', border: '#a5b4fc', light: '#e5e7eb', bg: '#f8fafc' },
      { dark: '#431407', secondary: '#7c2d12', primary: '#f97316', hover: '#ea580c', lightBg: '#ffedd5', border: '#fdba74', light: '#e5e7eb', bg: '#fff7ed' }
    ];

    function applyThemeForClass(sheetName) {
      if (!sheetNames || sheetNames.length === 0) return;
      const index = sheetNames.indexOf(sheetName) % colorThemes.length;
      const t = colorThemes[index >= 0 ? index : 0];
      const root = document.documentElement;
      root.style.setProperty('--ch-dark', t.dark);
      root.style.setProperty('--ch-secondary', t.secondary);
      root.style.setProperty('--ch-primary', t.primary);
      root.style.setProperty('--ch-primary-hover', t.hover);
      root.style.setProperty('--ch-primary-light', t.lightBg);
      root.style.setProperty('--ch-primary-border', t.border);
      root.style.setProperty('--ch-light', t.light);
      root.style.setProperty('--ch-bg', t.bg);
    }

    function escapeHtml(unsafe) {
      if (typeof unsafe !== 'string') return unsafe;
      return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    async function initConfig() {
      try {
        const res = await fetch('school_project_01_check.gas_url.v0.1.json');
        const config = await res.json();
        API_URL = config.webAppUrl;
        checkLoginState();
      } catch (e) { alert("gas_url.json 파일 로드 실패!"); }
    }

    async function checkLoginState() {
      if (localStorage.getItem('vibe_logged_in') === 'true') {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        await refresh(""); 
      }
    }

    async function attemptLogin() {
      const pwd = document.getElementById('login-password').value;
      if (!pwd) return alert("비밀번호를 입력해주세요.");
      
      const btn = document.getElementById('login-btn');
      btn.innerText = "확인 중..."; btn.disabled = true;
      
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'verify_password', apiKey: SECRET_API_KEY, password: pwd })
        });
        const result = await res.json();
        
        if (result.status === "성공") {
          localStorage.setItem('vibe_logged_in', 'true');
          document.getElementById('login-section').classList.add('hidden');
          document.getElementById('main-app').classList.remove('hidden');
          await refresh(""); 
        } else {
          alert(result.message || "비밀번호가 틀렸습니다.");
          document.getElementById('login-password').value = '';
          btn.innerText = "입장하기"; btn.disabled = false;
        }
      } catch (e) {
        alert("서버 오류가 발생했습니다.");
        btn.innerText = "입장하기"; btn.disabled = false;
      }
    }

    function logout() {
      if (Object.keys(pendingUpdates).length > 0 && !confirm("저장하지 않은 변경사항이 있습니다. 로그아웃 하시겠습니까?")) return;
      localStorage.removeItem('vibe_logged_in'); location.reload(); 
    }

    async function refresh(targetSheet = "") {
      document.getElementById('loader').style.display = 'flex';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'get_data', apiKey: SECRET_API_KEY, sheetName: targetSheet || currentSheetName })
        });
        const responseData = await res.json();
        
        if(responseData.status === "성공") {
          sheetNames = responseData.sheetNames || [];
          currentSheetName = responseData.currentSheetName;
          sheetData.headers = responseData.headers || [];
          sheetData.students = responseData.students || [];
          
          applyThemeForClass(currentSheetName);

          const tasks = sheetData.headers.filter(h => h !== '학번' && h !== '이름');
          if (tasks.length > 0 && !tasks.includes(currentSelectedTask)) currentSelectedTask = tasks[0];
          else if (tasks.length === 0) currentSelectedTask = "";

          renderClassSelector(); renderAll();
        } else { alert("데이터 로드 실패: " + responseData.message); }
      } catch (e) { console.error(e); } 
      finally { document.getElementById('loader').style.display = 'none'; }
    }

    function selectTask(taskName) {
      if (Object.keys(pendingUpdates).length > 0 && !confirm("저장하지 않은 변경사항이 있습니다. 무시하시겠습니까?")) return;

    function markChanged(id, header, newValue) {

      document.getElementById('save-bar').classList.remove('hidden'); renderCheck(); 
    }

    function toggleAll(targetValue) {
      if (!currentSelectedTask) return;
      let changed = false;
      sheetData.students.forEach(s => {
        const safeId = String(s['학번']);
        const key = safeId + '_' + currentSelectedTask;
        let currentVal = pendingUpdates[key] !== undefined ? pendingUpdates[key].value : (s[currentSelectedTask] || '');
        
        if (currentVal !== targetValue) {
          pendingUpdates[key] = { id: safeId, columnHeader: currentSelectedTask, value: targetValue };

        }
      });

        const canvas = await html2canvas(targetArea, { scale: 2, backgroundColor: '#FFFFFF', useCORS: true, logging: false });
        const link = document.createElement('a'); link.href = canvas.toDataURL('image/png'); link.download = `[${currentSheetName}] ${currentSelectedTask}_제출현황.png`;

      document.getElementById('loader').style.display = 'flex';
      
      const captureContainer = document.createElement('div');
      captureContainer.style.position = 'absolute'; captureContainer.style.left = '-9999px'; captureContainer.style.top = '-9999px';
      captureContainer.style.backgroundColor = '#FAFAFA'; captureContainer.style.padding = '40px'; 
      
      const bezel = document.createElement('div');
      bezel.style.border = '3px dashed #D1D5DB'; bezel.style.borderRadius = '32px'; bezel.style.padding = '30px'; bezel.style.backgroundColor = '#FAFAFA';
      
      const clonedCard = originalCard.cloneNode(true);
      clonedCard.id = ''; clonedCard.style.margin = '0'; clonedCard.style.width = originalCard.offsetWidth + 'px'; clonedCard.style.paddingTop = '45px';

        const link = document.createElement('a'); link.href = url; link.download = `[${currentSheetName}] ${taskName}_진척도.png`; link.click(); 
      } catch (e) { alert("이미지 변환 중 오류가 발생했습니다."); } 
      finally { document.body.removeChild(captureContainer); document.getElementById('loader').style.display = 'none'; }
    }

        let row = [];
        sheetData.headers.forEach(h => { 
          row.push((h !== '학번' && h !== '이름') ? (student[h] === '완료' ? 'O' : (student[h] === '해당없음' ? '-' : '')) : student[h]); 
        });
        excelData.push(row);
      });
      const workbook = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(excelData), currentSheetName);
      XLSX.writeFile(workbook, `[${currentSheetName}]과제명렬표.xlsx`);
    }

    async function apiAction(action, target = null) {
      if (Object.keys(pendingUpdates).length > 0) return alert("저장되지 않은 체크 내역이 있습니다. 먼저 체크 내역을 [저장]해 주세요.");
      let body = { action: action, apiKey: SECRET_API_KEY, sheetName: currentSheetName };
      
      if (action === 'add_student') {
        body.studentId = document.getElementById('add-sid').value.trim(); body.name = document.getElementById('add-sname').value.trim();
        if(!body.studentId || !body.name) return alert("입력값을 확인해주세요.");
      } else if (action === 'add_topic') {
        body.topicName = document.getElementById('add-topic').value.trim(); if(!body.topicName) return alert("과제명을 입력해주세요.");
      } else if (action === 'delete_student') {
        if (!confirm("삭제하시겠습니까?")) return; body.id = target;
      } else if (action === 'delete_topic') {
        if (!confirm("삭제하시겠습니까?")) return; body.topicName = target;
      } else if (action === 'add_sheet') {
        body.newSheetName = document.getElementById('add-class-name').value.trim(); if (!body.newSheetName) return alert("반 이름을 입력하세요.");
      } else if (action === 'delete_sheet') {
        if (sheetNames.length <= 1) return alert("마지막 남은 반입니다."); if (!confirm(`[${target}] 삭제하시겠습니까?`)) return; body.sheetName = target; 
      }

      document.getElementById('loader').style.display = 'flex';
      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(body) });
        const result = await res.json();
        if (result.status === "실패" || result.status === "거부") { alert("오류: " + result.message); return; }
        if (action === 'add_sheet') { document.getElementById('add-class-name').value = ''; await refresh(result.newSheetName); return; }
        if (action === 'delete_sheet') { await refresh(currentSheetName === target ? "" : currentSheetName); return; }
      } catch (err) { console.error(err); } finally { document.getElementById('loader').style.display = 'none'; }
      refresh();
    }

    function switchTab(name) {
      if (Object.keys(pendingUpdates).length > 0 && name !== 'check') {
        if (!confirm("저장하지 않은 변경사항이 있습니다. 무시하시겠습니까?")) return;
        pendingUpdates = {}; document.getElementById('save-bar').classList.add('hidden'); renderCheck(); 
      }
      ['check', 'view', 'manage', 'print'].forEach(t => {
        document.getElementById(`${t}-section`).classList.add('hidden');
        document.getElementById(`tab-${t}`).classList.remove('tab-active'); document.getElementById(`tab-${t}`).classList.add('text-gray-500');
      });
      document.getElementById(`${name}-section`).classList.remove('hidden');
      document.getElementById(`tab-${name}`).classList.remove('text-gray-500'); document.getElementById(`tab-${name}`).classList.add('tab-active');
    }

    function switchSubTab(areaName) {
      ['manage-student', 'manage-task', 'manage-class'].forEach(a => document.getElementById(`${a}-area`).classList.add('hidden'));
      document.getElementById(`${areaName}-area`).classList.remove('hidden');
      ['subtab-student', 'subtab-task', 'subtab-class'].forEach(b => {
        document.getElementById(b).className = "px-5 py-2.5 rounded-full text-sm font-bold text-gray-500 hover:bg-gray-100 transition-all border border-transparent w-full md:w-auto";
      });
      document.getElementById('subtab-class').classList.add('md:ml-auto', 'border-gray-200');
      document.getElementById(`subtab-${areaName.split('-')[1]}`).className = "px-5 py-2.5 rounded-full text-sm font-bold transition-all bg-ch-secondary text-white shadow-md border border-transparent w-full md:w-auto" + (areaName==='manage-class' ? ' md:ml-auto' : '');
    }

    switchTab('check'); initConfig();
  </script>
</body>
