  <script>
    let API_URL = "";
    // ── SECRET_API_KEY는 소스코드에서 제거되었습니다 ──────────
    // GAS 스크립트 속성(PropertiesService)에만 저장합니다.
    // API 요청 시에는 세션 토큰을 사용합니다.

    // ── SHA-256 해시 (Web Crypto API) ─────────────────────────
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => ('0' + b.toString(16)).slice(-2)).join('');
    }

    // ── 세션 토큰 저장/로드/삭제 ────────────────────────────
    // localStorage 대신 토큰 + 만료 시각을 저장합니다.
    function saveSession(token, expireAt) {
      localStorage.setItem('vibe_session_token', token);
      localStorage.setItem('vibe_session_expire', String(expireAt));
    }
    function loadSession() {
      const token    = localStorage.getItem('vibe_session_token');
      const expireAt = Number(localStorage.getItem('vibe_session_expire') || '0');
      if (!token || Date.now() > expireAt) { clearSession(); return null; }
      return token;
    }
    function clearSession() {
      localStorage.removeItem('vibe_session_token');
      localStorage.removeItem('vibe_session_expire');
    }

    // ── API 요청 공통 헬퍼 ────────────────────────────────────
    // 세션 토큰을 모든 요청에 자동으로 포함합니다.
    function buildBody(action, extra = {}) {
      const token = loadSession();
      return { action, sessionToken: token, ...extra };
    }

    let sheetNames = [];
    let currentSheetName = "";
    let sheetData = { headers: [], students: [] };
    
    let currentSelectedTask = "";
    let pendingUpdates = {};
    
    let currentTaskPage = 1; const tasksPerPage = 5;
    let currentViewPage = 1; const viewTasksPerPage = 6; 
    let currentClassPage = 1; const classesPerPage = 5;

    function toggleMobileMenu() {
      const nav = document.getElementById('main-nav');
      if (nav.classList.contains('hidden')) { nav.classList.remove('hidden'); nav.classList.add('flex'); } 
      else { nav.classList.add('hidden'); nav.classList.remove('flex'); }
    }
    function closeMobileMenu() {
      if (window.innerWidth < 768) { const nav = document.getElementById('main-nav'); nav.classList.add('hidden'); nav.classList.remove('flex'); }
    }
    
    function toggleMobileClassMenu() {
      const classSelector = document.getElementById('class-selector');
      if (classSelector.classList.contains('hidden')) { classSelector.classList.remove('hidden'); classSelector.classList.add('flex'); } 
      else { classSelector.classList.add('hidden'); classSelector.classList.remove('flex'); }
    }
    function closeMobileClassMenu() {
      if (window.innerWidth < 768) { const classSelector = document.getElementById('class-selector'); classSelector.classList.add('hidden'); classSelector.classList.remove('flex'); }
    }

    function toggleMobileTaskMenu() {
      const taskSelector = document.getElementById('task-selector');
      if (taskSelector.classList.contains('hidden')) { taskSelector.classList.remove('hidden'); taskSelector.classList.add('flex'); } 
      else { taskSelector.classList.add('hidden'); taskSelector.classList.remove('flex'); }
    }
    function closeMobileTaskMenu() {
      if (window.innerWidth < 768) { const taskSelector = document.getElementById('task-selector'); taskSelector.classList.add('hidden'); taskSelector.classList.remove('flex'); }
    }

    const colorThemes = [
      { dark: '#222831', secondary: '#393E46', primary: '#00ADB5', hover: '#00939A', lightBg: '#E6F7F8', border: '#80D6DA', light: '#EEEEEE', bg: '#FAFAFA' },
      { dark: '#1e1b4b', secondary: '#312e81', primary: '#6366f1', hover: '#4f46e5', lightBg: '#e0e7ff', border: '#a5b4fc', light: '#e5e7eb', bg: '#f8fafc' },
      { dark: '#431407', secondary: '#7c2d12', primary: '#f97316', hover: '#ea580c', lightBg: '#ffedd5', border: '#fdba74', light: '#e5e7eb', bg: '#fff7ed' }
    ];

    function applyThemeForClass(sheetName) {
      if (!sheetNames || sheetNames.length === 0) return;
      const index = sheetNames.indexOf(sheetName) % colorThemes.length;
      const t = colorThemes[index >= 0 ? index : 0];
      const root = document.documentElement;
      root.style.setProperty('--ch-dark', t.dark); root.style.setProperty('--ch-secondary', t.secondary); root.style.setProperty('--ch-primary', t.primary);
      root.style.setProperty('--ch-primary-hover', t.hover); root.style.setProperty('--ch-primary-light', t.lightBg); root.style.setProperty('--ch-primary-border', t.border);
      root.style.setProperty('--ch-light', t.light); root.style.setProperty('--ch-bg', t.bg);
    }

    function escapeHtml(unsafe) {
      if (typeof unsafe !== 'string') return unsafe;
      return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    async function initConfig() {
      try {
        const res = await fetch('school_project_01_check_gas_url.json');
        const config = await res.json(); API_URL = config.webAppUrl; checkLoginState();
      } catch (e) { alert("gas_url.json 파일 로드 실패!"); }
    }

    async function checkLoginState() {
      const token = loadSession(); // 만료 시각도 함께 검증
      if (token) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        await refresh("");
      }
    }

    async function attemptLogin() {
      const pwd = document.getElementById('login-password').value;
      if (!pwd) return alert("비밀번호를 입력해주세요.");
      const btn = document.getElementById('login-btn'); btn.innerText = "확인 중..."; btn.disabled = true;
      try {
        // ── 비밀번호를 SHA-256 해시 후 전송 (평문 전송 금지) ──
        const passwordHash = await sha256(pwd);
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'verify_password', passwordHash })
        });
        const result = await res.json();
        if (result.status === "성공") {
          // ── 서버에서 발급한 세션 토큰 + 만료 시각 저장 ──
          saveSession(result.sessionToken, result.expireAt);
          document.getElementById('login-section').classList.add('hidden');
          document.getElementById('main-app').classList.remove('hidden');
          await refresh("");
        } else {
          alert(result.message || "비밀번호가 틀렸습니다.");
          document.getElementById('login-password').value = ''; btn.innerText = "입장하기"; btn.disabled = false;
        }
      } catch (e) { alert("서버 오류가 발생했습니다."); btn.innerText = "입장하기"; btn.disabled = false; }
    }

    function logout() {
      if (Object.keys(pendingUpdates).length > 0 && !confirm("저장하지 않은 변경사항이 있습니다. 로그아웃 하시겠습니까?")) return;
      clearSession(); location.reload();
    }

    async function refresh(targetSheet = "") {
      document.getElementById('loader').style.display = 'flex';
      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(
          buildBody('get_data', { sheetName: targetSheet || currentSheetName })
        )});
        const responseData = await res.json();
        if (responseData.status === "거부") {
          clearSession(); alert("세션이 만료되었습니다. 다시 로그인해주세요."); location.reload(); return;
        }
        if (responseData.status === "성공") {
          sheetNames = responseData.sheetNames || []; currentSheetName = responseData.currentSheetName;
          sheetData.headers = responseData.headers || []; sheetData.students = responseData.students || [];
          applyThemeForClass(currentSheetName);
          const tasks = sheetData.headers.filter(h => h !== '학번' && h !== '이름');
          if (tasks.length > 0 && !tasks.includes(currentSelectedTask)) currentSelectedTask = tasks[0];
          else if (tasks.length === 0) currentSelectedTask = "";
          renderClassSelector(); renderAll();
        } else { alert("데이터 로드 실패: " + responseData.message); }
      } catch (e) { console.error(e); alert("서버와 통신 중 오류가 발생했습니다. 네트워크 연결을 확인해주세요."); }
      finally { document.getElementById('loader').style.display = 'none'; }
    }

    function renderClassSelector() {
      const container = document.getElementById('class-selector'); let html = '';

        html += `<button onclick="changeClass('${safeName}')" class="px-5 py-2 rounded-xl text-sm transition-all whitespace-nowrap text-left md:text-center w-full md:w-auto ${btnClass}">${safeName}</button>`;
      });
      container.innerHTML = html;
      const badge = document.getElementById('current-class-badge'); if (badge) badge.innerText = escapeHtml(currentSheetName);
      const mobileLabel = document.getElementById('current-class-mobile-label'); if (mobileLabel) mobileLabel.innerText = escapeHtml(currentSheetName);
    }

    async function changeClass(newSheetName) {

        if (!confirm("저장하지 않은 데이터가 있습니다. 무시하고 반을 변경하시겠습니까?")) return;

      });

        const btnNA = val === '해당없음' ? 'bg-gray-500 text-white shadow-md' : 'bg-white text-gray-400 hover:bg-gray-50';

        // 🛠️ [핵심 수정] html2canvas의 flex-direction: column 정렬 버그를 완벽히 우회하는 블록-마진 공정 설계로 변경

            <div class="flex items-center shrink-0">
              <div class="inline-flex text-[11px] font-bold rounded-lg overflow-hidden border border-gray-200 bg-white shadow-sm">

    function selectTask(taskName) {
      if (Object.keys(pendingUpdates).length > 0 && !confirm("저장하지 않은 변경사항이 있습니다. 무시하시겠습니까?")) return;
      pendingUpdates = {}; document.getElementById('save-bar').classList.add('hidden'); 
      currentSelectedTask = taskName; closeMobileTaskMenu(); renderCheck();
    }

    function markChanged(id, header, newValue) {
      pendingUpdates[id + '_' + header] = { id: id, columnHeader: header, value: newValue };
      document.getElementById('save-bar').classList.remove('hidden'); renderCheck(); 
    }

    function toggleAll(targetValue) {
      if (!currentSelectedTask) return;
      let changed = false;
      sheetData.students.forEach(s => {
        const safeId = String(s['학번']); const key = safeId + '_' + currentSelectedTask;
        let currentVal = pendingUpdates[key] !== undefined ? pendingUpdates[key].value : (s[currentSelectedTask] || '');
        if (currentVal !== targetValue) { pendingUpdates[key] = { id: safeId, columnHeader: currentSelectedTask, value: targetValue }; changed = true; }
      });
      if (changed) { document.getElementById('save-bar').classList.remove('hidden'); renderCheck(); }
    }

    async function saveAsImage() {
      const originalArea = document.getElementById('capture-area'); 
      if (!originalArea || !currentSelectedTask) return alert("저장할 데이터가 없습니다.");
      
      document.getElementById('loader').style.display = 'flex'; 
      const currentScrollY = window.scrollY;
      window.scrollTo(0, 0);
      
      await new Promise(resolve => setTimeout(resolve, 250)); 
      
      try {
        const canvas = await html2canvas(originalArea, { 
          scale: 2, 
          backgroundColor: '#FFFFFF', 
          useCORS: true, 
          logging: false,
          letterRendering: true
        });
        const link = document.createElement('a'); 
        link.href = canvas.toDataURL('image/png'); 
        link.download = `[${currentSheetName}] ${currentSelectedTask}_제출현황.png`; 
        link.click();
      } catch (e) { 
        alert("이미지 변환 오류가 발생했습니다."); 
      } finally { 
        window.scrollTo(0, currentScrollY);
        document.getElementById('loader').style.display = 'none';

      await new Promise(resolve => setTimeout(resolve, 250));
      
      try {
        const canvas = await html2canvas(originalCard, { 
          scale: 2, 
          backgroundColor: '#FFFFFF', 
          useCORS: true, 
          logging: false,
          letterRendering: true
        });
        const url = canvas.toDataURL('image/png'); 
        const link = document.createElement('a'); 
        link.href = url; 
        link.download = `[${currentSheetName}] ${taskName}_진척도.png`;

      const updates = Object.values(pendingUpdates); if (updates.length === 0) return;
      document.getElementById('loader').style.display = 'flex';
      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(
          buildBody('batch_update', { sheetName: currentSheetName, updates })
        )});
        const result = await res.json();
        if (result.status === "거부") { clearSession(); alert("세션이 만료되었습니다. 다시 로그인해주세요."); location.reload(); return; }
        if (result.status !== "성공") { alert("저장 실패: " + result.message); return; }
        pendingUpdates = {}; document.getElementById('save-bar').classList.add('hidden'); await refresh();
      } catch (e) { console.error(e); alert("저장 중 오류가 발생했습니다."); }

        document.getElementById('task-pagination').innerHTML = `
          <button onclick="changeTaskPage(-1)" ${currentTaskPage === 1 ? 'disabled' : ''} class="px-4 py-2 rounded-lg bg-white border text-gray-600 disabled:opacity-50 text-sm font-bold">이전</button>
          <span class="text-sm font-bold text-gray-600 px-4">${currentTaskPage} / ${Math.ceil(tasks.length / tasksPerPage) || 1}</span>
          <button onclick="changeTaskPage(1)" ${currentTaskPage === (Math.ceil(tasks.length / tasksPerPage) || 1) ? 'disabled' : ''} class="px-4 py-2 rounded-lg bg-white border text-gray-600 disabled:opacity-50 text-sm font-bold">다음</button>
        `;
      } else { document.getElementById('task-pagination').innerHTML = ''; }

      const classListUl = document.getElementById('manage-class-list');
      const startClassIdx = (currentClassPage - 1) * classesPerPage; const pagedClasses = sheetNames.slice(startClassIdx, startClassIdx + classesPerPage);

      let classHtml = '';
      pagedClasses.forEach(name => {
        const safeName = escapeHtml(name); const isCurrent = name === currentSheetName;
        classHtml += `
          <li class="px-6 py-4 flex justify-between items-center hover:bg-gray-50 transition-colors">
            <span class="font-bold ${isCurrent ? 'text-ch-primary' : 'text-gray-700'}">${safeName} ${isCurrent ? '<span class="ml-2 text-xs bg-ch-primary-light text-ch-primary px-2 py-1 rounded-md">현재 선택됨</span>' : ''}</span>
            <button onclick="apiAction('delete_sheet', '${safeName}')" class="text-gray-400 hover:text-ch-danger hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm font-bold transition-all">삭제</button>
          </li>
        `;
      });
      classListUl.innerHTML = classHtml;

      if (sheetNames.length > 0) {
        const totalClassPages = Math.ceil(sheetNames.length / classesPerPage) || 1;
        document.getElementById('class-pagination').innerHTML = `
          <button onclick="changeClassPage(-1)" ${currentClassPage === 1 ? 'disabled' : ''} class="px-4 py-2 rounded-lg bg-white border text-gray-600 disabled:opacity-50 text-sm font-bold">이전</button>
          <span class="text-sm font-bold text-gray-600 px-4">${currentClassPage} / ${totalClassPages}</span>
          <button onclick="changeClassPage(1)" ${currentClassPage === totalClassPages ? 'disabled' : ''} class="px-4 py-2 rounded-lg bg-white border text-gray-600 disabled:opacity-50 text-sm font-bold">다음</button>
        `;
      } else { document.getElementById('class-pagination').innerHTML = ''; }
    }

    function changeTaskPage(step) {
      const tasks = sheetData.headers.filter(h => h !== '학번' && h !== '이름'); const totalPages = Math.ceil(tasks.length / tasksPerPage) || 1;
      currentTaskPage += step; if (currentTaskPage < 1) currentTaskPage = 1; if (currentTaskPage > totalPages) currentTaskPage = totalPages; renderManage(); 
    }
    
    function changeClassPage(step) {
      const totalPages = Math.ceil(sheetNames.length / classesPerPage) || 1;
      currentClassPage += step; if (currentClassPage < 1) currentClassPage = 1; if (currentClassPage > totalPages) currentClassPage = totalPages; renderManage();
    }

    function editTopicName(oldName) {
      const newName = prompt(`'${oldName}' 과제의 새로운 이름을 입력하세요:`, oldName);
      if (newName !== null && newName.trim() !== "" && newName !== oldName) {
        apiAction('edit_topic', { oldTopicName: oldName, newTopicName: newName.trim() });
      }
    }

    function renderPrint() {
      const container = document.getElementById('print-container');
      const baseHeaders = ['학번', '이름'];
      const tasks = sheetData.headers.filter(h => h !== '학번' && h !== '이름');
      
      if (tasks.length === 0) { 
        container.innerHTML = '<div class="bg-white p-10 text-center text-gray-55 rounded-lg border border-gray-200">출력할 과제가 없습니다.</div>'; 
        return; 
      }
      
      let finalHtml = '';
      for (let i = 0; i < tasks.length; i += 5) {
        const chunkTasks = tasks.slice(i, i + 5);
        const currentHeaders = [...baseHeaders, ...chunkTasks];
        
        let html = `
          <div class="print-page bg-white p-6 md:p-10 mb-8 rounded-xl no-print-bg">
            <div class="text-center mb-4">
              <span class="bg-gray-200 px-4 py-1 rounded-full text-sm font-bold text-gray-700">${escapeHtml(currentSheetName)}</span>
            </div>
            <h2 class="text-2xl font-black text-center mb-6 text-black decoration-gray-400 underline underline-offset-8">과제 수행 확인 명렬표</h2>
            <table class="w-full border-collapse border-2 border-black text-sm">
              <thead class="bg-gray-100 font-bold text-black border-b-2 border-black">
                <tr>
        `;
        currentHeaders.forEach(h => { html += `<th class="border border-black p-2 md:p-3">${escapeHtml(h)}</th>`; });
        html += `</tr></thead><tbody class="text-black">`;
        
        sheetData.students.forEach(s => {
          html += `<tr class="hover:bg-gray-50 border-b border-gray-400">`;
          currentHeaders.forEach(h => {
            const val = s[h]; const isTask = h !== '학번' && h !== '이름';
            let mark = '';
            if (isTask) {
              if (val === '완료') mark = '<span class="print-mark-o text-ch-primary font-black">O</span>';
              else if (val === '해당없음') mark = '<span class="print-mark-na text-gray-400 font-bold">-</span>';
            } else { mark = escapeHtml(String(val || '')); }
            html += `<td class="border border-black p-2 text-center ${!isTask ? 'font-bold bg-gray-50' : ''}">${mark}</td>`;
          });
          html += `</tr>`;
        });
        html += `</tbody></table></div>`;
        finalHtml += html;
      }
      container.innerHTML = finalHtml;
    }

    function exportToExcel() {
      if (!sheetData || sheetData.students.length === 0) return alert("출력할 데이터가 없습니다.");
      let excelData = [sheetData.headers];
      sheetData.students.forEach(student => {
        let row = [];
        sheetData.headers.forEach(h => { 
          row.push((h !== '학번' && h !== '이름') ? (student[h] === '완료' ? 'O' : (student[h] === '해당없음' ? '-' : '')) : student[h]); 
        });
        excelData.push(row);
      });
      const workbook = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(excelData), currentSheetName);
      XLSX.writeFile(workbook, `[${currentSheetName}]과제명렬표.xlsx`);
    }

    async function apiAction(action, target = null) {
      if (Object.keys(pendingUpdates).length > 0) return alert("저장되지 않은 체크 내역이 있습니다. 먼저 체크 내역을 [저장]해 주세요.");
      let extra = { sheetName: currentSheetName };

      if (action === 'add_student') {
        extra.studentId = document.getElementById('add-sid').value.trim(); extra.name = document.getElementById('add-sname').value.trim();
        if(!extra.studentId || !extra.name) return alert("입력값을 확인해주세요.");
      } else if (action === 'add_topic') {
        extra.topicName = document.getElementById('add-topic').value.trim(); if(!extra.topicName) return alert("과제명을 입력해주세요.");
      } else if (action === 'delete_student') {
        if (!confirm("삭제하시겠습니까?")) return; extra.id = target;
      } else if (action === 'delete_topic') {
        if (!confirm("삭제하시겠습니까?")) return; extra.topicName = target;
      } else if (action === 'add_sheet') {
        extra.newSheetName = document.getElementById('add-class-name').value.trim(); if (!extra.newSheetName) return alert("반 이름을 입력하세요.");
      } else if (action === 'delete_sheet') {
        if (sheetNames.length <= 1) return alert("마지막 남은 반입니다."); if (!confirm(`[${target}] 삭제하시겠습니까?`)) return; extra.sheetName = target;
      } else if (action === 'edit_topic') {
        extra.oldTopicName = target.oldTopicName; extra.newTopicName = target.newTopicName;
      }

      document.getElementById('loader').style.display = 'flex';
      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(buildBody(action, extra)) });
        const result = await res.json();
        if (result.status === "거부") { clearSession(); alert("세션이 만료되었습니다. 다시 로그인해주세요."); location.reload(); return; }
        if (result.status === "실패") { alert("오류: " + result.message); return; }
        if (action === 'add_sheet') { document.getElementById('add-class-name').value = ''; await refresh(result.newSheetName); return; }
        if (action === 'delete_sheet') { await refresh(currentSheetName === target ? "" : currentSheetName); return; }
      } catch (err) { console.error(err); alert("요청 처리 중 오류가 발생했습니다."); }
      finally { document.getElementById('loader').style.display = 'none'; }
      refresh();
    }

    function switchTab(name) {
      if (Object.keys(pendingUpdates).length > 0 && name !== 'check') {
        if (!confirm("저장하지 않은 변경사항이 있습니다. 무시하시겠습니까?")) return;
        pendingUpdates = {}; document.getElementById('save-bar').classList.add('hidden'); renderCheck(); 
      }
      ['check', 'view', 'manage', 'print'].forEach(t => {
        document.getElementById(`${t}-section`).classList.add('hidden');
        document.getElementById(`tab-${t}`).classList.remove('tab-active'); document.getElementById(`tab-${t}`).classList.add('text-gray-500');
      });
      document.getElementById(`${name}-section`).classList.remove('hidden');
      document.getElementById(`tab-${name}`).classList.remove('text-gray-500'); document.getElementById(`tab-${name}`).classList.add('tab-active');
    }

    function switchSubTab(areaName) {
      ['manage-student', 'manage-task', 'manage-class'].forEach(a => document.getElementById(`${a}-area`).classList.add('hidden'));
      document.getElementById(`${areaName}-area`).classList.remove('hidden');
      ['subtab-student', 'subtab-task', 'subtab-class'].forEach(b => {
        document.getElementById(b).className = "px-5 py-2.5 rounded-full text-sm font-bold text-gray-500 hover:bg-gray-100 transition-all border border-transparent w-full md:w-auto";
      });
      document.getElementById('subtab-class').classList.add('md:ml-auto', 'border-gray-200');
      document.getElementById(`subtab-${areaName.split('-')[1]}`).className = "px-5 py-2.5 rounded-full text-sm font-bold transition-all bg-ch-secondary text-white shadow-md border border-transparent w-full md:w-auto" + (areaName==='manage-class' ? ' md:ml-auto' : '');
    }

    switchTab('check'); initConfig();
  </script>
</body>
