<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성일정보 도제(3-12)아침인사</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #0f172a; --text-sub: #64748b;
      --primary-color: #3b82f6; --primary-hover: #2563eb; --border-color: #e2e8f0;
      --danger-color: #ef4444; --success-color: #10b981;
      --t-grow: #059669; --t-focus: #4f46e5; --t-peace: #0d9488;
    }
    [data-theme="dark"] {
      --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8; --border-color: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); transition: 0.3s; line-height: 1.7; -webkit-font-smoothing: antialiased; }
    
    .login-overlay { position: fixed; inset: 0; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 99999; }
    .login-overlay.hidden { display: none; }
    .login-card { background: var(--card-bg); padding: 40px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; border: 1px solid var(--border-color); }
    .login-card h2 { font-size: 1.75rem; margin-bottom: 12px; font-weight: 800; letter-spacing: -0.02em; }
    .login-card p { color: var(--text-sub); margin-bottom: 30px; }

    .dashboard-container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; display: none; }
    .dashboard-container.authorized { display: block; }
    .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .app-header h1 { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--primary-color); }
    .header-btns { display: flex; gap: 12px; }
    .icon-btn { background: var(--card-bg); border: 1.5px solid var(--border-color); color: var(--text-main); border-radius: 16px; width: 48px; height: 48px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .icon-btn:hover { border-color: var(--primary-color); color: var(--primary-color); transform: translateY(-2px); }

    .tabs { display: flex; gap: 12px; margin-bottom: 30px; background: var(--card-bg); padding: 8px; border-radius: 20px; border: 1.5px solid var(--border-color); }
    .tab-btn { flex: 1; background: transparent; border: none; font-size: 1.05rem; font-weight: 700; color: var(--text-sub); cursor: pointer; padding: 12px; border-radius: 14px; transition: 0.3s; font-family: inherit; }
    .tab-btn.active { background: var(--primary-color); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

    .section { display: none; animation: fadeIn 0.4s ease forwards; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card-style { background: var(--card-bg); border-radius: 30px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid var(--border-color); }
    .form-row { display: flex; gap: 40px; margin-bottom: 30px; }
    .form-col { flex: 1; }
    .input-group label { display: block; margin-bottom: 12px; font-weight: 800; color: var(--text-main); font-size: 0.95rem; }
    textarea, input[type="password"] { width: 100%; padding: 18px; border: 2px solid var(--border-color); border-radius: 16px; background: var(--bg-color); color: var(--text-main); font-size: 1rem; font-family: inherit; transition: 0.2s; }
    textarea { min-height: 200px; resize: vertical; line-height: 1.8; }
    textarea:focus { outline: none; border-color: var(--primary-color); background: var(--card-bg); }

    .calendar-container { background: var(--bg-color); border: 2px solid var(--border-color); border-radius: 20px; padding: 20px; width: 100%; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .calendar-header span { font-weight: 800; font-size: 1.1rem; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .calendar-day { padding: 10px 0; border-radius: 12px; font-size: 0.95rem; cursor: pointer; text-align: center; position: relative; transition: 0.2s; }
    .calendar-day:not(.empty):hover { background: var(--border-color); }
    .calendar-day.selected { background: var(--primary-color); color: white; font-weight: 800; }
    .calendar-day.has-post::after { content: ''; width: 5px; height: 5px; background: var(--primary-color); border-radius: 50%; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); }
    .calendar-day.selected.has-post::after { background: white; }

    .theme-selector { display: flex; flex-wrap: wrap; gap: 10px; }
    .theme-selector input { display: none; }
    .theme-btn { padding: 12px 20px; border-radius: 30px; font-size: 0.9rem; background: var(--bg-color); border: 2px solid var(--border-color); cursor: pointer; font-weight: 700; transition: 0.2s; }
    input:checked + .theme-btn { background: var(--primary-color); color: white; border-color: var(--primary-color); }

    .btn-submit { width: 100%; padding: 20px; border: none; border-radius: 18px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; background: var(--primary-color); color: white; margin-top: 20px; }
    .btn-submit:hover { background: var(--primary-hover); transform: scale(1.02); }

    .diary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .diary-card { background: var(--card-bg); border-radius: 24px; padding: 30px; border: 1.5px solid var(--border-color); display: flex; flex-direction: column; transition: 0.3s; position: relative; }
    .diary-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.06); }
    .diary-date { font-weight: 800; font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; }
    .diary-content { font-size: 1.05rem; font-weight: 500; letter-spacing: -0.01em; color: var(--text-main); white-space: pre-wrap; flex-grow: 1; margin-bottom: 25px; }
    .card-actions { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px dashed var(--border-color); padding-top: 15px; }

    .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 16px 32px; border-radius: 50px; font-weight: 700; transition: 0.5s; z-index: 100000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    .toast.show { bottom: 50px; }
    .loader { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 999999; }
    .loader.hidden { display: none; }
    .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 1s infinite linear; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    @media (max-width: 768px) { .form-row { flex-direction: column; } .diary-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="login-overlay" class="login-overlay">
    <div class="login-card">
      <div style="font-size: 60px; margin-bottom: 10px;">🔐</div>
      <h2>성일정보 도제(3-12)아침인사</h2>
      <p>학급 알림장을 안전하게 이용하세요.</p>
      <form id="login-form">
        <input type="password" id="login-password" placeholder="비밀번호 입력" required autofocus>
        <button type="submit" class="btn-submit">인증 및 입장</button>
      </form>
    </div>
  </div>

  <div id="main-dashboard" class="dashboard-container">
    <header class="app-header">
      <h1>💌 학급 알림장</h1>
      <div class="header-btns">
        <button id="logout-btn" class="icon-btn" title="로그아웃"><span class="material-icons">logout</span></button>
        <button id="theme-toggle" class="icon-btn" title="모드변경"><span class="material-icons">dark_mode</span></button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-target="section-write">✏️ 알림장 작성</button>
      <button class="tab-btn" data-target="section-list" id="tab-list">📋 모아보기</button>
    </nav>

    <section id="section-write" class="section active card-style">
      <form id="diary-form">
        <input type="hidden" id="edit-id" value="">
        <div class="form-row">
          <div class="form-col">
            <div class="input-group">
              <label>날짜 선택</label>
              <input type="hidden" id="selected-date-input" required>
              <div id="calendar-container" class="calendar-container"></div>
            </div>
          </div>
          <div class="form-col">
            <div class="input-group">
              <label>오늘의 반 테마</label>
              <div class="theme-selector">
                <label><input type="radio" name="theme" value="☀️ 활기찬 하루" required><span class="theme-btn">☀️ 활기찬</span></label>
                <label><input type="radio" name="theme" value="😌 차분한 하루"><span class="theme-btn">😌 차분한</span></label>
                <label><input type="radio" name="theme" value="🌱 성장하는 하루"><span class="theme-btn">🌱 성장하는</span></label>
                <label><input type="radio" name="theme" value="💡 집중하는 하루"><span class="theme-btn">💡 집중하는</span></label>
                <label><input type="radio" name="theme" value="🌈 평화로운 하루"><span class="theme-btn">🌈 평화로운</span></label>
                <label><input type="radio" name="theme" value="🎉 신나는 하루"><span class="theme-btn">🎉 신나는</span></label>
                <label><input type="radio" name="theme" value="💌 따뜻한 하루"><span class="theme-btn">💌 따뜻한</span></label>
              </div>
            </div>
          </div>
        </div>
        <div class="input-group">
          <label>알림장 내용</label>
          <textarea id="content" placeholder="이곳에 내용을 입력하세요..." required></textarea>
        </div>
        <button type="submit" id="submit-btn" class="btn-submit">등록 완료</button>
      </form>
    </section>

    <section id="section-list" class="section">
      <div class="feed-header" style="margin-bottom: 30px;">
        <input type="text" id="search-input" placeholder="검색어를 입력하세요..." style="width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--border-color); background: var(--card-bg); color: var(--text-main);">
      </div>
      <div id="grid-container" class="diary-grid"></div>
      <div id="pagination-controls" style="display:flex; justify-content:center; gap:20px; margin-top:40px;">
        <button id="prev-page" class="icon-btn"><span class="material-icons">chevron_left</span></button>
        <span id="page-info" style="font-weight:800; align-self:center;">1 / 1</span>
        <button id="next-page" class="icon-btn"><span class="material-icons">chevron_right</span></button>
      </div>
    </section>
  </div>

  <div id="toast" class="toast"></div>
  <div id="loader" class="loader hidden"><div class="spinner"></div></div>

  <script>
    let WEB_APP_URL = ""; 
    let allData = [], filteredData = [], currentPage = 1;
    const ITEMS_PER_PAGE = 6;
    let calYear = new Date().getFullYear(), calMonth = new Date().getMonth(), selectedDateStr = "";
    const bandColors = ['#FF9AA2', '#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#F1CBFF', '#BDE0FE', '#A0C4FF', '#FDFFB6'];

    const els = {
      loginOverlay: document.getElementById('login-overlay'), loginForm: document.getElementById('login-form'), loginPassword: document.getElementById('login-password'),
      mainDashboard: document.getElementById('main-dashboard'), tabs: document.querySelectorAll('.tab-btn'), sections: document.querySelectorAll('.section'),
      form: document.getElementById('diary-form'), editIdInput: document.getElementById('edit-id'), dateInput: document.getElementById('selected-date-input'),
      calendarContainer: document.getElementById('calendar-container'), contentInput: document.getElementById('content'), gridContainer: document.getElementById('grid-container'),
      searchInput: document.getElementById('search-input'), toast: document.getElementById('toast'), loader: document.getElementById('loader'),
      themeToggle: document.getElementById('theme-toggle'), logoutBtn: document.getElementById('logout-btn'), submitBtn: document.getElementById('submit-btn'),
      prevBtn: document.getElementById('prev-page'), nextBtn: document.getElementById('next-page'), pageInfo: document.getElementById('page-info')
    };

    function escapeHTML(str) { return str ? String(str).replace(/[&<>'"]/g, tag => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[tag] || tag)) : ''; }

    async function init() {
      setTodayDate(); setupEvents();
      const isConfigLoaded = await loadConfig();
      if (isConfigLoaded && sessionStorage.getItem('announceAuthToken')) grantAccess();
    }

    async function loadConfig() {
      showLoader(true);
      try {
        const response = await fetch(`school_project_03_gas_url.json?_=${Date.now()}`);
        if (!response.ok) throw new Error();
        const config = await response.json(); WEB_APP_URL = config.webAppUrl; return true;
      } catch (e) { showToast('⚙️ 설정 파일 로드 실패'); return false; } finally { showLoader(false); }
    }

    function setupEvents() {
      els.loginForm.addEventListener('submit', handleLoginSubmit);
      els.logoutBtn.addEventListener('click', () => { if(confirm('로그아웃 하시겠습니까?')) { sessionStorage.removeItem('announceAuthToken'); location.reload(); } });
      els.tabs.forEach(tab => tab.addEventListener('click', (e) => {
        els.tabs.forEach(t => t.classList.remove('active')); els.sections.forEach(s => s.classList.remove('active'));
        e.target.classList.add('active'); document.getElementById(e.target.dataset.target).classList.add('active');
        if(e.target.id === 'tab-list' && WEB_APP_URL) loadData();
      }));
      els.form.addEventListener('submit', handleFormSubmit);
      els.searchInput.addEventListener('input', applySearch);
      els.themeToggle.addEventListener('click', () => { document.body.hasAttribute('data-theme') ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark'); });
      els.prevBtn.addEventListener('click', () => { if(currentPage > 1) { currentPage--; renderPage(); } });
      els.nextBtn.addEventListener('click', () => { if(currentPage < Math.ceil(filteredData.length/ITEMS_PER_PAGE)) { currentPage++; renderPage(); } });
    }

    function renderCalendar() {
      const firstDay = new Date(calYear, calMonth, 1).getDay(), daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const postedDates = allData.map(item => item.날짜);
      let html = `<div class="calendar-header"><button type="button" id="cal-prev" class="material-icons">chevron_left</button><span>${calYear}년 ${calMonth + 1}월</span><button type="button" id="cal-next" class="material-icons">chevron_right</button></div><div class="calendar-grid">`;
      const days = ['일','월','화','수','목','금','토']; days.forEach(d => html += `<div style="font-weight:800;font-size:0.8rem;opacity:0.5;">${d}</div>`);
      for(let i=0; i<firstDay; i++) html += `<div class="calendar-day empty"></div>`;
      for(let i=1; i<=daysInMonth; i++) {
        const dStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        html += `<div class="calendar-day ${postedDates.includes(dStr)?'has-post':''} ${dStr===selectedDateStr?'selected':''}" data-date="${dStr}">${i}</div>`;
      }
      els.calendarContainer.innerHTML = html + `</div>`;
      document.getElementById('cal-prev').onclick = () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
      document.getElementById('cal-next').onclick = () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };
      els.calendarContainer.querySelectorAll('.calendar-day:not(.empty)').forEach(c => c.onclick = (e) => { selectedDateStr = e.target.dataset.date; els.dateInput.value = selectedDateStr; renderCalendar(); });
    }

    function setTodayDate() { const t = new Date(); calYear = t.getFullYear(); calMonth = t.getMonth(); selectedDateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; els.dateInput.value = selectedDateStr; renderCalendar(); }

    async function handleLoginSubmit(e) {
      e.preventDefault(); showLoader(true);
      try {
        const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'checkPassword', password: els.loginPassword.value }) });
        const result = await res.json();
        if (result.success) { sessionStorage.setItem('announceAuthToken', els.loginPassword.value); grantAccess(); showToast('🔐 로그인 성공'); }
        else { showToast('❌ 비밀번호 불일치'); els.loginPassword.value = ""; }
      } catch (e) { showToast('통신 오류'); } finally { showLoader(false); }
    }

    function grantAccess() { els.loginOverlay.classList.add('hidden'); els.mainDashboard.classList.add('authorized'); loadData(); }

    async function loadData() {
      const token = sessionStorage.getItem('announceAuthToken'); if (!WEB_APP_URL || !token) return;
      showLoader(true);
      try {
        const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'read', password: token }) });
        const result = await res.json();
        if (result.success) { allData = result.data; applySearch(); renderCalendar(); }
        else { showToast('🔒 인증 만료'); location.reload(); }
      } catch (e) { showToast('로딩 실패'); } finally { showLoader(false); }
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      const theme = document.querySelector('input[name="theme"]:checked');
      const payload = { action: els.editIdInput.value ? 'update' : 'create', password: sessionStorage.getItem('announceAuthToken'), id: els.editIdInput.value, date: els.dateInput.value, theme: theme.value, content: els.contentInput.value };
      showLoader(true);
      try {
        const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.success) { showToast(result.message); location.reload(); } else { showToast('❌ ' + result.error); }
      } catch (e) { showToast('저장 실패'); } finally { showLoader(false); }
    }

    window.deletePost = async function(id) {
      if (!confirm('삭제하시겠습니까?')) return;
      showLoader(true);
      try {
        const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', password: sessionStorage.getItem('announceAuthToken'), id: id }) });
        const result = await res.json(); if (result.success) loadData();
      } catch (e) {} finally { showLoader(false); }
    }

    window.editPost = function(id) {
        const post = allData.find(item => item.ID === id); if(!post) return;
        els.editIdInput.value = post.ID; els.contentInput.value = post.내용;
        document.querySelectorAll('input[name="theme"]').forEach(r => { if(r.value === post.테마) r.checked = true; });
        selectedDateStr = post.날짜; els.dateInput.value = selectedDateStr; 
        const [y, m] = selectedDateStr.split('-'); calYear = parseInt(y); calMonth = parseInt(m) - 1; renderCalendar();
        document.querySelector('.tab-btn[data-target="section-write"]').click();
        els.submitBtn.textContent = "수정 완료";
    }

    function applySearch() {
      const term = els.searchInput.value.toLowerCase();
      filteredData = allData.filter(i => (i.내용||'').toLowerCase().includes(term) || (i.테마||'').toLowerCase().includes(term) || (i.날짜||'').includes(term));
      filteredData.sort((a, b) => b.날짜.localeCompare(a.날짜) || (b.등록시간||'').localeCompare(a.등록시간||''));
      currentPage = 1; renderPage();
    }

    function renderPage() {
      const total = Math.ceil(filteredData.length / ITEMS_PER_PAGE) || 1;
      if (currentPage > total) currentPage = total;
      renderCards(filteredData.slice((currentPage-1)*ITEMS_PER_PAGE, currentPage*ITEMS_PER_PAGE));
      els.pageInfo.textContent = `${currentPage} / ${total}`;
      els.prevBtn.disabled = currentPage === 1; els.nextBtn.disabled = currentPage === total;
    }

    function renderCards(data) {
      els.gridContainer.innerHTML = data.length ? '' : '<p style="grid-column:1/-1;text-align:center;padding:100px;opacity:0.5;">작성된 글이 없습니다.</p>';
      data.forEach(item => {
        const card = document.createElement('div'); card.className = 'diary-card';
        card.style.borderLeft = `10px solid ${bandColors[Math.floor(Math.random()*bandColors.length)]}`;
        const sD = escapeHTML(item.날짜), sT = escapeHTML(item.테마), sC = escapeHTML(item.내용);
        card.innerHTML = `<div class="diary-date">📅 ${sD} <span style="font-size:0.8rem;background:var(--primary-color);color:#white;padding:4px 12px;border-radius:20px;color:white;margin-left:auto;">${sT}</span></div><div class="diary-content">${sC}</div><div class="card-actions"><button class="icon-btn" style="width:36px;height:36px;" onclick="downloadCard(this,'${sD}')"><span class="material-icons" style="font-size:1.1rem">download</span></button><button class="icon-btn" style="width:36px;height:36px;" onclick="editPost('${item.ID}')"><span class="material-icons" style="font-size:1.1rem">edit</span></button><button class="icon-btn" style="width:36px;height:36px;color:var(--danger-color);" onclick="deletePost('${item.ID}')"><span class="material-icons" style="font-size:1.1rem">delete</span></button></div>`;
        els.gridContainer.appendChild(card);
      });
    }

    window.downloadCard = async function(btn, date) {
      const card = btn.closest('.diary-card'); showLoader(true);
      const wrapper = document.createElement('div');
      Object.assign(wrapper.style, { position:'absolute', left:'-9999px', padding:'50px', borderRadius:'40px', background: document.body.hasAttribute('data-theme')?'#0f172a':'#f1f5f9' });
      const clone = card.cloneNode(true); clone.querySelector('.card-actions').remove(); clone.style.width = '450px';
      wrapper.appendChild(clone); document.body.appendChild(wrapper);
      try {
        const canvas = await html2canvas(wrapper, { scale:2, backgroundColor:null, useCORS:true });
        const link = document.createElement('a'); link.download = `알림장_${date}.png`; link.href = canvas.toDataURL(); link.click();
      } catch (e) {} finally { document.body.removeChild(wrapper); showLoader(false); }
    }

    function showToast(msg) { els.toast.textContent = msg; els.toast.classList.add('show'); setTimeout(() => els.toast.classList.remove('show'), 3000); }
    function showLoader(show) { els.loader.classList.toggle('hidden', !show); }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
