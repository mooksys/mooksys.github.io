<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>광교1동성당 오늘의 성경말씀</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(
            circle at 20% 80%,
            rgba(100, 150, 200, 0.05) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(150, 180, 210, 0.05) 0%,
            transparent 50%
          );
        pointer-events: none;
      }

      .container {
        width: 100%;
        max-width: 550px;
        position: relative;
        z-index: 1;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 32px;
        margin-bottom: 8px;
        font-weight: 700;
        color: #2c3e50;
        letter-spacing: 0.5px;
      }

      .date-card {
        border-radius: 24px;
        padding: 32px 35px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        border: none;
        margin-bottom: 25px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      .date-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at top right,
          rgba(255, 255, 255, 0.3) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      .date-card.weekday {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .date-card.saturday {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }
      .date-card.sunday {
        background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      }

      .date-card:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
      }

      .date-display {
        font-size: 22px;
        font-weight: 800;
        color: white;
        letter-spacing: 0.5px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
        position: relative;
        z-index: 1;
      }

      .upload-section {
        text-align: center;
        margin-top: 20px;
      }

      .upload-button {
        display: inline-block;
        padding: 12px 28px;
        background: white;
        color: #3498db;
        border: 2px solid #3498db;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 2px 10px rgba(52, 152, 219, 0.15);
        transition: all 0.3s ease;
      }

      .upload-button:hover {
        background: #3498db;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(52, 152, 219, 0.25);
      }

      #fileInput {
        display: none;
      }

      .upload-status {
        margin-top: 12px;
        color: #27ae60;
        font-size: 14px;
        font-weight: 600;
      }

      .cards-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-bottom: 25px;
      }

      .card {
        border-radius: 24px;
        padding: 28px 32px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        transition: all 0.4s ease;
      }

      .card.bible-card {
        background: white;
        border: 2px solid #e3f2fd;
      }

      .card.bible-card::before {
        background: linear-gradient(90deg, #2196f3 0%, #64b5f6 100%);
      }

      .card.bible-card:hover {
        border-color: #90caf9;
        box-shadow: 0 15px 50px rgba(33, 150, 243, 0.15);
      }

      .card.psalm-card {
        background: white;
        border: 2px solid #e8f5e9;
      }

      .card.psalm-card::before {
        background: linear-gradient(90deg, #66bb6a 0%, #81c784 100%);
      }

      .card.psalm-card:hover {
        border-color: #a5d6a7;
        box-shadow: 0 15px 50px rgba(102, 187, 106, 0.15);
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      }

      .card-header-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 15px;
        margin-bottom: 20px;
        padding-bottom: 18px;
        border-bottom: 2px solid #f0f4f8;
      }

      .card-header {
        font-size: 16px;
        font-weight: 700;
        color: #2c3e50;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .bible-reference {
        font-size: 14px;
        font-weight: 700;
        color: white;
        margin: 0;
        padding: 8px 18px;
        border-radius: 20px;
        box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
        transition: all 0.3s ease;
      }

      .bible-card .bible-reference {
        background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
      }

      .psalm-card .bible-reference {
        background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
      }

      .bible-reference:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
      }

      .verse-content {
        font-size: 18px;
        line-height: 1.9;
        color: #34495e;
        text-align: left;
        font-weight: 400;
        padding: 8px 0;
        position: relative;
      }

      .verse-content::before {
        content: "1절";
        display: inline-block;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-size: 13px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 8px;
        margin-right: 10px;
        vertical-align: middle;
      }

      .info-card {
        background: linear-gradient(135deg, #fff9e6 0%, #fffbf0 100%);
        border-radius: 24px;
        padding: 28px 32px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        text-align: center;
        border: 2px solid #fff3cd;
        position: relative;
        overflow: hidden;
      }

      .info-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, #ffc107 0%, #ffb300 100%);
      }

      .info-card:hover {
        border-color: #ffe082;
        box-shadow: 0 15px 50px rgba(255, 193, 7, 0.15);
      }

      .info-card-content {
        font-size: 17px;
        line-height: 1.8;
        color: #555;
        font-weight: 600;
      }

      .navigation {
        display: flex;
        justify-content: space-between;
        gap: 15px;
        margin-bottom: 18px;
      }

      .nav-button {
        flex: 1;
        padding: 16px 28px;
        font-size: 16px;
        font-weight: 600;
        border: 2px solid #3498db;
        border-radius: 12px;
        background: white;
        color: #3498db;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 10px rgba(52, 152, 219, 0.1);
      }

      .nav-button:hover {
        background: #3498db;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(52, 152, 219, 0.2);
      }

      .save-image-button {
        flex: 1;
        padding: 16px 28px;
        font-size: 16px;
        font-weight: 600;
        border: 2px solid #27ae60;
        border-radius: 12px;
        background: white;
        color: #27ae60;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .save-image-button:hover {
        background: #27ae60;
        color: white;
        transform: translateY(-2px);
      }

      .date-picker-section {
        text-align: center;
        margin-bottom: 20px;
      }

      .date-picker-button {
        padding: 14px 32px;
        font-size: 15px;
        font-weight: 600;
        border: 2px solid #3498db;
        border-radius: 12px;
        background: white;
        color: #3498db;
        cursor: pointer;
        box-shadow: 0 2px 10px rgba(52, 152, 219, 0.1);
        transition: all 0.3s ease;
      }

      .date-picker-button:hover {
        background: #3498db;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(52, 152, 219, 0.2);
      }

      #datePicker {
        margin-left: 12px;
        padding: 10px 14px;
        font-size: 14px;
        border: 2px solid #bdc3c7;
        border-radius: 8px;
        background: white;
        color: #2c3e50;
        font-weight: 600;
        cursor: pointer;
      }

      #datePicker:focus {
        outline: none;
        border-color: #3498db;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.6s ease;
      }

      @media (max-width: 480px) {
        .header h1 {
          font-size: 26px;
        }
        .card {
          padding: 30px 25px;
        }
        .verse-content {
          font-size: 18px;
        }
        .nav-button {
          padding: 14px 22px;
          font-size: 15px;
        }
        .bible-reference {
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container" id="mainContainer">
      <div class="header" id="headerSection">
        <h1>📖광교1동성당 오늘의 성경말씀</h1>
      </div>

      <div class="date-card fade-in weekday" id="dateCard">
        <div class="date-display" id="dateDisplay">2026년 1월 2일 목요일</div>
      </div>

      <div class="cards-container fade-in" id="cardsContainer">
        <div class="card bible-card">
          <div class="card-header-container">
            <div class="card-header">📜 성경 말씀</div>
            <div class="bible-reference" id="bibleRef">요한 1서 1장</div>
          </div>
          <div class="verse-content" id="bibleVerse">말씀을 불러오는 중...</div>
        </div>

        <div class="card psalm-card">
          <div class="card-header-container">
            <div class="card-header">✨ 시편 말씀</div>
            <div class="bible-reference" id="psalmRef">시편 1편</div>
          </div>
          <div class="verse-content" id="psalmVerse">말씀을 불러오는 중...</div>
        </div>

        <div class="info-card">
          <div class="info-card-content">
            💬 해당하는 성경을 읽고 마음에 와 닿는 문장을 짧게 카톡방에
            올려주시면 됩니다.
          </div>
        </div>
      </div>

      <div class="navigation" id="navigationSection">
        <button class="nav-button" id="prevBtn">← 이전</button>
        <button class="save-image-button" id="saveImageBtn">
          📷 이미지 저장
        </button>
        <button class="nav-button" id="nextBtn">다음 →</button>
      </div>

      <div class="date-picker-section" id="datePickerSection">
        <label for="datePicker" class="date-picker-button">
          📅 날짜 선택
          <input type="date" id="datePicker" />
        </label>
      </div>

      <div class="upload-section" id="uploadSection">
        <input type="file" id="fileInput" accept=".json" />
        <button
          class="upload-button"
          onclick="document.getElementById('fileInput').click()"
        >
          📁 JSON 파일 업로드
        </button>
        <div class="upload-status" id="uploadStatus"></div>
      </div>
    </div>

    <script>
      // ==================== 데이터 ====================
      const verses = {
        "1월 1일": {
          bible: "요한 1서 1장",
          bible_verse_1:
            "생명의 말씀에 관하여 우리는 들었고 눈으로 보았습니다.",
          psalm: "시편 1편",
          psalm_verse_1: "행복하여라! 악인들의 뜻에 따라 걷지 않는 사람!",
        },
        "1월 2일": {
          bible: "요한 1서 2장",
          bible_verse_1:
            "나의 자녀들이여, 내가 이것을 여러분에게 쓰는 것은 여러분이 죄를 짓지 않게 하려는 것입니다.",
          psalm: "시편 2편",
          psalm_verse_1:
            "어찌하여 민족들이 소란을 피우며 나라들이 헛된 일을 꾸미는가?",
        },
        "1월 3일": {
          bible: "요한 1서 3장",
          bible_verse_1:
            "보십시오, 하느님 아버지께서 우리에게 얼마나 큰 사랑을 베푸셨는지!",
          psalm: "시편 3편",
          psalm_verse_1: "주님, 저를 괴롭히는 자들이 어찌 이리 많습니까?",
        },
        "1월 4일": {
          bible: "요한 1서 4장",
          bible_verse_1:
            "사랑하는 여러분, 하느님께서 우리를 그토록 사랑하셨으니 우리도 서로 사랑해야 합니다.",
          psalm: "시편 4편",
          psalm_verse_1:
            "내가 부르짖을 때 응답해 주소서, 나의 의로우신 하느님!",
        },
        "1월 5일": {
          bible: "요한 1서 5장",
          bible_verse_1:
            "예수님께서 그리스도이심을 믿는 사람은 누구나 하느님에게서 태어난 사람입니다.",
          psalm: "시편 5편",
          psalm_verse_1:
            "주님, 제 말씀에 귀를 기울이시고 제 신음을 헤아려 주소서.",
        },
      };

      let currentDate = new Date();
      let dateKeys = Object.keys(verses);

      function formatDateToKey(date) {
        return `${date.getMonth() + 1}월 ${date.getDate()}일`;
      }

      function formatDateDisplay(date) {
        const days = [
          "일요일",
          "월요일",
          "화요일",
          "수요일",
          "목요일",
          "금요일",
          "토요일",
        ];
        return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일 ${days[date.getDay()]}`;
      }

      function findDateIndex(dateKey) {
        const index = dateKeys.indexOf(dateKey);
        return index !== -1 ? index : 0;
      }

      let currentIndex = findDateIndex(formatDateToKey(currentDate));

      function updateDateCardColor(date) {
        const dateCard = document.getElementById("dateCard");
        dateCard.classList.remove("weekday", "saturday", "sunday");
        const d = date.getDay();
        if (d === 0) dateCard.classList.add("sunday");
        else if (d === 6) dateCard.classList.add("saturday");
        else dateCard.classList.add("weekday");
      }

      function loadVerse(index) {
        const container = document.getElementById("cardsContainer");
        container.classList.remove("fade-in");
        setTimeout(() => {
          const key = dateKeys[index];
          const data = verses[key] || {};
          document.getElementById("dateDisplay").textContent =
            formatDateDisplay(currentDate);
          updateDateCardColor(currentDate);
          document.getElementById("bibleRef").textContent = data.bible || "";
          document.getElementById("bibleVerse").textContent =
            data.bible_verse_1 || "말씀이 없습니다.";
          document.getElementById("psalmRef").textContent = data.psalm || "";
          document.getElementById("psalmVerse").textContent =
            data.psalm_verse_1 || "말씀이 없습니다.";
          updateDatePicker();
          container.classList.add("fade-in");
        }, 50);
      }

      function updateDatePicker() {
        const y = currentDate.getFullYear();
        const m = String(currentDate.getMonth() + 1).padStart(2, "0");
        const d = String(currentDate.getDate()).padStart(2, "0");
        document.getElementById("datePicker").value = `${y}-${m}-${d}`;
      }

      // ==================== 이벤트 ====================
      document.getElementById("prevBtn").addEventListener("click", () => {
        if (currentIndex > 0) {
          currentIndex--;
          currentDate.setDate(currentDate.getDate() - 1);
          loadVerse(currentIndex);
        }
      });

      document.getElementById("nextBtn").addEventListener("click", () => {
        if (currentIndex < dateKeys.length - 1) {
          currentIndex++;
          currentDate.setDate(currentDate.getDate() + 1);
          loadVerse(currentIndex);
        }
      });

      document
        .getElementById("datePicker")
        .addEventListener("change", function (e) {
          const selectedDate = new Date(e.target.value + "T00:00:00");
          const dateKey = formatDateToKey(selectedDate);
          const index = findDateIndex(dateKey);
          if (index !== -1) {
            currentDate = selectedDate;
            currentIndex = index;
            loadVerse(currentIndex);
          } else {
            alert(`${dateKey}의 말씀이 준비되지 않았습니다.`);
          }
        });

      document
        .getElementById("fileInput")
        .addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function (event) {
            try {
              const jsonData = JSON.parse(event.target.result);
              if (Array.isArray(jsonData)) {
                jsonData.forEach((item) => {
                  if (item.date)
                    verses[item.date] = {
                      bible: item.bible || "",
                      bible_verse_1: item.bible_verse_1 || "",
                      psalm: item.psalm || "",
                      psalm_verse_1: item.psalm_verse_1 || "",
                    };
                });
              } else if (typeof jsonData === "object") {
                Object.assign(verses, jsonData);
              }
              dateKeys.length = 0;
              dateKeys.push(...Object.keys(verses));
              currentDate = new Date();
              currentIndex = findDateIndex(formatDateToKey(currentDate));
              loadVerse(currentIndex);
              document.getElementById("uploadStatus").textContent =
                `✅ ${dateKeys.length}일의 말씀이 로드되었습니다!`;
              setTimeout(() => {
                document.getElementById("uploadStatus").textContent = "";
              }, 3000);
            } catch (error) {
              document.getElementById("uploadStatus").textContent =
                "❌ 파일을 읽는데 실패했습니다. JSON 형식을 확인해주세요.";
            }
          };
          reader.readAsText(file);
        });

      async function loadVersesFromFile() {
        try {
          const response = await fetch("verses.json");
          if (!response.ok) return;
          const jsonData = await response.json();
          if (Array.isArray(jsonData)) {
            jsonData.forEach((item) => {
              if (item.date) verses[item.date] = { ...item };
            });
          } else {
            Object.assign(verses, jsonData);
          }
          dateKeys.length = 0;
          dateKeys.push(...Object.keys(verses));
          currentDate = new Date();
          currentIndex = findDateIndex(formatDateToKey(currentDate));
          loadVerse(currentIndex);
        } catch (e) {}
      }
      loadVersesFromFile();

      // ==================== ✅ 완전 재작성: 고화질 이미지 저장 ====================
      document
        .getElementById("saveImageBtn")
        .addEventListener("click", async function () {
          const btn = this;
          const originalText = btn.innerHTML;
          btn.disabled = true;
          btn.innerHTML = "⏳ 저장 중...";
          btn.style.opacity = "0.7";

          // ── 1. 캡처에서 제외할 요소들을 display:none으로 숨기기 ──
          const hideTargets = [
            document.getElementById("navigationSection"),
            document.getElementById("datePickerSection"),
            document.getElementById("uploadSection"),
          ];
          const savedDisplays = hideTargets.map((el) => {
            if (!el) return "";
            const prev = el.style.display;
            el.style.display = "none";
            return prev;
          });

          // ── 2. 렌더링 반영 대기 (2프레임) ──
          await new Promise((r) =>
            requestAnimationFrame(() => requestAnimationFrame(r)),
          );

          // ── 3. 실제 화면의 컨테이너를 직접 캡처 ──
          const captureTarget = document.getElementById("mainContainer");

          // 💡 현재 요소의 실제 렌더링 크기를 가져옵니다.
          const targetWidth = captureTarget.offsetWidth;
          const targetHeight = captureTarget.offsetHeight;

          try {
            const dataUrl = await htmlToImage.toPng(captureTarget, {
              pixelRatio: 4,
              quality: 1.0,
              backgroundColor: "#f5f7fa",
              cacheBust: true,
              skipFonts: false,

              // 👇 [해결책 1] 최종 캡처 이미지의 캔버스 크기를 상하좌우 10px씩(총 20px) 늘립니다.
              width: targetWidth + 20,
              height: targetHeight + 20,

              style: {
                padding: "10px",
                // 👇 [해결책 2] 패딩이 들어갈 공간을 확보하기 위해 CSS 속성을 강제로 재정의합니다.
                width: targetWidth + 20 + "px",
                maxWidth: "none", // 원래 있던 max-width: 550px 제한을 캡처 시에만 해제
                boxSizing: "border-box", // 늘어난 width 안에 padding이 안정적으로 포함되도록 설정
                margin: "0", // 중앙 정렬용 여백이 캡처 화면에 영향을 주지 않도록 리셋
              },
            });

            // ── 4. 다운로드 ──
            const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}-${String(currentDate.getDate()).padStart(2, "0")}`;
            const link = document.createElement("a");
            link.download = `오늘의_말씀_${dateStr}.png`;
            link.href = dataUrl;
            link.click();

            showToast("✅ 고화질 이미지가 저장되었습니다!");
          } catch (err) {
            console.error("이미지 저장 실패:", err);
            showToast("❌ 저장 실패. Chrome 최신 버전에서 시도해주세요.", true);
          } finally {
            // ── 5. 숨긴 요소 원상 복구 (오류가 나도 반드시 실행) ──
            hideTargets.forEach((el, i) => {
              if (el) el.style.display = savedDisplays[i];
            });
            btn.disabled = false;
            btn.innerHTML = originalText;
            btn.style.opacity = "1";
          }
        });

      // ==================== 토스트 메시지 ====================
      function showToast(message, isError = false) {
        const toast = document.createElement("div");
        toast.textContent = message;
        toast.style.cssText = `
          position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
          background: ${isError ? "#e74c3c" : "#2c3e50"};
          color: white; padding: 16px 28px; border-radius: 14px;
          font-weight: 600; font-size: 15px;
          box-shadow: 0 15px 40px rgba(0,0,0,0.3);
          z-index: 10000; opacity: 0; transition: opacity 0.3s ease;
          white-space: nowrap;
        `;
        document.body.appendChild(toast);
        setTimeout(() => (toast.style.opacity = "1"), 10);
        setTimeout(() => {
          toast.style.opacity = "0";
          setTimeout(() => toast.remove(), 400);
        }, 2800);
      }

      // 초기 로드
      loadVerse(currentIndex);
      updateDatePicker();
    </script>
  </body>
</html>
