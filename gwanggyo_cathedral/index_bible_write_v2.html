<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>성경 통독 기록장</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --p: #6a826c;
        --pd: #4c604e;
        --plt: #e8efe9;
        --gold: #d4b872;
        --bg: #f7f6f2;
        --bg2: #efece5;
        --card: #ffffff;
        --txt: #2c302b;
        --txt2: #757a73;
        --bdr: #e0ddd6;
        --ok: #5b8a6a;
        --err: #c25953;
        --adm: #645c8a;
        --adm-d: #48406b;
        --r: 14px;
        --sh: 0 4px 20px rgba(0, 0, 0, 0.05);
      }
      body.dark {
        --p: #8ba88e;
        --pd: #a5c2a8;
        --plt: #2a302b;
        --bg: #1a1b1a;
        --bg2: #242623;
        --card: #2c2e2b;
        --txt: #e4e6e3;
        --txt2: #9fa49d;
        --bdr: #3e423d;
        --ok: #6eab81;
        --err: #d96a63;
        --adm: #8a81b8;
        --adm-d: #6c6494;
        --sh: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      body {
        font-family:
          "Pretendard",
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--txt);
        min-height: 100vh;
        padding-bottom: 72px;
        max-width: 620px;
        margin: 0 auto;
        position: relative;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.08);
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* 로그인 화면 */
      .login-bg {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        padding: 20px;
      }
      .login-box {
        background: var(--card);
        border-radius: 24px;
        padding: 40px 32px;
        width: 100%;
        max-width: 380px;
        box-shadow: var(--sh);
        border: 1px solid var(--bdr);
      }
      .login-brand {
        text-align: center;
        margin-bottom: 30px;
      }
      .login-brand .cross {
        font-size: 36px;
        margin-bottom: 12px;
      }
      .login-brand h1 {
        font-family: "Nanum Myeongjo", serif;
        font-size: 24px;
        color: var(--p);
        font-weight: 800;
      }
      .login-brand p {
        font-size: 14px;
        color: var(--txt2);
        margin-top: 6px;
      }
      .lf {
        margin-bottom: 16px;
      }
      .ll {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--txt2);
        margin-bottom: 6px;
      }
      .li {
        width: 100%;
        padding: 13px 14px;
        border: 1.5px solid var(--bdr);
        border-radius: 12px;
        font-size: 15px;
        background: var(--bg2);
        color: var(--txt);
        outline: none;
        transition: all 0.2s;
      }
      .li:focus {
        border-color: var(--p);
        background: var(--card);
        box-shadow: 0 0 0 3px var(--plt);
      }
      .login-err {
        font-size: 13px;
        color: var(--err);
        min-height: 18px;
        margin-bottom: 10px;
        text-align: center;
      }
      .login-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: var(--p);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
      }
      .login-btn:hover {
        background: var(--pd);
      }
      .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* 헤더 & 싱크바 */
      .hdr {
        background: var(--card);
        color: var(--txt);
        padding: 24px 16px 16px;
        text-align: center;
        position: relative;
        border-bottom: 1px solid var(--bdr);
      }
      .hdr h1 {
        font-family: "Nanum Myeongjo", serif;
        font-size: 20px;
        font-weight: 800;
        color: var(--p);
      }
      .hdr p {
        font-size: 13px;
        color: var(--txt2);
        margin-top: 4px;
      }
      .hdr-l {
        position: absolute;
        top: 18px;
        left: 12px;
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .hdr-r {
        position: absolute;
        top: 18px;
        right: 12px;
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .ib {
        background: var(--bg2);
        border: 1px solid var(--bdr);
        color: var(--txt);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      .ib:hover {
        background: var(--bdr);
      }
      .user-chip {
        background: var(--plt);
        border: 1px solid var(--p);
        color: var(--pd);
        border-radius: 18px;
        padding: 4px 12px;
        font-size: 13px;
        font-weight: 600;
      }
      body.dark .user-chip {
        color: var(--txt);
      }

      .sync-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 600;
        background: var(--bg2);
        border-bottom: 1px solid var(--bdr);
      }
      .sync-bar.ok {
        background: #e8f0ea;
        color: #3f6b4c;
      }
      .sync-bar.error {
        background: #fceeea;
        color: var(--err);
      }
      body.dark .sync-bar.ok {
        background: #26362b;
        color: #7bc092;
      }
      body.dark .sync-bar.error {
        background: #3d2524;
        color: #e67a73;
      }
      .sd {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
      .sd.spin {
        border-radius: 50%;
        border: 2px solid currentColor;
        border-top-color: transparent;
        background: transparent;
        animation: spin 1s linear infinite;
      }

      .cfg-panel {
        display: none;
        background: var(--card);
        border-bottom: 1px solid var(--bdr);
        padding: 16px;
      }
      .cfg-panel.open {
        display: block;
      }
      .url-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .url-inp {
        flex: 1;
        padding: 10px 12px;
        border: 1.5px solid var(--bdr);
        border-radius: 10px;
        font-size: 13px;
        background: var(--bg2);
        color: var(--txt);
      }
      .btn-conn {
        padding: 10px 16px;
        background: var(--p);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }

      /* 공통 & 통계 & 달력 */
      .sec {
        padding: 16px;
      }
      .card {
        background: var(--card);
        padding: 18px;
        border-radius: var(--r);
        border: 1px solid var(--bdr);
        margin-bottom: 14px;
        box-shadow: var(--sh);
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 14px;
      }
      .stat-box {
        background: var(--card);
        padding: 14px 8px;
        border-radius: var(--r);
        border: 1px solid var(--bdr);
        text-align: center;
        box-shadow: var(--sh);
      }
      .stat-v {
        font-size: 24px;
        font-weight: 800;
        color: var(--p);
      }
      .stat-l {
        font-size: 12px;
        font-weight: 500;
        color: var(--txt2);
        margin-top: 4px;
      }

      .cal-hdr {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .cal-nav {
        background: var(--bg2);
        border: 1px solid var(--bdr);
        color: var(--txt);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
      }
      .cal-mo {
        font-size: 16px;
        font-weight: 700;
      }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 4px;
        width: 100%;
      }
      .cal-dh {
        text-align: center;
        padding: 6px 0;
        font-size: 11px;
        font-weight: 600;
        color: var(--txt2);
      }
      .cal-day {
        position: relative;
        width: 100%;
        padding-bottom: 100%;
        background: var(--bg);
        border-radius: 8px;
        cursor: pointer;
      }
      .cal-day-inner {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 500;
      }
      .cal-day.empty {
        background: transparent;
      }
      .cal-day.today {
        border-color: var(--p);
        font-weight: 700;
      }
      .cal-day.rec {
        background: var(--plt);
        border-color: var(--p);
      }
      .cal-day.rec .cal-day-inner {
        color: var(--pd);
        font-weight: 700;
      }
      body.dark .cal-day.rec .cal-day-inner {
        color: var(--txt);
      }
      .cal-ck {
        font-size: 12px;
        margin-top: 2px;
        color: var(--p);
        line-height: 1;
      }

      /* 폼 */
      .edit-banner {
        background: var(--plt);
        border: 1px solid var(--p);
        border-radius: var(--r);
        padding: 12px 16px;
        margin-bottom: 14px;
        display: none;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--pd);
        font-weight: 600;
      }
      body.dark .edit-banner {
        color: var(--txt);
      }
      .edit-banner.on {
        display: flex;
      }
      .cancel-edit {
        margin-left: auto;
        background: var(--card);
        border: 1px solid var(--p);
        color: var(--pd);
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 14px;
        cursor: pointer;
      }
      .fg {
        margin-bottom: 16px;
      }
      .fl {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 13px;
        color: var(--txt2);
      }
      .fi,
      .fs,
      .ft {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--bdr);
        border-radius: 10px;
        font-size: 15px;
        background: var(--bg2);
        color: var(--txt);
        font-family: "Pretendard", sans-serif;
        outline: none;
      }
      .fi:focus,
      .fs:focus,
      .ft:focus {
        border-color: var(--p);
        background: var(--card);
      }
      .ft {
        min-height: 90px;
        resize: vertical;
      }
      .btn-save {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: var(--p);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      /* 목록 카드 */
      .rec-card {
        background: var(--card);
        border: 1px solid var(--bdr);
        border-radius: var(--r);
        padding: 20px;
        margin-bottom: 14px;
        position: relative;
        box-shadow: var(--sh);
      }
      .rc-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
      }
      .rc-date {
        font-size: 13px;
        font-weight: 600;
        color: var(--txt2);
        background: var(--bg2);
        padding: 4px 10px;
        border-radius: 6px;
      }
      .rc-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--txt);
        margin-bottom: 12px;
      }
      .rc-verse-band {
        background: var(--bg);
        border-left: 4px solid var(--p);
        padding: 14px 16px;
        margin: 0 0 14px 0;
        border-radius: 4px 8px 8px 4px;
        font-size: 15px;
        line-height: 1.6;
        font-weight: 500;
      }
      .rc-med {
        color: var(--txt);
        line-height: 1.7;
        font-size: 15px;
        margin-bottom: 14px;
        white-space: pre-wrap;
      }
      .rc-acts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 16px;
        border-top: 1px dashed var(--bdr);
        padding-top: 16px;
      }
      .btn-edit,
      .btn-del {
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
        color: #fff;
      }
      .btn-edit {
        background: var(--p);
      }
      .btn-del {
        background: #a06c69;
      }
      .fav-btn {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
      }

      .srch-wrap {
        position: relative;
        margin-bottom: 14px;
      }
      .srch-inp {
        width: 100%;
        padding: 12px 14px 12px 38px;
        border: 1.5px solid var(--bdr);
        border-radius: 12px;
        font-size: 14px;
        background: var(--card);
        color: var(--txt);
      }
      .srch-ico {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        opacity: 0.5;
      }
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--txt2);
        font-weight: 500;
      }
      .pagination {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 20px;
        flex-wrap: wrap;
      }
      .page-btn {
        padding: 8px 14px;
        border: 1px solid var(--bdr);
        background: var(--card);
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        color: var(--txt2);
        font-size: 14px;
      }
      .page-btn.on {
        background: var(--p);
        color: #fff;
        border-color: var(--p);
      }

      /* 관리자 등 기타 */
      .hdr.adm-hdr {
        border-bottom-color: var(--adm);
      }
      .hdr.adm-hdr h1 {
        color: var(--adm);
      }
      .user-card {
        background: var(--card);
        border: 1px solid var(--bdr);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 10px;
        display: flex;
        gap: 12px;
        align-items: center;
        box-shadow: var(--sh);
      }
      .uc-info {
        flex: 1;
      }
      .uc-name {
        font-size: 15px;
        font-weight: 700;
      }
      .uc-meta {
        font-size: 12px;
        color: var(--txt2);
        margin-top: 4px;
      }
      .badge-adm {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 12px;
        background: var(--adm);
        color: #fff;
        margin-left: 6px;
        font-weight: 600;
      }
      .bsm {
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
      }
      .bsm-e {
        background: var(--p);
      }
      .bsm-d {
        background: #a06c69;
      }

      .page {
        display: none;
      }
      .page.on {
        display: block;
      }
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 620px;
        background: var(--card);
        border-top: 1px solid var(--bdr);
        display: flex;
        padding-bottom: env(safe-area-inset-bottom);
        z-index: 100;
      }
      .tab-btn {
        flex: 1;
        background: none;
        border: none;
        padding: 14px 0;
        font-size: 20px;
        color: var(--txt2);
        cursor: pointer;
        opacity: 0.5;
        transition: all 0.2s;
      }
      .tab-btn.on {
        color: var(--p);
        opacity: 1;
      }
      .tab-btn span {
        display: block;
        font-size: 11px;
        font-weight: 700;
        margin-top: 6px;
      }
      .toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(44, 48, 43, 0.9);
        color: #fff;
        padding: 12px 24px;
        border-radius: 24px;
        font-size: 14px;
        font-weight: 600;
        z-index: 1000;
        opacity: 0;
        transition: all 0.3s;
        pointer-events: none;
        white-space: nowrap;
        max-width: 580px;
      }
      .toast.show {
        opacity: 1;
      }
      body.dark .toast {
        background: rgba(228, 230, 227, 0.9);
        color: #1a1b1a;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
        padding: 20px;
      }
      .modal-box {
        background: var(--card);
        border-radius: 20px;
        width: 100%;
        max-width: 340px;
        padding: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }
      .modal-btns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 20px;
      }
      .mbtn {
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        border: none;
      }
      .mbtn-cancel {
        background: var(--bg2);
        color: var(--txt);
      }
      .mbtn-adm {
        background: var(--adm);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="loginScreen">
      <div class="login-bg">
        <div class="login-box">
          <div class="login-brand">
            <div class="cross">🌿</div>
            <h1>성경 통독 기록장</h1>
          </div>
          <form onsubmit="doLogin(event)">
            <div class="lf">
              <label class="ll">아이디</label
              ><input id="loginId" class="li" type="text" required />
            </div>
            <div class="lf">
              <label class="ll">비밀번호</label
              ><input id="loginPw" class="li" type="password" required />
            </div>
            <div class="login-err" id="loginErr"></div>
            <button id="loginBtn" class="login-btn" type="submit">
              로그인
            </button>
          </form>
        </div>
      </div>
    </div>

    <div id="appScreen" style="display: none">
      <div class="sync-bar" id="syncBar">
        <div class="sd" id="syncDot"></div>
        <span id="syncTxt">연결 대기중...</span>
      </div>
      <div class="cfg-panel" id="cfgPanel">
        <h3 style="font-size: 15px; margin-bottom: 10px">⚙️ GAS 연동 주소</h3>
        <div class="url-row">
          <input class="url-inp" id="gasUrlInput" type="text" /><button
            class="btn-conn"
            onclick="connectGAS()"
          >
            연결
          </button>
        </div>
      </div>

      <div class="page on" id="pgHome">
        <div class="hdr">
          <div class="hdr-l">
            <button class="ib" onclick="toggleDark()">🌓</button>
          </div>
          <div class="hdr-r">
            <div class="user-chip" id="userChip"></div>
            <button class="ib" onclick="toggleCfg()">⚙️</button>
          </div>
          <h1>성경통독 기록장</h1>
          <p>나의 통독 요약</p>
        </div>
        <div class="sec">
          <div class="stat-grid">
            <div class="stat-box">
              <div class="stat-v" id="stTotal">0</div>
              <div class="stat-l">전체</div>
            </div>
            <div class="stat-box">
              <div class="stat-v" id="stMonth">0</div>
              <div class="stat-l">이번 달</div>
            </div>
            <div class="stat-box">
              <div class="stat-v" id="stStreak">0</div>
              <div class="stat-l">🔥 연속</div>
            </div>
            <div class="stat-box">
              <div class="stat-v" id="stFav">0</div>
              <div class="stat-l">⭐ 즐겨찾기</div>
            </div>
          </div>
          <div class="card">
            <div class="cal-hdr">
              <button class="cal-nav" onclick="chgHomeMo(-1)">◀</button>
              <div class="cal-mo" id="homeMoLabel"></div>
              <button class="cal-nav" onclick="chgHomeMo(1)">▶</button>
            </div>
            <div class="cal-grid" id="homeCal"></div>
          </div>
        </div>
      </div>

      <div class="page" id="pgWrite">
        <div class="hdr"><h1>✍️ 기록하기</h1></div>
        <div class="sec">
          <div class="edit-banner" id="editBanner">
            ✏️ 수정 중<button class="cancel-edit" onclick="cancelEdit()">
              취소
            </button>
          </div>
          <div class="card">
            <form id="writeForm" onsubmit="saveRecord(event)">
              <div class="fg">
                <label class="fl">📅 날짜 (필수)</label

    <script>
      const $ = (id) => document.getElementById(id);
      let me = null,
        gasUrl = "",
        gasOk = false;
      let recs = [],
        adminUsers = [];
      let homeY,
        homeMo,
        editId = null,
        umEditId = null;
      let listY,
        listMo,
        listPage = 1;
      const listPerPage = 5;

      function getLocalToday() {
        const d = new Date(),
          offset = d.getTimezoneOffset() * 60000;
        return new Date(d.getTime() - offset).toISOString().slice(0, 10);
      }

      // ★ 에러 원인 차단: 더 강력해진 GAS 통신 함수
      async function gasCall(payload, isGet = false) {
        if (!gasUrl) throw new Error("GAS 주소가 설정되지 않았습니다.");
        payload.token = localStorage.getItem("bb_token") || "";
        payload.userId = localStorage.getItem("bb_uid") || "";
        if (
          ["userList", "userAdd", "userUpdate", "userDelete"].includes(
            payload.action,
          )
        )
          payload.adminId = payload.userId;

        const ctl = new AbortController(),
          tmr = setTimeout(() => ctl.abort(), 15000);
        try {
          // GitHub Pages에서의 CORS 및 리다이렉트를 확실히 허용
          const opt = isGet
            ? { redirect: "follow" }
            : {
                method: "POST",
                body: JSON.stringify(payload),
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                redirect: "follow",
              };
          const url = isGet
            ? `${gasUrl}?${new URLSearchParams(payload)}`
            : gasUrl;
          const res = await fetch(url, opt);
          clearTimeout(tmr);

          if (!res.ok) throw new Error(`HTTP ${res.status} 에러`);
          const json = await res.json();
          if (!json.ok) throw new Error(json.error || "GAS 반환 에러");
          return json.data;
        } catch (e) {
          clearTimeout(tmr);
          throw e;
        }
      }

      async function doLogin(e) {
        e.preventDefault();
        const id = $("loginId").value.trim(),
          pw = $("loginPw").value.trim(),
          btn = $("loginBtn");
        btn.disabled = true;
        btn.textContent = "확인 중...";
        try {
          const data = await gasCall({ action: "userAuth", id, pw });
          me = data;
          localStorage.setItem("bb_uid", me.id);
          localStorage.setItem("bb_token", me.token);
          localStorage.setItem("bb_me", JSON.stringify(me));
          loginOk();
        } catch (err) {
          $("loginErr").textContent = "로그인 실패: " + err.message;
        } finally {
          btn.disabled = false;
          btn.textContent = "로그인";
        }
      }

      function loginOk() {
        $("loginScreen").style.display = "none";
        $("appScreen").style.display = "block";
        $("userChip").textContent = me.baptism
          ? `${me.name} (${me.baptism})`
          : me.name;
        $("tabAdmin").style.display = me.role === "admin" ? "block" : "none";

        const d = new Date(getLocalToday());
        homeY = listY = d.getFullYear();
        homeMo = listMo = d.getMonth() + 1;
        $("fDate").value = getLocalToday();
        fetchFromGAS();
        goPage("Home");
      }

      function doLogout() {
        if (confirm("안전하게 로그아웃 하시겠습니까?")) {
          localStorage.clear();
          location.reload();
        }
      }

      (async function init() {
        if (localStorage.getItem("bb_dark") === "1") toggleDark(true);
        try {
          const res = await fetch("./index_bible_write_gas.json");
          if (res.ok) gasUrl = (await res.json()).gas_url;
        } catch (e) {}
        if (!gasUrl) gasUrl = localStorage.getItem("bb_gas") || "";
        if (gasUrl) {
          $("gasUrlInput").value = gasUrl;
          gasOk = true;
        }

        const storedMe = localStorage.getItem("bb_me"),
          token = localStorage.getItem("bb_token");
        if (storedMe && token && gasOk) {
          me = JSON.parse(storedMe);
          loginOk();
        }
      })();

      // ★ 핵심 해결: 데이터 로드 시 빈 행 무시 & 한국어 시간 텍스트 제거
      async function fetchFromGAS() {
        try {
          setSyncBar("syncing", "데이터 로딩중...");
          let data = await gasCall({ action: "list" }, true);

          recs = Array.isArray(data)
            ? data
                .map((r) => {
                  if (!r || !r.id) return null; // 💡 에러 원인 1: 시트의 빈 행 데이터 무시

                  let dStr = String(r.date || "");
                  // 💡 에러 원인 2: (한국 표준시) 같은 괄호 텍스트를 제거하여 Date 파싱 오류 원천 차단
                  let cleanDateStr = dStr.replace(/\s*\(.*\)$/, "").trim();

                  if (
                    cleanDateStr.includes("GMT") ||
                    cleanDateStr.includes("T") ||
                    cleanDateStr.length > 10
                  ) {
                    const d = new Date(cleanDateStr);
                    if (!isNaN(d)) {
                      r.date = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
                    }
                  }
                  return r;
                })
                .filter((r) => r !== null)
            : []; // null로 반환된 쓰레기 데이터는 목록에서 완전 제거

          setSyncBar("ok", "✓ 동기화 완료");
          refresh();
        } catch (e) {
          console.error("fetchFromGAS 에러:", e);
          setSyncBar(
            "error",
            e.message.includes("Failed to fetch")
              ? "⚠️ 통신/CORS 에러"
              : "⚠️ 데이터 에러",
          );
        }
      }

      async function saveRecord(e) {
        e.preventDefault();
        $("btnSave").disabled = true;
        const isFav = $("fFav").checked;
        const data = {
          id: editId || Date.now().toString(),
          date: $("fDate").value,
          book: $("fBook").value,
          chapter: $("fChapter").value,
          verse: $("fVerse").value,
          verseText: $("fVerseText").value,
          meditation: $("fMed").value,
          favorite: isFav,
        };
        try {
          await gasCall({ action: editId ? "update" : "add", record: data });
          editId = null;
          $("writeForm").reset();
          $("fDate").value = getLocalToday();
          fetchFromGAS();
          goPage("Home");
          toast("✅ 저장 완료!");
        } catch (err) {
          toast("⚠️ 저장 실패");
        } finally {
          $("btnSave").disabled = false;
        }
      }

      function toggleFav(id, curVal) {
        const newVal = !curVal,
          r = recs.find((x) => x.id === id);
        if (r) r.favorite = newVal;
        renderList(listPage);
        gasCall({ action: "fav", id, favorite: newVal })
          .then(() => fetchFromGAS())
          .catch((e) => {
            if (r) r.favorite = curVal;
            renderList(listPage);
            toast("❌ 변경 실패");
          });
      }

      function delRecord(id) {
        if (confirm("삭제할까요?"))
          gasCall({ action: "delete", id }).then(() => fetchFromGAS());
      }
      function startEdit(id) {
        const r = recs.find((x) => x.id === id);
        if (!r) return;
        editId = id;
        $("fDate").value = r.date;
        $("fBook").value = r.book;
        $("fChapter").value = r.chapter;
        $("fVerse").value = r.verse || "";
        $("fVerseText").value = r.verseText || "";
        $("fMed").value = r.meditation || "";
        $("fFav").checked = r.favorite === true || r.favorite === "true";
        goPage("Write");
        $("editBanner").classList.add("on");
      }
      function cancelEdit() {
        editId = null;
        $("writeForm").reset();
        $("editBanner").classList.remove("on");
        $("fDate").value = getLocalToday();
      }

      function refresh() {
        const curMo = `${homeY}-${String(homeMo).padStart(2, "0")}`;
        $("stTotal").textContent = recs.length;
        $("stMonth").textContent = recs.filter((r) =>
          r.date.startsWith(curMo),
        ).length;
        $("stFav").textContent = recs.filter(
          (r) => r.favorite === true || r.favorite === "true",
        ).length;
        let streak = 0;
        if (recs.length > 0) {
          const sorted = [...recs]
            .map((r) => r.date)
            .sort()
            .reverse();
          let prev = new Date(sorted[0]);
          streak = 1;
          for (let i = 1; i < sorted.length; i++) {
            let d = new Date(sorted[i]),
              diff = (prev - d) / 86400000;
            if (diff === 1) {
              streak++;
              prev = d;
            } else if (diff > 1) break;
          }
        }
        $("stStreak").textContent = streak;
        renderHomeCal();
        renderList(1);
      }

      function renderHomeCal() {
        $("homeMoLabel").textContent = `${homeY}년 ${homeMo}월`;
        const wrap = $("homeCal");
        wrap.innerHTML = "";
        ["일", "월", "화", "수", "목", "금", "토"].forEach((d) => {
          let div = document.createElement("div");
          div.className = "cal-dh";
          div.textContent = d;
          wrap.appendChild(div);
        });
        const fDate = new Date(homeY, homeMo - 1, 1).getDay(),
          lDate = new Date(homeY, homeMo, 0).getDate(),
          todayStr = getLocalToday();
        for (let i = 0; i < fDate; i++) {
          let e = document.createElement("div");
          e.className = "cal-day empty";
          wrap.appendChild(e);
        }
        for (let d = 1; d <= lDate; d++) {
          let y_m_d = `${homeY}-${String(homeMo).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          let isToday = y_m_d === todayStr,
            hasRec = recs.some((r) => r.date === y_m_d);
          let cell = document.createElement("div");
          cell.className = `cal-day ${isToday ? "today" : ""} ${hasRec ? "rec" : ""}`;
          cell.innerHTML = `<div class="cal-day-inner">${d}${hasRec ? `<div class="cal-ck">●</div>` : ""}</div>`;
          wrap.appendChild(cell);
        }
      }

      function renderList(page = 1) {
        listPage = page;
        $("listMoLabel").textContent = `${listY}년 ${listMo}월`;
        const wrap = $("recList");
        wrap.innerHTML = "";
        let arr = recs
          .filter((r) =>
            r.date.startsWith(`${listY}-${String(listMo).padStart(2, "0")}`),
          )
          .sort((a, b) => b.date.localeCompare(a.date));
        const kw = $("srchInput").value.trim().toLowerCase();
        if (kw)
          arr = arr.filter((r) =>
            (r.book + r.chapter + r.verse + (r.verseText || "") + r.meditation)
              .toLowerCase()
              .includes(kw),
          );

        if (arr.length === 0) {
          wrap.innerHTML = `<div class="empty">기록이 없습니다.</div>`;
          return;
        }

        const totalPages = Math.ceil(arr.length / listPerPage);
        arr
          .slice((listPage - 1) * listPerPage, listPage * listPerPage)
          .forEach((r) => {
            const isFav = r.favorite === true || r.favorite === "true";
            const card = document.createElement("div");
            card.className = "rec-card";
            card.innerHTML = `
            <div class="rc-header"><div class="rc-date">🗓️ ${r.date}</div><button class="fav-btn" onclick="toggleFav('${r.id}', ${isFav})">${isFav ? "⭐" : "☆"}</button></div>
            <div class="rc-title">${r.book} ${r.chapter}장${r.verse ? ` ${r.verse}절` : ""}</div>
            ${r.verseText ? `<div class="rc-verse-band">"${r.verseText}"</div>` : ""}
            ${r.meditation ? `<div class="rc-med">${r.meditation}</div>` : ""}
            <div class="rc-acts"><button class="btn-edit" onclick="startEdit('${r.id}')">수정</button><button class="btn-del" onclick="delRecord('${r.id}')">삭제</button></div>
          `;
            wrap.appendChild(card);
          });

        if (totalPages > 1) {
          let pageHtml = `<div class="pagination">`;
          for (let i = 1; i <= totalPages; i++)
            pageHtml += `<button class="page-btn ${i === listPage ? "on" : ""}" onclick="renderList(${i})">${i}</button>`;
          wrap.innerHTML += pageHtml + `</div>`;
        }
      }

      /* 프로필 및 기타 공통 함수들 */
      async function updateProfile(e) {
        e.preventDefault();
        const btn = e.target.querySelector("button");
        btn.disabled = true;
        const u = {
          id: me.id,
          pw: $("pPw").value,
          name: $("pName").value,
          baptism: $("pBaptism").value,
          role: me.role,
        };
        try {
          await gasCall({ action: "userUpdate", user: u });
          toast("✅ 수정 완료");
          me.name = u.name;
          me.baptism = u.baptism;
          localStorage.setItem("bb_me", JSON.stringify(me));
          $("userChip").textContent = me.baptism
            ? `${me.name} (${me.baptism})`
            : me.name;
          $("pPw").value = "";
        } catch (err) {
          toast("❌ 실패");
        } finally {
          btn.disabled = false;
        }
      }
      async function fetchAdminUsers() {
        if (me.role !== "admin") return;
        try {
          adminUsers = await gasCall({ action: "userList" }, true);
          renderAdminUsers();
        } catch (e) {}
      }
      function renderAdminUsers() {
        const wrap = $("admUserList");
        wrap.innerHTML = "";
        adminUsers.forEach((u) => {
          wrap.innerHTML += `<div class="user-card"><div class="uc-info"><div class="uc-name">${u.name} <span class="${u.role === "admin" ? "badge-adm" : "badge-usr"}">${u.role}</span></div><div class="uc-meta">ID: ${u.id}</div></div><div class="uc-acts" style="display:flex; gap:6px;"><button class="bsm bsm-e" onclick="openUserModal('${u.id}')">수정</button>${u.id !== me.id ? `<button class="bsm bsm-d" onclick="delAdminUser('${u.id}')">삭제</button>` : ""}</div></div>`;
        });
      }
      function openUserModal(uid = null) {
        umEditId = uid;
        if (uid) {
          const u = adminUsers.find((x) => x.id === uid);
          $("uId").value = u.id;
          $("uId").disabled = true;
          $("uPw").value = "";
          $("uName").value = u.name;
          $("uBaptism").value = u.baptism;
          $("uRole").value = u.role;
        } else {
          $("uId").value = "";
          $("uId").disabled = false;
          $("uPw").value = "";
          $("uName").value = "";
          $("uBaptism").value = "";
          $("uRole").value = "user";
        }
        $("userModal").style.display = "flex";
      }
      async function saveAdminUser() {
        const u = {
          id: $("uId").value,
          pw: $("uPw").value,
          name: $("uName").value,
          baptism: $("uBaptism").value,
          role: $("uRole").value,
        };
        try {
          await gasCall({
            action: umEditId ? "userUpdate" : "userAdd",
            user: u,
          });
          $("userModal").style.display = "none";
          fetchAdminUsers();
          toast("✅ 완료");
        } catch (e) {
          toast("❌ 실패");
        }
      }
      async function delAdminUser(uid) {
        if (!confirm("삭제하시겠습니까?")) return;
        try {
          await gasCall({ action: "userDelete", id: uid });
          fetchAdminUsers();
          toast("✅ 삭제됨");
        } catch (e) {}
      }

      function chgHomeMo(v) {
        homeMo += v;
        if (homeMo < 1) {
          homeY--;
          homeMo = 12;
        } else if (homeMo > 12) {
          homeY++;
          homeMo = 1;
        }
        refresh();
      }
      function chgListMo(v) {
        listMo += v;
        if (listMo < 1) {
          listY--;
          listMo = 12;
        } else if (listMo > 12) {
          listY++;
          listMo = 1;
        }
        renderList(1);
      }
      function goPage(n) {
        document
          .querySelectorAll(".page, .tab-btn")
          .forEach((p) => p.classList.remove("on"));
        $("pg" + n).classList.add("on");
        if ($("tab" + n)) $("tab" + n).classList.add("on");
        if (n === "Home") refresh();
        if (n === "List") renderList(1);
        if (n === "Profile" && me) {
          $("pId").value = me.id;
          $("pName").value = me.name;
          $("pBaptism").value = me.baptism || "";
        }
        if (n === "Admin") fetchAdminUsers();
        window.scrollTo(0, 0);
      }
      function toggleDark(f) {
        const isDark =
          f === true ||
          (f !== false && !document.body.classList.contains("dark"));
        document.body.classList.toggle("dark", isDark);
        localStorage.setItem("bb_dark", isDark ? "1" : "0");
      }
      function toggleCfg() {
        $("cfgPanel").classList.toggle("open");
      }
      function setSyncBar(st, msg) {
        $("syncBar").className = "sync-bar " + st;
        $("syncTxt").textContent = msg;
        $("syncDot").className = "sd " + (st === "syncing" ? "spin" : "");
      }
      function toast(m) {
        const t = $("toast");
        t.textContent = m;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
      }
      function connectGAS() {
        const u = $("gasUrlInput").value.trim();
        if (u) {
          gasUrl = u;
          localStorage.setItem("bb_gas", u);
          gasOk = true;
          fetchFromGAS();
        }
      }
    </script>
  </body>
</html>
