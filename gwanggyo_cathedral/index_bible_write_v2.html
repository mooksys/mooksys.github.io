<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>성경 통독 기록장</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ★ Color Hunt 테마: Sage Green & Warm Off-White */
      :root {
        --p: #6a826c; /* 메인 포인트 (세이지 그린) */
        --pd: #4c604e; /* 진한 포인트 */
        --plt: #e8efe9; /* 연한 포인트 배경 */
        --gold: #d4b872; /* 강조색 (소프트 골드) */
        --bg: #f7f6f2; /* 전체 배경 (웜 화이트) */
        --bg2: #efece5; /* 카드 내부 또는 보조 배경 */
        --card: #ffffff; /* 카드 배경 */
        --txt: #2c302b; /* 기본 텍스트 (다크 차콜) */
        --txt2: #757a73; /* 보조 텍스트 (그레이시 그린) */
        --bdr: #e0ddd6; /* 테두리 색상 */
        --ok: #5b8a6a; /* 긍정/완료 */
        --err: #c25953; /* 에러/삭제 */
        --adm: #645c8a; /* 관리자 전용 컬러 */
        --adm-d: #48406b;
        --r: 14px; /* 기본 라운드 값 */
        --sh: 0 4px 20px rgba(0, 0, 0, 0.05); /* 부드러운 그림자 */
      }

      /* 다크모드 테마 */
      body.dark {
        --p: #8ba88e;
        --pd: #a5c2a8;
        --plt: #2a302b;
        --bg: #1a1b1a;
        --bg2: #242623;
        --card: #2c2e2b;
        --txt: #e4e6e3;
        --txt2: #9fa49d;
        --bdr: #3e423d;
        --ok: #6eab81;
        --err: #d96a63;
        --adm: #8a81b8;
        --adm-d: #6c6494;
        --sh: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      /* ★ 1. 일반 사이즈 최대 620px 고정 중앙 정렬 */
      body {
        font-family:
          "Pretendard",
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--txt);
        min-height: 100vh;
        padding-bottom: 72px;
        transition:
          background 0.3s,
          color 0.3s;
        max-width: 620px;
        margin: 0 auto;
        position: relative;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.08); /* 양옆 입체감 */
      }

      /* 로그인 화면 */
      .login-bg {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        padding: 20px;
      }
      .login-box {
        background: var(--card);
        border-radius: 24px;
        padding: 40px 32px;
        width: 100%;
        max-width: 380px;
        box-shadow: var(--sh);
        border: 1px solid var(--bdr);
      }
      .login-brand {
        text-align: center;
        margin-bottom: 30px;
      }
      .login-brand .cross {
        font-size: 36px;
        margin-bottom: 12px;
      }
      .login-brand h1 {
        font-family: "Nanum Myeongjo", serif;
        font-size: 24px;
        color: var(--p);
        font-weight: 800;
      }
      .login-brand p {
        font-size: 14px;
        color: var(--txt2);
        margin-top: 6px;
      }
      .lf {
        margin-bottom: 16px;
      }
      .ll {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--txt2);
        margin-bottom: 6px;
      }
      .li {
        width: 100%;
        padding: 13px 14px;
        border: 1.5px solid var(--bdr);
        border-radius: 12px;
        font-size: 15px;
        background: var(--bg2);
        color: var(--txt);
        outline: none;
        transition: all 0.2s;
      }
      .li:focus {
        border-color: var(--p);
        background: var(--card);
        box-shadow: 0 0 0 3px var(--plt);
      }
      .login-err {
        font-size: 13px;
        color: var(--err);
        min-height: 18px;
        margin-bottom: 10px;
        text-align: center;
      }
      .login-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: var(--p);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
      }
      .login-btn:hover {
        background: var(--pd);
      }
      .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* 헤더 */
      .hdr {
        background: var(--card);
        color: var(--txt);
        padding: 24px 16px 16px;
        text-align: center;
        position: relative;
        border-bottom: 1px solid var(--bdr);
      }
      .hdr h1 {
        font-family: "Nanum Myeongjo", serif;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--p);
      }
      .hdr p {
        font-size: 13px;
        color: var(--txt2);
        margin-top: 4px;
      }
      .hdr-l {
        position: absolute;
        top: 18px;
        left: 12px;
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .hdr-r {
        position: absolute;
        top: 18px;
        right: 12px;
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .ib {
        background: var(--bg2);
        border: 1px solid var(--bdr);
        color: var(--txt);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      .ib:hover {
        background: var(--bdr);
      }
      .user-chip {
        background: var(--plt);
        border: 1px solid var(--p);
        color: var(--pd);
        border-radius: 18px;
        padding: 4px 12px;
        font-size: 13px;
        font-weight: 600;
      }
      body.dark .user-chip {
        color: var(--txt);
      }

      /* 설정 및 동기화 바 */
      .sync-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 600;
        background: var(--bg2);
        border-bottom: 1px solid var(--bdr);
      }
      .sync-bar.ok {
        background: #e8f0ea;
        color: #3f6b4c;
      }
      .sync-bar.error {
        background: #fceeea;
        color: var(--err);
      }
      body.dark .sync-bar.ok {
        background: #26362b;
        color: #7bc092;
      }
      body.dark .sync-bar.error {
        background: #3d2524;
        color: #e67a73;
      }
      .sd {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }
      .cfg-panel {
        display: none;
        background: var(--card);
        border-bottom: 1px solid var(--bdr);
        padding: 16px;
      }
      .cfg-panel.open {
        display: block;
      }
      .url-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .url-inp {
        flex: 1;
        padding: 10px 12px;
        border: 1.5px solid var(--bdr);
        border-radius: 10px;
        font-size: 13px;
        background: var(--bg2);
        color: var(--txt);
      }
      .btn-conn {
        padding: 10px 16px;
        background: var(--p);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }

      /* 공통 레이아웃 */
      .sec {
        padding: 16px;
      }
      .card {
        background: var(--card);
        padding: 18px;
        border-radius: var(--r);
        border: 1px solid var(--bdr);
        margin-bottom: 14px;
        box-shadow: var(--sh);
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 14px;
      }
      .stat-box {
        background: var(--card);
        padding: 14px 8px;
        border-radius: var(--r);
        border: 1px solid var(--bdr);
        text-align: center;
        box-shadow: var(--sh);
      }
      .stat-v {
        font-size: 24px;
        font-weight: 800;
        color: var(--p);
        font-family: "Pretendard", sans-serif;
      }
      .stat-l {
        font-size: 12px;
        font-weight: 500;
        color: var(--txt2);
        margin-top: 4px;
      }

      /* 달력 */
      .cal-hdr {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .cal-nav {
        background: var(--bg2);
        border: 1px solid var(--bdr);
        color: var(--txt);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        flex-shrink: 0;
      }
      .cal-mo {
        font-size: 16px;
        font-weight: 700;
        color: var(--txt);
        font-family: "Pretendard", sans-serif;
      }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 4px;
        width: 100%;
      }
      .cal-dh {
        text-align: center;
        padding: 6px 0;
        font-size: 11px;
        font-weight: 600;
        color: var(--txt2);
      }
      .cal-day {
        position: relative;
        width: 100%;
        padding-bottom: 100%;
        background: var(--bg);
        border-radius: 8px;
        cursor: pointer;
        border: 1px solid transparent;
      }
      .cal-day-inner {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 500;
      }
      .cal-day.empty {
        background: transparent;
      }
      .cal-day.today {
        border-color: var(--p);
        font-weight: 700;
      }
      .cal-day.rec {
        background: var(--plt);
        border-color: var(--p);
      }
      .cal-day.rec .cal-day-inner {
        color: var(--pd);
        font-weight: 700;
      }
      body.dark .cal-day.rec .cal-day-inner {
        color: var(--txt);
      }
      .cal-ck {
        font-size: 12px;
        margin-top: 2px;
        color: var(--p);
        line-height: 1;
      }

      /* 폼 & 입력 */
      .edit-banner {
        background: var(--plt);
        border: 1px solid var(--p);
        border-radius: var(--r);
        padding: 12px 16px;
        margin-bottom: 14px;
        display: none;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--pd);
        font-weight: 600;
      }
      body.dark .edit-banner {
        color: var(--txt);
      }
      .edit-banner.on {
        display: flex;
      }
      .cancel-edit {
        margin-left: auto;
        background: var(--card);
        border: 1px solid var(--p);
        color: var(--pd);
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 600;
      }
      body.dark .cancel-edit {
        color: var(--txt);
      }
      .fg {
        margin-bottom: 16px;
      }
      .fl {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 13px;
        color: var(--txt2);
      }
      .fi,
      .fs,
      .ft {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--bdr);
        border-radius: 10px;
        font-size: 15px;
        background: var(--bg2);
        color: var(--txt);
        font-family: "Pretendard", sans-serif;
        outline: none;
        transition: border-color 0.2s;
      }
      .fi:focus,
      .fs:focus,
      .ft:focus {
        border-color: var(--p);
        background: var(--card);
      }
      .ft {
        min-height: 90px;
        resize: vertical;
        line-height: 1.5;
      }
      .btn-save {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: var(--p);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-save:hover {
        background: var(--pd);
      }

      /* ★ 2. 목록 카드 디자인 가독성 전면 개편 */
      .rec-card {
        background: var(--card);
        border: 1px solid var(--bdr);
        border-radius: var(--r);
        padding: 20px;
        margin-bottom: 14px;
        position: relative;
        box-shadow: var(--sh);
      }
      .rc-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
      }

      /* 날짜 */
      .rc-date {
        font-size: 13px;
        font-weight: 600;
        color: var(--txt2);
        background: var(--bg2);
        padding: 4px 10px;
        border-radius: 6px;
        display: inline-block;
      }

      /* 말씀 제목 (깔끔하고 시원하게 좌측 정렬) */
      .rc-title {
        font-family: "Pretendard", sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: var(--txt);
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }

      /* 성경 구절 본문 (가독성 높은 인용구 스타일) */
      .rc-verse-band {
        background: var(--bg);
        color: var(--txt);
        border-left: 4px solid var(--p);
        padding: 14px 16px;
        margin: 0 0 14px 0;
        border-radius: 4px 8px 8px 4px;
        font-size: 15px;
        line-height: 1.6;
        font-weight: 500;
        letter-spacing: -0.3px;
      }

      /* 묵상 본문 (자간/행간을 넓혀 읽기 편하게) */
      .rc-med {
        color: var(--txt);
        line-height: 1.7;
        font-size: 15px;
        margin-bottom: 14px;
        white-space: pre-wrap;
        letter-spacing: -0.2px;
      }

      /* 버튼 영역 */
      .rc-acts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 16px;
        border-top: 1px dashed var(--bdr);
        padding-top: 16px;
      }
      .btn-edit,
      .btn-del {
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
        color: #fff;
      }
      .btn-edit {
        background: var(--p);
      }
      .btn-del {
        background: #a06c69;
      } /* 톤다운된 레드 */
      .fav-btn {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        padding: 0;
      }

      .srch-wrap {
        position: relative;
        margin-bottom: 14px;
      }
      .srch-inp {
        width: 100%;
        padding: 12px 14px 12px 38px;
        border: 1.5px solid var(--bdr);
        border-radius: 12px;
        font-size: 14px;
        background: var(--card);
        color: var(--txt);
      }
      .srch-ico {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        opacity: 0.5;
      }
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--txt2);
        font-weight: 500;
      }

      /* 페이징 버튼 */
      .pagination {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 20px;
        flex-wrap: wrap;
      }
      .page-btn {
        padding: 8px 14px;
        border: 1px solid var(--bdr);
        background: var(--card);
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        color: var(--txt2);
        font-size: 14px;
      }
      .page-btn.on {
        background: var(--p);
        color: #fff;
        border-color: var(--p);
      }

      /* 관리자 페이지 */
      .hdr.adm-hdr {
        border-bottom-color: var(--adm);
      }
      .hdr.adm-hdr h1 {
        color: var(--adm);
      }
      .user-card {
        background: var(--card);
        border: 1px solid var(--bdr);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 10px;
        display: flex;
        gap: 12px;
        align-items: center;
        box-shadow: var(--sh);
      }
      .uc-info {
        flex: 1;
      }
      .uc-name {
        font-size: 15px;
        font-weight: 700;
      }
      .uc-meta {
        font-size: 12px;
        color: var(--txt2);
        margin-top: 4px;
      }
      .badge-adm {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 12px;
        background: var(--adm);
        color: #fff;
        margin-left: 6px;
        font-weight: 600;
      }
      .bsm {
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
      }
      .bsm-e {
        background: var(--p);
      }
      .bsm-d {
        background: #a06c69;
      }

      /* 탭 및 모달 등 */
      .page {
        display: none;
      }
      .page.on {
        display: block;
      }

      /* ★ 탭 바도 620px에 맞게 고정 */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 620px;
        background: var(--card);
        border-top: 1px solid var(--bdr);
        display: flex;
        padding-bottom: env(safe-area-inset-bottom);
        z-index: 100;
        box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.03);
      }
      .tab-btn {
        flex: 1;
        background: none;
        border: none;
        padding: 14px 0;
        font-size: 20px;
        color: var(--txt2);
        cursor: pointer;
        opacity: 0.5;
        transition: all 0.2s;
      }
      .tab-btn.on {
        color: var(--p);
        opacity: 1;
      }
      .tab-btn span {
        display: block;
        font-size: 11px;
        font-weight: 700;
        margin-top: 6px;
      }

      /* ★ 토스트 알림창도 620px 바운더리 내에 위치 */
      .toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(44, 48, 43, 0.9);
        color: #fff;
        padding: 12px 24px;
        border-radius: 24px;
        font-size: 14px;
        font-weight: 600;
        z-index: 1000;
        opacity: 0;
        transition: all 0.3s;
        pointer-events: none;
        white-space: nowrap;
        max-width: 580px;
      }
      .toast.show {
        opacity: 1;
      }
      body.dark .toast {
        background: rgba(228, 230, 227, 0.9);
        color: #1a1b1a;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
        padding: 20px;
      }
      .modal-box {
        background: var(--card);
        border-radius: 20px;
        width: 100%;
        max-width: 340px;
        padding: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }
      .modal-box h3 {
        margin-bottom: 16px;
        font-size: 18px;
        color: var(--txt);
      }
      .modal-btns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 20px;
      }
      .mbtn {
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        border: none;
      }
      .mbtn-cancel {
        background: var(--bg2);
        color: var(--txt);
      }
      .mbtn-adm {
        background: var(--adm);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="loginScreen">
      <div class="login-bg">
        <div class="login-box">
          <div class="login-brand">
            <div class="cross">🌿</div>
            <h1>성경 통독 기록장</h1>
            <p>매일 하느님의 말씀과 함께</p>
          </div>
          <form onsubmit="doLogin(event)">
            <div class="lf">
              <label class="ll">아이디</label
              ><input
                id="loginId"
                class="li"
                type="text"
                required
                placeholder="영문, 숫자"
              />
            </div>
            <div class="lf">
              <label class="ll">비밀번호</label
              ><input
                id="loginPw"
                class="li"
                type="password"
                required
                placeholder="비밀번호"
              />
            </div>

    <script>
      const $ = (id) => document.getElementById(id);
      let me = null,
        gasUrl = "",
        gasOk = false;
      let recs = [],
        adminUsers = [];
      let homeY,
        homeMo,
        editId = null,
        umEditId = null;

      let listY,
        listMo,
        listPage = 1;
      const listPerPage = 5;

      // KST 날짜 변환
      function getLocalToday() {
        const d = new Date(),
          offset = d.getTimezoneOffset() * 60000;
        return new Date(d.getTime() - offset).toISOString().slice(0, 10);
      }

      // ★ Github/외부환경을 위해 CORS 및 리다이렉트 옵션이 추가된 gasCall 함수
      async function gasCall(payload, isGet = false) {
        if (!gasUrl) throw new Error("GAS 연결 안됨");
        payload.token = localStorage.getItem("bb_token");
        payload.userId = localStorage.getItem("bb_uid");
        if (
          ["userList", "userAdd", "userUpdate", "userDelete"].includes(
            payload.action,
          )
        )
          payload.adminId = payload.userId;

        const ctl = new AbortController(),
          tmr = setTimeout(() => ctl.abort(), 15000);
        try {
          const opt = isGet
            ? {}
            : {
                method: "POST",
                body: JSON.stringify(payload),
                headers: {
                  "Content-Type": "text/plain;charset=utf-8", // CORS Preflight 방지
                },
                redirect: "follow", // GAS 리다이렉트 처리 허용
              };
          const url = isGet
            ? `${gasUrl}?${new URLSearchParams(payload)}`
            : gasUrl;
          const res = await fetch(url, opt);
          clearTimeout(tmr);
          const json = await res.json();
          if (!json.ok) throw new Error(json.error);
          return json.data;
        } catch (e) {
          clearTimeout(tmr);
          throw e;
        }
      }

      async function doLogin(e) {
        e.preventDefault();
        const id = $("loginId").value.trim(),
          pw = $("loginPw").value.trim(),
          btn = $("loginBtn");
        btn.disabled = true;
        btn.textContent = "확인 중...";
        try {
          const data = await gasCall({ action: "userAuth", id, pw });
          me = data;
          localStorage.setItem("bb_uid", me.id);
          localStorage.setItem("bb_token", me.token);
          localStorage.setItem("bb_me", JSON.stringify(me));
          loginOk();
        } catch (err) {
          $("loginErr").textContent = err.message || "로그인 실패";
        } finally {
          btn.disabled = false;
          btn.textContent = "로그인";
        }
      }

      function loginOk() {
        $("loginScreen").style.display = "none";
        $("appScreen").style.display = "block";
        $("userChip").textContent = me.baptism
          ? `${me.name} (${me.baptism})`
          : me.name;
        $("tabAdmin").style.display = me.role === "admin" ? "block" : "none";

        const d = new Date(getLocalToday());
        homeY = listY = d.getFullYear();
        homeMo = listMo = d.getMonth() + 1;
        $("fDate").value = getLocalToday();
        fetchFromGAS();
        goPage("Home");
      }

      function doLogout() {
        if (confirm("안전하게 로그아웃 하시겠습니까?")) {
          localStorage.removeItem("bb_uid");
          localStorage.removeItem("bb_token");
          localStorage.removeItem("bb_me");
          location.reload();
        }
      }

      (async function init() {
        if (localStorage.getItem("bb_dark") === "1") toggleDark(true);
        try {
          gasUrl = (await (await fetch("index_bible_write_gas_v2.json")).json())
            .gas_url;
        } catch (e) {}
        if (!gasUrl) gasUrl = localStorage.getItem("bb_gas") || "";
        if (gasUrl) {
          $("gasUrlInput").value = gasUrl;
          gasOk = true;
        }

        const storedMe = localStorage.getItem("bb_me"),
          token = localStorage.getItem("bb_token");
        if (storedMe && token && gasOk) {
          me = JSON.parse(storedMe);
          loginOk();
        }
      })();

      async function updateProfile(e) {
        e.preventDefault();
        const btn = e.target.querySelector("button");
        btn.disabled = true;
        const u = {
          id: me.id,
          pw: $("pPw").value,
          name: $("pName").value,
          baptism: $("pBaptism").value,
          role: me.role,
        };
        try {
          await gasCall({ action: "userUpdate", user: u });
          toast("✅ 수정 완료");
          me.name = u.name;
          me.baptism = u.baptism;
          localStorage.setItem("bb_me", JSON.stringify(me));
          $("userChip").textContent = me.baptism
            ? `${me.name} (${me.baptism})`
            : me.name;
          $("pPw").value = "";
        } catch (err) {
          toast("❌ 수정 실패");
        } finally {
          btn.disabled = false;
        }
      }

      async function fetchAdminUsers() {
        if (me.role !== "admin") return;
        try {
          adminUsers = await gasCall({ action: "userList" }, true);
          renderAdminUsers();
        } catch (e) {}
      }

      function renderAdminUsers() {
        const wrap = $("admUserList");
        wrap.innerHTML = "";
        adminUsers.forEach((u) => {
          wrap.innerHTML += `
            <div class="user-card">
              <div class="uc-info"><div class="uc-name">${u.name} <span class="${u.role === "admin" ? "badge-adm" : "badge-usr"}">${u.role}</span></div><div class="uc-meta">ID: ${u.id}</div></div>
              <div class="uc-acts" style="margin-top:0; border:none; padding:0; display:flex; gap:6px;"><button class="bsm bsm-e" onclick="openUserModal('${u.id}')">수정</button>
              ${u.id !== me.id ? `<button class="bsm bsm-d" onclick="delAdminUser('${u.id}')">삭제</button>` : ""}</div>
            </div>`;
        });
      }

      function openUserModal(uid = null) {
        umEditId = uid;
        if (uid) {
          const u = adminUsers.find((x) => x.id === uid);
          $("uId").value = u.id;
          $("uId").disabled = true;
          $("uPw").value = "";
          $("uName").value = u.name;
          $("uBaptism").value = u.baptism;
          $("uRole").value = u.role;
        } else {
          $("uId").value = "";
          $("uId").disabled = false;
          $("uPw").value = "";
          $("uName").value = "";
          $("uBaptism").value = "";
          $("uRole").value = "user";
        }
        $("userModal").style.display = "flex";
      }

      function closeModal(id) {
        $(id).style.display = "none";
      }
      async function saveAdminUser() {
        const u = {
          id: $("uId").value,
          pw: $("uPw").value,
          name: $("uName").value,
          baptism: $("uBaptism").value,
          role: $("uRole").value,
        };
        try {
          await gasCall({
            action: umEditId ? "userUpdate" : "userAdd",
            user: u,
          });
          closeModal("userModal");
          fetchAdminUsers();
          toast("✅ 완료");
        } catch (e) {
          toast("❌ 실패");
        }
      }
      async function delAdminUser(uid) {
        if (!confirm("삭제하시겠습니까?")) return;
        try {
          await gasCall({ action: "userDelete", id: uid });
          fetchAdminUsers();
          toast("✅ 삭제됨");
        } catch (e) {}
      }

      async function fetchFromGAS() {
        try {
          setSyncBar("syncing", "로딩중...");
          let data = await gasCall({ action: "list" }, true);

          recs = Array.isArray(data)
            ? data.map((r) => {
                if (
                  r.date.includes("GMT") ||
                  r.date.includes("한국") ||
                  r.date.includes("시간") ||
                  r.date.length > 10
                ) {
                  const d = new Date(r.date);
                  if (!isNaN(d))
                    r.date = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
                }
                return r;
              })
            : [];

          setSyncBar("ok", "✓ 연결됨");
          refresh();
        } catch (e) {
          setSyncBar("error", "⚠️ 에러");
        }
      }

      async function saveRecord(e) {
        e.preventDefault();
        $("btnSave").disabled = true;
        const isFav = $("fFav").checked;
        const data = {
          id: editId || Date.now().toString(),
          date: $("fDate").value,
          book: $("fBook").value,
          chapter: $("fChapter").value,
          verse: $("fVerse").value,
          verseText: $("fVerseText").value,
          meditation: $("fMed").value,
          favorite: isFav,
        };
        try {
          await gasCall({ action: editId ? "update" : "add", record: data });
          editId = null;
          $("writeForm").reset();
          $("fDate").value = getLocalToday();
          fetchFromGAS();
          goPage("Home");
          toast("✅ 저장 완료!");
        } catch (err) {
          toast("⚠️ 실패");
        } finally {
          $("btnSave").disabled = false;
        }
      }

      function toggleFav(id, curVal) {
        const newVal = !curVal,
          r = recs.find((x) => x.id === id);
        if (r) r.favorite = newVal;
        renderList(listPage);
        gasCall({ action: "fav", id, favorite: newVal }, false)
          .then(() => fetchFromGAS())
          .catch((e) => {
            if (r) r.favorite = curVal;
            renderList(listPage);
            toast("❌ 변경 실패");
          });
      }

      function delRecord(id) {
        if (confirm("삭제할까요?"))
          gasCall({ action: "delete", id }).then(() => fetchFromGAS());
      }
      function startEdit(id) {
        const r = recs.find((x) => x.id === id);
        if (!r) return;
        editId = id;
        $("fDate").value = r.date;
        $("fBook").value = r.book;
        $("fChapter").value = r.chapter;
        $("fVerse").value = r.verse || "";
        $("fVerseText").value = r.verseText || "";
        $("fMed").value = r.meditation || "";
        $("fFav").checked = r.favorite === true || r.favorite === "true";
        goPage("Write");
        $("editBanner").classList.add("on");
      }
      function cancelEdit() {
        editId = null;
        $("writeForm").reset();
        $("editBanner").classList.remove("on");
        $("fDate").value = getLocalToday();
      }

      function refresh() {
        const curMo = `${homeY}-${String(homeMo).padStart(2, "0")}`;
        $("stTotal").textContent = recs.length;
        $("stMonth").textContent = recs.filter((r) =>
          r.date.startsWith(curMo),
        ).length;
        $("stFav").textContent = recs.filter((r) => r.favorite).length;
        let streak = 0;
        if (recs.length > 0) {
          const sorted = [...recs]
            .map((r) => r.date)
            .sort()
            .reverse();
          let prev = new Date(sorted[0]);
          streak = 1;
          for (let i = 1; i < sorted.length; i++) {
            let d = new Date(sorted[i]),
              diff = (prev - d) / 86400000;
            if (diff === 1) {
              streak++;
              prev = d;
            } else if (diff > 1) break;
          }
        }
        $("stStreak").textContent = streak;
        renderHomeCal();
        renderList(1);
      }

      function renderHomeCal() {
        $("homeMoLabel").textContent = `${homeY}년 ${homeMo}월`;
        const wrap = $("homeCal");
        wrap.innerHTML = "";
        const days = ["일", "월", "화", "수", "목", "금", "토"];
        days.forEach((d) => {
          let div = document.createElement("div");
          div.className = "cal-dh";
          div.textContent = d;
          wrap.appendChild(div);
        });
        const fDate = new Date(homeY, homeMo - 1, 1).getDay(),
          lDate = new Date(homeY, homeMo, 0).getDate(),
          todayStr = getLocalToday();
        for (let i = 0; i < fDate; i++) {
          let e = document.createElement("div");
          e.className = "cal-day empty";
          wrap.appendChild(e);
        }
        for (let d = 1; d <= lDate; d++) {
          let yyyy_mm_dd = `${homeY}-${String(homeMo).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          let isToday = yyyy_mm_dd === todayStr,
            hasRec = recs.some((r) => r.date === yyyy_mm_dd);
          let cell = document.createElement("div");
          cell.className = `cal-day ${isToday ? "today" : ""} ${hasRec ? "rec" : ""}`;
          cell.innerHTML = `<div class="cal-day-inner">${d}${hasRec ? `<div class="cal-ck">●</div>` : ""}</div>`;
          wrap.appendChild(cell);
        }
      }

      function chgListMo(v) {
        listMo += v;
        if (listMo < 1) {
          listY--;
          listMo = 12;
        } else if (listMo > 12) {
          listY++;
          listMo = 1;
        }
        renderList(1);
      }

      function renderList(page = 1) {
        listPage = page;
        $("listMoLabel").textContent = `${listY}년 ${listMo}월`;
        const wrap = $("recList");
        wrap.innerHTML = "";
        let arr = recs
          .filter((r) =>
            r.date.startsWith(`${listY}-${String(listMo).padStart(2, "0")}`),
          )
          .sort((a, b) => b.date.localeCompare(a.date));
        const kw = $("srchInput").value.trim().toLowerCase();
        if (kw)
          arr = arr.filter((r) =>
            (r.book + r.chapter + r.verse + (r.verseText || "") + r.meditation)
              .toLowerCase()
              .includes(kw),
          );

        if (arr.length === 0) {
          wrap.innerHTML = `<div class="empty">이 달의 기록이 없습니다.</div>`;
          return;
        }

        const totalPages = Math.ceil(arr.length / listPerPage);
        arr
          .slice((listPage - 1) * listPerPage, listPage * listPerPage)
          .forEach((r) => {
            const isFav = r.favorite === true || r.favorite === "true";
            const card = document.createElement("div");
            card.className = "rec-card";
            card.innerHTML = `
            <div class="rc-header">
              <div class="rc-date">🗓️ ${r.date}</div>
              <button class="fav-btn" onclick="toggleFav('${r.id}', ${isFav})" title="즐겨찾기">${isFav ? "⭐" : "☆"}</button>
            </div>
            <div class="rc-title">${r.book} ${r.chapter}장${r.verse ? ` ${r.verse}절` : ""}</div>
            ${r.verseText ? `<div class="rc-verse-band">"${r.verseText}"</div>` : ""}
            ${r.meditation ? `<div class="rc-med">${r.meditation}</div>` : ""}
            <div class="rc-acts">
              <button class="btn-edit" onclick="startEdit('${r.id}')">수정</button>
              <button class="btn-del" onclick="delRecord('${r.id}')">삭제</button>
            </div>
          `;
            wrap.appendChild(card);
          });

        if (totalPages > 1) {
          let pageHtml = `<div class="pagination">`;
          for (let i = 1; i <= totalPages; i++)
            pageHtml += `<button class="page-btn ${i === listPage ? "on" : ""}" onclick="renderList(${i})">${i}</button>`;
          wrap.innerHTML += pageHtml + `</div>`;
        }
      }

      function chgHomeMo(v) {
        homeMo += v;
        if (homeMo < 1) {
          homeY--;
          homeMo = 12;
        } else if (homeMo > 12) {
          homeY++;
          homeMo = 1;
        }
        refresh();
      }
      function goPage(n) {
        document
          .querySelectorAll(".page, .tab-btn")
          .forEach((p) => p.classList.remove("on"));
        $("pg" + n).classList.add("on");
        if ($("tab" + n)) $("tab" + n).classList.add("on");
        if (n === "Home") refresh();
        if (n === "List") renderList(1);
        if (n === "Profile" && me) {
          $("pId").value = me.id;
          $("pName").value = me.name;
          $("pBaptism").value = me.baptism || "";
        }
        if (n === "Admin") fetchAdminUsers();
        window.scrollTo(0, 0);
      }
      function toggleDark(f) {
        const isDark =
          f === true ||
          (f !== false && !document.body.classList.contains("dark"));
        document.body.classList.toggle("dark", isDark);
        localStorage.setItem("bb_dark", isDark ? "1" : "0");
      }
      function toggleCfg() {
        $("cfgPanel").classList.toggle("open");
      }
      function setSyncBar(st, msg) {
        $("syncBar").className = "sync-bar " + st;
        $("syncTxt").textContent = msg;
        $("syncDot").className = "sd " + (st === "syncing" ? "spin" : "");
      }
      function toast(m) {
        const t = $("toast");
        t.textContent = m;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
      }
      function connectGAS() {
        const u = $("gasUrlInput").value.trim();
        if (u) {
          gasUrl = u;
          localStorage.setItem("bb_gas", u);
          gasOk = true;
          fetchFromGAS();
        }
      }
    </script>
  </body>
</html>
