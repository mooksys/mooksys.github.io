<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>울뜨레야 기도 기록표</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Pretendard"', '"Noto Sans KR"', "sans-serif"],
            },
            boxShadow: {
              glass: "0 8px 32px 0 rgba(31, 38, 135, 0.07)",
              "glass-hover": "0 8px 32px 0 rgba(31, 38, 135, 0.15)",
            },
          },
        },
      };
    </script>
    <style>
      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
      .glass-morphism {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.18);
      }
      .dark .glass-morphism {
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      input[type="number"]::-webkit-inner-spin-button {
        display: none;
      }
      #loadingOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        backdrop-filter: blur(3px);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body
    class="bg-slate-50 dark:bg-slate-900 min-h-screen font-sans transition-colors duration-300"
  >
    <div id="loadingOverlay"><div class="spinner"></div></div>

    <div
      id="loginView"
      class="min-h-screen flex items-center justify-center p-4"
    >
      <div
        class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-glass w-full max-w-sm border border-slate-100 dark:border-slate-700 text-center"
      >
        <div
          class="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 text-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl"
        >
          🕊️
        </div>
        <h1 class="text-2xl font-black text-slate-800 dark:text-white mb-2">
          기도 기록표
        </h1>
        <p class="text-sm text-slate-400 mb-8">
          발급받은 아이디와 비밀번호를 입력하세요.
        </p>

        <div class="space-y-4">
          <input
            type="text"
            id="loginId"
            placeholder="로그인 아이디 (admin)"
            class="w-full p-4 bg-slate-50 dark:bg-slate-700 rounded-xl dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <input
            type="password"
            id="loginPw"
            placeholder="비밀번호"
            class="w-full p-4 bg-slate-50 dark:bg-slate-700 rounded-xl dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <button
            onclick="Auth.login()"
            class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-lg"
          >
            로그인
          </button>
        </div>
      </div>
    </div>

    <div
      id="adminView"
      class="hidden max-w-lg mx-auto min-h-screen flex flex-col pb-20"
    >
      <header
        class="p-6 sticky top-0 z-20 glass-morphism flex justify-between items-center"
      >
        <div>
          <h1 class="text-xl font-bold text-slate-800 dark:text-white">
            관리자 대시보드
          </h1>
          <p class="text-sm text-blue-500 font-medium">유저 관리 및 세팅</p>
        </div>
        <div class="flex gap-2">
          <button
            onclick="UI.toggleDarkMode()"
            class="p-2 bg-white dark:bg-slate-800 rounded-full shadow-sm"
          >
            <svg
              id="adminMoonIcon"
              class="w-5 h-5 text-indigo-500"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
              />
            </svg>
          </button>
          <button
            onclick="Auth.logout()"
            class="p-2 bg-red-50 text-red-500 rounded-full shadow-sm hover:bg-red-100"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              />
            </svg>
          </button>
        </div>
      </header>
      <main class="p-6 space-y-6">
        <div
          class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border dark:border-slate-700"
        >

            새 유저(계정) 등록

          <div class="space-y-3">
            <input

              id="newUserId"

              <input

                <path

        <h3 class="text-xl font-black mb-2 dark:text-white" id="pwModalTitle">

        <p class="text-sm text-red-500 mb-6" id="pwModalDesc">
          보안을 위해 새로운 비밀번호를 설정해주세요.
        </p>
        <div class="space-y-4 mb-6">
          <input
            type="password"
            id="newPw"
            placeholder="새 비밀번호"

          <input

        <input

          <button
            onclick="UI.closeModal('editModal')"

          >
            취소
          </button>
          <button
            onclick="Store.saveEditValue()"

          </button>

    <div
      id="manageModal"
      class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm"
    >
      <div
        class="bg-white dark:bg-slate-800 w-full max-w-md max-h-[85vh] overflow-hidden flex flex-col rounded-2xl shadow-2xl"
      >
        <div
          class="p-5 border-b dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800"
        >
          <div>
            <h3 class="text-lg font-bold dark:text-white">
              기도 항목 및 목표 설정
            </h3>
            <p class="text-xs text-slate-500 mt-1">
              나만의 기도 항목을 관리하세요.
            </p>
          </div>
          <button
            onclick="Store.addTempItem()"
            class="p-2 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"

        </div>
        <div
          id="manageList"
          class="flex-1 overflow-y-auto p-5 space-y-4 bg-slate-100 dark:bg-slate-900"
        ></div>
        <div
          class="p-5 border-t dark:border-slate-700 grid grid-cols-2 gap-3 bg-white dark:bg-slate-800"
        >
          <button
            onclick="UI.closeModal('manageModal')"
            class="py-3 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl"
          >
            취소

          <button
            onclick="Store.saveManageSettings()"
            class="py-3 bg-blue-600 text-white rounded-xl"
          >
            전체 저장
          </button>

    <script>
      /* =========================================
           구글 앱스 스크립트 연결 URL (여기에 붙여넣으세요)
        ========================================= */
      const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxZOk7QdlqtxADjyeI3ouVMoKbyCSJY3YOmiQIxyzzT4dnqzqArmKympW-e4tkFpe1y/exec";

      /* =========================================
           API 통신 및 기타 모듈
        ========================================= */
      const GAS_API = {
        showLoading(show) {
          document.getElementById("loadingOverlay").style.display = show
            ? "flex"
            : "none";
        },
        async post(payload) {
          this.showLoading(true);
          try {
            const res = await fetch(GOOGLE_WEB_APP_URL, {
              method: "POST",
              body: JSON.stringify(payload),
              headers: { "Content-Type": "text/plain;charset=utf-8" },
            });
            return await res.json();
          } catch (e) {
            console.error(e);
            return { success: false, message: "서버 통신 에러" };
          } finally {
            this.showLoading(false);
          }
        },
        async get(action, key) {
          this.showLoading(true);
          try {
            const res = await fetch(
              `${GOOGLE_WEB_APP_URL}?action=${action}&key=${key}`,
            );
            return await res.json();
          } catch (e) {
            console.error(e);
            return { success: false };
          } finally {
            this.showLoading(false);
          }
        },
      };

      const Auth = {
        userId: null,
        userRole: null,
        userName: null,
        baptismName: null,
        isForcePwChange: false,
        async login() {
          const id = document.getElementById("loginId").value.trim();
          const pw = document.getElementById("loginPw").value.trim();
          if (!id || !pw) return alert("아이디와 비밀번호를 입력해주세요.");

          const res = await GAS_API.post({ action: "login", id, pw });
          if (res.success) {
            this.userId = id;
            this.userRole = res.role;
            this.userName = res.name;
            this.baptismName = res.baptismName;
            document.getElementById("loginId").value = "";
            document.getElementById("loginPw").value = "";

            if (pw === "1234") {
              this.isForcePwChange = true;
              document.getElementById("pwCancelBtn").style.display = "none";
              document
                .getElementById("pwSaveBtn")
                .classList.replace("col-span-1", "col-span-2");
              document.getElementById("pwModalDesc").textContent =
                "초기 비밀번호 1234를 사용중입니다. 반드시 변경해주세요.";
              UI.showModal("pwChangeModal");
            } else this.routeUser();
          } else alert(res.message);
        },
        async changePassword() {
          const newPw = document.getElementById("newPw").value.trim();
          const confirmPw = document
            .getElementById("newPwConfirm")
            .value.trim();
          if (!newPw) return alert("새 비밀번호를 입력하세요.");

            m = mins % 60;

        renderBubbleChart() {
          const container = document.getElementById("chartContainer");
          container.innerHTML = "";

          const activeData = Store.state.monthData.filter((d) => d.value > 0);

          const width = container.clientWidth || 340;
          const height = width * 0.9;

          const svg = d3
            .select("#chartContainer")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .style("display", "block")
            .style("overflow", "visible");

          if (activeData.length === 0) {
            svg
              .append("text")
              .attr("x", width / 2)
              .attr("y", height / 2)
              .attr("text-anchor", "middle")
              .attr("class", "fill-slate-400 text-sm font-medium")
              .text("기록된 기도 데이터가 없습니다.");
            return;
          }

          const maxValue = d3.max(activeData, (d) => d.value);
          const radiusScale = d3
            .scaleSqrt()
            .domain([0, maxValue])
            .range([35, height * 0.28]);

          const nodes = activeData.map((d) => ({
            ...d,
            r: radiusScale(d.value),
            x: width / 2 + (Math.random() - 0.5) * 50,
            y: height / 2 + (Math.random() - 0.5) * 50,
          }));

          const simulation = d3
            .forceSimulation(nodes)
            .force(
              "center",
              d3.forceCenter(width / 2, height / 2).strength(0.05),
            )
            .force("x", d3.forceX(width / 2).strength(0.08))
            .force("y", d3.forceY(height / 2).strength(0.12))
            .force(
              "collide",
              d3
                .forceCollide()
                .radius((d) => d.r + 2)
                .iterations(4),
            )
            .stop();

          for (let i = 0; i < 300; ++i) {
            simulation.tick();
            nodes.forEach((d) => {
              d.x = Math.max(d.r + 2, Math.min(width - d.r - 2, d.x));
              d.y = Math.max(d.r + 2, Math.min(height - d.r - 2, d.y));
            });
          }

          const node = svg
            .selectAll("g")
            .data(nodes)
            .enter()
            .append("g")
            .attr("transform", (d) => `translate(${d.x},${d.y})`);

          node
            .append("circle")
            .attr("r", (d) => d.r)
            .attr(
              "fill",
              (d) =>
                (
                  Store.state.prayerTypes.find((t) => t.name === d.name) || {
                    color: "#cbd5e1",
                  }
                ).color,
            )
            .attr("opacity", 0.9)
            .attr(
              "stroke",
              document.documentElement.classList.contains("dark")
                ? "#1e293b"
                : "white",
            )
            .attr("stroke-width", 2);

          node
            .append("text")
            .attr("text-anchor", "middle")
            .attr("dy", "-0.6em")
            .style("font-size", (d) => Math.min(d.r * 0.45, 24) + "px")
            .text(
              (d) =>
                (
                  Store.state.prayerTypes.find((t) => t.name === d.name) || {
                    icon: "✨",
                  }
                ).icon,
            );

          node
            .append("text")
            .attr("text-anchor", "middle")
            .attr("dy", "0.4em")
            .attr("class", "font-bold fill-white drop-shadow-md")
            .style("font-size", (d) => Math.min(d.r * 0.25, 12) + "px")
            .text((d) => d.name);

          node
            .append("text")
            .attr("text-anchor", "middle")
            .attr("dy", "1.6em")
            .attr("class", "font-black fill-white tracking-wide drop-shadow-md")
            .style("font-size", (d) => Math.min(d.r * 0.3, 14) + "px")
            .text((d) => {
              const pt = Store.state.prayerTypes.find(
                (t) => t.name === d.name,
              ) || { unit: "" };
              return d.value.toLocaleString() + pt.unit;
            });
        },

        showModal(id) {
          if (Auth.isForcePwChange && id !== "pwChangeModal") return;
          if (id === "manageModal") {
            Store.state.tempPrayerTypes = JSON.parse(
              JSON.stringify(Store.state.prayerTypes),
            );
            this.renderManageList();
          }
          document.getElementById(id).classList.remove("hidden");
        },
        closeModal(id) {
          if (id === "pwChangeModal" && Auth.isForcePwChange)
            return alert("비밀번호 변경을 완료해주세요.");
          document.getElementById(id).classList.add("hidden");
        },
        showEditModal(idx) {
          Store.state.currentEditIndex = idx;
          const item = Store.state.monthData[idx];
          document.getElementById("modalTitle").textContent =
            `${item.name} 수정 (${item.unit})`;
          document.getElementById("modalInput").value = item.value;
          this.showModal("editModal");
          setTimeout(() => document.getElementById("modalInput").focus(), 100);
        },

        renderManageList() {
          document.getElementById("manageList").innerHTML =
            Store.state.tempPrayerTypes
              .map(
                (item, idx) => `
                    <div class="p-4 bg-white dark:bg-slate-700 rounded-xl shadow-sm border border-slate-200 dark:border-slate-600 relative manage-item">
                        <button onclick="Store.removeTempItem(${idx})" class="absolute top-2 right-2 p-1 text-slate-400 hover:text-red-500 rounded"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                        <div class="grid grid-cols-[1fr_auto_auto] gap-2 mb-3 pr-6">
                            <div><label class="text-[10px] text-slate-400 block mb-1">항목명</label><input type="text" class="item-name w-full p-2 bg-slate-50 border rounded-lg dark:bg-slate-800 dark:border-slate-600 dark:text-white text-sm" value="${item.name}"></div>
                            <div><label class="text-[10px] text-slate-400 block mb-1">목표</label><input type="number" class="item-goal w-16 p-2 bg-slate-50 border rounded-lg dark:bg-slate-800 dark:text-white text-sm text-center" value="${item.goal}"></div>
                            <div><label class="text-[10px] text-slate-400 block mb-1">단위</label><input type="text" class="item-unit w-12 p-2 bg-slate-50 border rounded-lg dark:bg-slate-800 dark:text-white text-sm text-center" value="${item.unit}"></div>
                        </div>
                        <div class="flex gap-1.5 flex-wrap">
                            ${Store.COLORS.map((c) => `<div onclick="Store.state.tempPrayerTypes[${idx}].color='${c}'; UI.renderManageList()" class="w-6 h-6 rounded-full cursor-pointer border-2 ${item.color === c ? "border-slate-800 dark:border-white shadow-md scale-110" : "border-transparent"}" style="background-color: ${c}"></div>`).join("")}
                        </div>
                    </div>`,
              )
              .join("");
        },

        switchView(view) {
          Store.state.currentView = view;
          document
            .getElementById("inputView")
            .classList.toggle("hidden", view !== "input");
          document
            .getElementById("resultView")
            .classList.toggle("hidden", view === "input");
          document.getElementById("tabInput").className =
            view === "input"
              ? "flex-1 py-2 text-sm font-medium rounded-lg bg-white dark:bg-slate-700 shadow-sm text-blue-600 dark:text-blue-400"
              : "flex-1 py-2 text-sm font-medium text-slate-500";
          document.getElementById("tabResult").className =
            view === "result"
              ? "flex-1 py-2 text-sm font-medium rounded-lg bg-white dark:bg-slate-700 shadow-sm text-blue-600 dark:text-blue-400"
              : "flex-1 py-2 text-sm font-medium text-slate-500";
          this.renderAll();
        },

        toggleDarkMode() {
          const isDark = document.documentElement.classList.toggle("dark");
          localStorage.setItem("prayer_dark_mode", isDark);
        },

        async exportImage() {
          GAS_API.showLoading(true);
          await document.fonts.ready;
          window.scrollTo(0, 0);

          const captureArea = document.getElementById("captureArea");
          const originalShadow = captureArea.style.boxShadow;
          captureArea.style.boxShadow = "none";

          try {
            const canvas = await html2canvas(captureArea, {
              backgroundColor: document.documentElement.classList.contains(
                "dark",
              )
                ? "#0f172a"
                : "#f8fafc",
              scale: 2,
              useCORS: true,
              allowTaint: true,
              scrollY: 0,
              scrollX: 0,
            });

            const link = document.createElement("a");
            link.download = `영적성적표_${Auth.userName}_${Store.state.currentDate.getFullYear()}-${Store.state.currentDate.getMonth() + 1}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
          } catch (err) {
            console.error("이미지 저장 에러: ", err);
            alert("이미지 저장 중 오류가 발생했습니다.");
          } finally {
            captureArea.style.boxShadow = originalShadow;
            GAS_API.showLoading(false);
          }
        },
      };

      window.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem("prayer_dark_mode") === "true")
          document.documentElement.classList.add("dark");
        ["editModal", "manageModal", "adminEditModal"].forEach((id) => {
          document.getElementById(id).addEventListener("click", (e) => {
            if (e.target === e.currentTarget) UI.closeModal(id);
          });
        });
        document.getElementById("loginPw").addEventListener("keypress", (e) => {
          if (e.key === "Enter") Auth.login();
        });
        document
          .getElementById("modalInput")
          .addEventListener("keypress", (e) => {
            if (e.key === "Enter") Store.saveEditValue();
          });
      });
    </script>
  </body>
</html>
