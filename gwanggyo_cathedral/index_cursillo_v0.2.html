<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'sha256-LhFXVUxIM+TYvJa8nl7orPBTZxdvNGPlYnyCLT1wgc8='; connect-src 'self' https://script.google.com https://script.googleusercontent.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>수원교구 꾸르실료 비상연락망</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #f7f3ef;
        --card: #ffffff;
        --primary: #1c2b3a;
        --primary-lt: #2d4a6b;
        --text: #1c2b3a;
        --sub: #7a8899;
        --border: #e8e2da;
        --radius: 14px;
        --shadow:
          0 1px 3px rgba(28, 43, 58, 0.05), 0 6px 24px rgba(28, 43, 58, 0.09);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          "Noto Sans KR", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── LOGIN ── */
      #login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        background: linear-gradient(
          145deg,
          #1c2b3a 0%,
          #2d4a6b 50%,
          #1c3a5a 100%
        );
      }
      .login-card {
        background: #fff;
        border-radius: 24px;
        padding: 52px 44px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.28);
      }
      .login-emblem {
        text-align: center;
        margin-bottom: 28px;
      }
      .login-emblem .cross {
        font-size: 36px;
        display: block;
        margin-bottom: 10px;
      }
      .login-emblem .org {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--sub);
        text-transform: uppercase;
      }
      .login-card h1 {
        font-size: 22px;
        font-weight: 800;
        text-align: center;
        margin-bottom: 6px;
        color: var(--primary);
      }
      .login-card p {
        color: var(--sub);
        font-size: 13px;
        text-align: center;
        margin-bottom: 36px;
        line-height: 1.7;
      }
      .field {
        margin-bottom: 16px;
      }
      .field label {
        display: block;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--sub);
        margin-bottom: 8px;
      }
      .field input {
        width: 100%;
        padding: 13px 16px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 15px;
        background: var(--bg);
        outline: none;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .field input:focus {
        border-color: #6941c6;
        background: #fff;
      }
      .btn-login {
        width: 100%;
        margin-top: 8px;
        padding: 14px;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      .btn-login:hover {
        background: var(--primary-lt);
      }
      .btn-login:active {
        transform: scale(0.99);
      }
      .btn-login:disabled {
        background: #b0b8c1;
        cursor: not-allowed;
      }
      .err {
        display: none;
        color: #e04d47;
        font-size: 13px;
        margin-top: 12px;
        text-align: center;
      }

      /* ── HEADER ── */
      #dashboard {
        display: none;
        flex-direction: column;
        flex: 1;
      }
      .hdr {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--primary);
        height: 64px;
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .hdr-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .hdr-badge {
        width: 36px;
        height: 36px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .hdr-titles .t1 {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.5);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .hdr-titles .t2 {
        font-size: 16px;
        font-weight: 800;
        color: #fff;
        margin-top: 1px;
      }
      .btn-out {
        padding: 8px 18px;
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        background: transparent;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.8);
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-out:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      /* ── NOTICE ── */
      #notice-wrap {
        display: none;
        padding: 20px 32px 0;
      }
      .notice {
        background: linear-gradient(135deg, #fffbf0 0%, #fff8e1 100%);
        border: 1.5px solid #f5c842;
        border-radius: 16px;
        padding: 18px 22px;
        display: flex;
        align-items: flex-start;
        gap: 16px;
      }
      .notice-icon {
        font-size: 28px;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .notice-body {
        flex: 1;
        min-width: 0;
      }
      .notice-title {
        font-size: 13px;
        font-weight: 800;
        color: #7b5200;
        letter-spacing: 0.03em;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .notice-nav {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: 4px;
      }
      .nav-btn {
        width: 26px;
        height: 26px;
        border: 1.5px solid #f5c842;
        border-radius: 7px;
        background: #fff;
        color: #7b5200;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .nav-btn:hover {
        background: #fff0a0;
      }
      .notice-month-badge {
        background: #f5c842;
        color: #5c3d00;
        font-size: 11px;
        font-weight: 800;
        padding: 2px 10px;
        border-radius: 20px;
        letter-spacing: 0.04em;
      }
      .notice-cards {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }
      .nc {
        background: #fff;
        border: 1.5px solid #f5c842;
        border-radius: 12px;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .nc-av {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        flex-shrink: 0;
        text-align: center;
        padding: 3px;
      }
      .nc-av-ico {
        font-size: 14px;
        line-height: 1;
        margin-bottom: 1px;
      }
      .nc-av-lbl {
        font-size: 8px;
        font-weight: 800;
        opacity: 0.9;
      }
      .nc-info {
        min-width: 0;
      }
      .nc-name {
        font-size: 14px;
        font-weight: 800;
        color: var(--text);
      }
      .nc-bap {
        font-size: 11px;
        color: var(--sub);
        margin-top: 1px;
      }
      .nc-feast {
        font-size: 11px;
        color: #b89b2b;
        font-weight: 700;
        margin-top: 2px;
      }

      /* ── MAIN ── */
      .main {
        padding: 20px 32px 28px;
        max-width: 1440px;
        margin: 0 auto;
        width: 100%;
        flex: 1;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .sw {
        flex: 1;
        min-width: 220px;
        position: relative;
      }
      .sw input {
        width: 100%;
        padding: 11px 16px 11px 42px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        background: var(--card);
        outline: none;
        transition: border-color 0.2s;
        color: var(--text);
      }
      .sw input::placeholder {
        color: #b0b8c1;
      }
      .sw input:focus {
        border-color: #6941c6;
      }
      .sw-ico {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #b0b8c1;
        font-size: 15px;
        pointer-events: none;
      }
      .sel {
        padding: 11px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        background: var(--card);
        color: var(--text);
        outline: none;
        cursor: pointer;
        min-width: 130px;
      }
      .sel:focus {
        border-color: #6941c6;
      }

      .tab-section {
        margin-bottom: 14px;
      }
      .tab-group-label {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--sub);
        margin-bottom: 8px;
      }
      .tab-row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .dept-tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border: 1.5px solid var(--border);
        border-radius: 20px;
        background: var(--card);
        font-size: 13px;
        font-weight: 600;
        color: var(--sub);
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
        appearance: none;
        font-family: inherit;
      }
      .dept-tab:hover {
        border-color: #b0b8c1;
        color: var(--text);
      }
      .dept-tab.active {
        color: #fff;
        border-color: transparent;
      }
      .dept-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .chips {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .chip {
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 7px 18px;
        font-size: 13px;
        color: var(--sub);
      }
      .chip strong {
        color: var(--text);
        font-size: 15px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(308px, 1fr));
        gap: 16px;
      }

      /* ── CARD ── */
      .card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        display: flex;
        overflow: hidden;
        transition:
          transform 0.22s cubic-bezier(0.25, 0.8, 0.25, 1),
          box-shadow 0.22s;
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 48px rgba(28, 43, 58, 0.14);
      }
      .band {
        width: 5px;
        flex-shrink: 0;
      }
      .body {
        flex: 1;
        padding: 20px 20px 17px;
        min-width: 0;
      }
      .ct {
        display: flex;
        align-items: center;
        gap: 13px;
        margin-bottom: 11px;
      }
      .av {
        width: 50px;
        height: 50px;
        border-radius: 13px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        flex-shrink: 0;
        text-align: center;
        padding: 4px;
      }
      .av-ico {
        font-size: 18px;
        line-height: 1;
        margin-bottom: 2px;
      }
      .av-lbl {
        font-size: 9px;
        font-weight: 800;
        opacity: 0.9;
        letter-spacing: 0.02em;
      }
      .c-name {
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .c-bap {
        font-size: 12px;
        color: var(--sub);
        margin-top: 3px;
      }
      .badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .bdg {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 6px;
      }
      .bdg-role {
        background: #f0ece8;
        color: #6b7280;
      }
      .bdg-parish {
        background: #fdf0e0;
        color: #8b5e3c;
      }
      .bdg-no {
        background: #f0ebf8;
        color: #6941c6;
      }
      .bdg-feast {
        background: #fff8dc;
        color: #b89b2b;
      }
      .rows {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .row {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        font-size: 13px;
      }
      .r-ico {
        width: 26px;
        height: 26px;
        flex-shrink: 0;
        background: var(--bg);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        margin-top: 2px;
      }
      .r-val {
        line-height: 1.55;
        word-break: break-all;
        color: var(--text);
      }
      .r-val a {
        color: var(--text);
        text-decoration: none;
        transition: color 0.2s;
      }
      .r-val a:hover {
        color: #6941c6;
      }
      .zip {
        color: var(--sub);
        font-size: 11px;
        margin-left: 3px;
      }

      /* ── PAGINATION ── */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 28px;
        flex-wrap: wrap;
      }
      .pg-btn {
        min-width: 38px;
        height: 38px;
        padding: 0 12px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        background: var(--card);
        color: var(--sub);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }
      .pg-btn:hover:not(:disabled) {
        border-color: #6941c6;
        color: #6941c6;
      }
      .pg-btn.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .pg-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .btn-login:focus-visible,
      .btn-out:focus-visible,
      .nav-btn:focus-visible,
      .dept-tab:focus-visible,
      .pg-btn:focus-visible,
      .sw input:focus-visible,
      .sel:focus-visible {
        outline: 3px solid #f5c842;
        outline-offset: 2px;
      }
      .pg-info {
        font-size: 13px;
        color: var(--sub);
        padding: 0 8px;
      }

      /* ── FOOTER ── */
      footer {
        background: var(--primary);
        padding: 28px 32px;
        margin-top: auto;
      }
      .footer-inner {
        max-width: 1440px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
      }
      .footer-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .footer-badge {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .footer-text .ft1 {
        font-size: 15px;
        font-weight: 800;
        color: #fff;
      }
      .footer-text .ft2 {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
        margin-top: 3px;
        letter-spacing: 0.03em;
      }
      .footer-vl {
        width: 1px;
        height: 36px;
        background: rgba(255, 255, 255, 0.15);
      }
      .footer-info {
        font-size: 12px;
        line-height: 1.9;
        color: rgba(255, 255, 255, 0.45);
      }
      .footer-copy {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3);
      }

      .loading,
      .empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px;
        gap: 16px;
        color: var(--sub);
        font-size: 14px;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid var(--border);
        border-top-color: #6941c6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .empty-ico {
        font-size: 48px;
      }

      @media (max-width: 640px) {
        .main {
          padding: 16px 14px 24px;
        }
        .hdr {
          padding: 0 16px;
        }
        footer {
          padding: 22px 16px;
        }
        #notice-wrap {
          padding: 16px 14px 0;
        }
        .login-card {
          padding: 40px 24px;
          margin: 16px;
        }
        .footer-inner {
          flex-direction: column;
          align-items: flex-start;
        }
        .footer-vl {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── LOGIN ── -->
    <div id="login-screen">
      <div class="login-card">
        <div class="login-emblem">
          <span class="cross">✝️</span>
          <span class="org">수원교구 꾸르실료 사무국</span>
        </div>
        <h1>비상연락망</h1>
        <p>권한이 있는 분만 접근 가능합니다.<br />비밀번호를 입력해 주세요.</p>
        <div class="field">
          <label for="pw">비밀번호</label>
          <input type="password" id="pw" placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
        </div>
        <button class="btn-login" id="login-btn" type="button" disabled>
          로그인
        </button>
        <div class="err" id="err" role="alert" aria-live="assertive"></div>
      </div>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="dashboard">
      <header class="hdr">
        <div class="hdr-left">
          <div class="hdr-badge">✝️</div>
          <div class="hdr-titles">
            <div class="t1">수원교구 꾸르실료 사무국</div>
            <div class="t2">비상연락망</div>
          </div>
        </div>
        <button class="btn-out" id="logout-btn" type="button">로그아웃</button>
      </header>

      <!-- 축일 공지 -->
      <div id="notice-wrap">
        <div class="notice">
          <div class="notice-icon">🕯️</div>
          <div class="notice-body">
            <div class="notice-title">
              이달의 축일자
              <div class="notice-nav">
                <button class="nav-btn" id="notice-prev" type="button" aria-label="이전 달 축일자">◀</button>
                <span class="notice-month-badge" id="notice-month" aria-live="polite"></span>
                <button class="nav-btn" id="notice-next" type="button" aria-label="다음 달 축일자">▶</button>
              </div>
            </div>
            <div
              id="notice-empty"
              role="status"
              style="
                display: none;
                font-size: 13px;
                color: #b89b2b;
                padding: 4px 0;
              "
            >
              이 달에 축일자가 없습니다.
            </div>
            <div class="notice-cards" id="notice-cards" role="list"></div>
          </div>
        </div>
      </div>

      <main class="main">
        <div class="toolbar">
          <div class="sw">
            <span class="sw-ico" aria-hidden="true">🔍</span>
            <input
              type="text"
              id="q"
              placeholder="성명, 세례명, 본당으로 검색…"
              aria-label="연락처 검색"
            />
          </div>
          <select class="sel" id="f-parish" aria-label="본당 필터">
            <option value="">전체 본당</option>
          </select>
        </div>

        <div class="tab-section">
          <div class="tab-group-label">임원</div>
          <div class="tab-row" id="tabs-leader" role="group" aria-label="임원 필터"></div>
        </div>
        <div class="tab-section">
          <div class="tab-group-label">부서</div>
          <div class="tab-row" id="tabs-dept" role="group" aria-label="부서 필터"></div>
        </div>

        <div class="chips" aria-live="polite">
          <div class="chip">전체 <strong id="tot">0</strong>명</div>
          <div class="chip">표시 <strong id="shown">0</strong>명</div>
        </div>

        <div id="wrap">
          <div class="loading">
            <div class="spinner"></div>
            연락처를 불러오는 중…
          </div>
        </div>
        <div class="pagination" id="pagination"></div>
      </main>

      <footer>
        <div class="footer-inner">
          <div class="footer-left">
            <div class="footer-badge">✝️</div>
            <div class="footer-text">
              <div class="ft1">수원교구 꾸르실료 사무국</div>
              <div class="ft2">CURSILLO MOVEMENT · SUWON DIOCESE</div>
            </div>
            <div class="footer-vl"></div>
            <div class="footer-info">
              비상연락망 · 내부용 문서<br />무단 열람 및 배포를 금합니다
            </div>
          </div>
          <div class="footer-copy">© 수원교구 꾸르실료 사무국</div>
        </div>
      </footer>
    </div>

    <script id="app-script">
      "use strict";
      
      const LEADERS = [
        { key: "영성지도", color: "#6941C6", icon: "✝️", label: "영성지도" },
        { key: "부주간", color: "#0C7489", icon: "⭐", label: "부주간" },
        { key: "주간", color: "#1C4E80", icon: "👑", label: "주간" },
        { key: "감사", color: "#92600A", icon: "📋", label: "감사" },
      ];
      
      const DEPTS = [
        { key: "총무", color: "#2D7DD2", icon: "📁", label: "총무부" },
        { key: "교수", color: "#2D9B6F", icon: "📚", label: "교수부" },
        { key: "신심", color: "#9B5EA2", icon: "🙏", label: "신심부" },
        { key: "재무", color: "#D94F3D", icon: "💰", label: "재무부" },
        { key: "조직", color: "#D4762A", icon: "🔗", label: "조직부" },
        { key: "홍보", color: "#1A9BB5", icon: "📢", label: "홍보부" },
        { key: "행사", color: "#C4407A", icon: "🎉", label: "행사부" },
        { key: "음악", color: "#B89B2B", icon: "🎵", label: "음악부" },
      ];
      
      const DEFAULT_ST = Object.freeze({
        color: "#8A97A5",
        icon: "👤",
        label: "기타",
      });
      const MONTH_KR = [
        "",
        "1월",
        "2월",
        "3월",
        "4월",
        "5월",
        "6월",
        "7월",
        "8월",
        "9월",
        "10월",
        "11월",
        "12월",
      ];
      const PER_PAGE = 8;
      const API_TIMEOUT_MS = 12000;
      const ALLOWED_API_HOSTS = new Set([
        "script.google.com",
        "script.googleusercontent.com",
      ]);
      
      let API = "";
      let API_READY = false;
      let TOKEN = getSessionValue("ec_tok");
      let ALL = [];
      let FILTERED = [];
      let curPage = 1;
      let activeKey = "";
      let allTabEl = null;
      let noticeMonth = new Date().getMonth() + 1;
      const CLIENT_ID = getOrCreateClientId();
      
      function getStyle(role) {
        const normalizedRole = String(role || "").trim();
        if (!normalizedRole) return DEFAULT_ST;
        return (
          LEADERS.find((leader) => normalizedRole.includes(leader.key)) ||
          DEPTS.find((department) => normalizedRole.includes(department.key)) ||
          DEFAULT_ST
        );
      }
      
      function getKey(role) {
        const style = getStyle(role);
        return style === DEFAULT_ST ? null : style.key;
      }
      
      function parseFeast(value) {
        const match = String(value || "").match(/^(\d{1,2})\/(\d{1,2})$/);
        if (!match) return null;
      
        const month = Number(match[1]);
        const day = Number(match[2]);
        if (!Number.isInteger(month) || month < 1 || month > 12) return null;
        const lastDay = new Date(2000, month, 0).getDate();
        if (!Number.isInteger(day) || day < 1 || day > lastDay) return null;
        return { month, day };
      }
      
      async function initialize() {
        bindEvents();
        setLoginButtonState(true, "설정 불러오는 중…");
      
        try {
          const response = await fetch("index_cursillo_config.json", {
            cache: "no-store",
            credentials: "same-origin",
          });
          if (!response.ok) throw new Error("설정 응답 오류");
      
          const config = await response.json();
          API = validateApiUrl(config.api_url);
          API_READY = true;
          setLoginButtonState(false, "로그인");
      
          if (TOKEN) await showDash();
        } catch (error) {
          console.error(error);
          setLoginButtonState(true, "설정 오류");
          showErr("⚠️ 서비스 설정을 불러오지 못했습니다. 관리자에게 문의해 주세요.");
        }
      }
      
      function bindEvents() {
        document.getElementById("login-btn").addEventListener("click", login);
        document.getElementById("logout-btn").addEventListener("click", () => logout());
        document
          .getElementById("notice-prev")
          .addEventListener("click", () => moveMonth(-1));
        document
          .getElementById("notice-next")
          .addEventListener("click", () => moveMonth(1));
        document.getElementById("q").addEventListener("input", onSearch);
        document.getElementById("f-parish").addEventListener("change", onSearch);
        document.getElementById("pw").addEventListener("keydown", (event) => {
          if (event.key === "Enter") login();
        });
      }
      
      function validateApiUrl(value) {
        const url = new URL(String(value || ""));
        if (
          url.protocol !== "https:" ||
          !ALLOWED_API_HOSTS.has(url.hostname) ||
          url.username ||
          url.password
        ) {
          throw new Error("허용되지 않은 API 주소입니다.");
        }
        return url.href;
      }
      
      async function login() {
        const passwordInput = document.getElementById("pw");
        const password = passwordInput.value.trim();
        if (!API_READY) {
          showErr("⚠️ 서비스 설정을 확인하는 중입니다. 잠시 후 다시 시도해 주세요.");
          return;
        }
        if (!password) {
          showErr("⚠️ 비밀번호를 입력해 주세요.");
          passwordInput.focus();
          return;
        }
      
        setLoginButtonState(true, "확인 중…");
        hideErr();
        try {
          const data = await api({
            action: "login",
            password,
            clientId: CLIENT_ID,
          });
          if (!data.success) {
            showErr("⚠️ " + (data.message || "로그인 정보를 확인해 주세요."));
            return;
          }
      
          TOKEN = String(data.token || "");
          setSessionValue("ec_tok", TOKEN);
          passwordInput.value = "";
          await showDash();
        } catch (error) {
          console.error(error);
          showErr("⚠️ 서버에 연결할 수 없습니다.");
        } finally {
          setLoginButtonState(false, "로그인");
        }
      }
      
      async function showDash() {
        hideErr();
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display = "flex";
        setLoadingState();
        await loadContacts();
      }
      
      async function loadContacts() {
        try {
          const data = await api({ action: "getContacts", token: TOKEN });
          if (!data.success) {
            logout({
              notifyServer: false,
              message: "⚠️ " + (data.message || "세션이 만료되었습니다."),
            });
            return;
          }
          if (!Array.isArray(data.contacts)) throw new Error("잘못된 연락처 응답");
      
          ALL = data.contacts;
          buildNotice();
          buildTabs();
          buildParishFilter();
          doFilter();
        } catch (error) {
          console.error(error);
          const wrap = document.getElementById("wrap");
          wrap.replaceChildren(
            makeStateMessage("⚠️", "데이터를 불러오지 못했습니다."),
          );
        }
      }
      
      function buildNotice() {
        renderNotice();
        document.getElementById("notice-wrap").style.display = "block";
      }
      
      function moveMonth(direction) {
        noticeMonth += direction;
        if (noticeMonth < 1) noticeMonth = 12;
        if (noticeMonth > 12) noticeMonth = 1;
        renderNotice();
      }
      
      function renderNotice() {
        document.getElementById("notice-month").textContent = MONTH_KR[noticeMonth];
      
        const celebrants = ALL.map((contact) => {
          const feast = parseFeast(contact["축일"]);
          return feast && feast.month === noticeMonth ? { contact, feast } : null;
        })
          .filter(Boolean)
          .sort((left, right) => left.feast.day - right.feast.day);
      
        const emptyEl = document.getElementById("notice-empty");
        const cardsEl = document.getElementById("notice-cards");
        cardsEl.replaceChildren();
      
        if (!celebrants.length) {
          emptyEl.style.display = "block";
          return;
        }
        emptyEl.style.display = "none";
      
        celebrants.forEach(({ contact, feast }) => {
          const style = getStyle(contact["직책"]);
          const card = createElement("div", "nc");
          card.setAttribute("role", "listitem");
      
          const avatar = createElement("div", "nc-av");
          avatar.style.backgroundColor = style.color;
          avatar.append(
            createElement("span", "nc-av-ico", style.icon),
            createElement("span", "nc-av-lbl", style.label),
          );
      
          const info = createElement("div", "nc-info");
          info.append(
            createElement("div", "nc-name", contact["성명"] || "-"),
            createElement(
              "div",
              "nc-bap",
              `세례명 ${contact["세례명"] || "-"} · ${style.label}`,
            ),
            createElement(
              "div",
              "nc-feast",
              `🕯️ 축일 ${feast.month}월 ${feast.day}일 · ${contact["본당"] || ""}`,
            ),
          );
          card.append(avatar, info);
          cardsEl.appendChild(card);
        });
      }
      
      function buildTabs() {
        const leaderContainer = document.getElementById("tabs-leader");
        const departmentContainer = document.getElementById("tabs-dept");
        leaderContainer.replaceChildren();
        departmentContainer.replaceChildren();
      
        const usedKeys = new Set(ALL.map((contact) => getKey(contact["직책"])).filter(Boolean));
      
        allTabEl = makeTab("전체", "#8A97A5", () => {
          activeKey = "";
          setActive(allTabEl, "#8A97A5");
          doFilter();
        });
        leaderContainer.appendChild(allTabEl);
      
        LEADERS.forEach((leader) => {
          if (!usedKeys.has(leader.key)) return;
          const tab = makeTab(leader.label, leader.color, () => {
            activeKey = activeKey === leader.key ? "" : leader.key;
            setActive(activeKey ? tab : allTabEl, activeKey ? leader.color : "#8A97A5");
            doFilter();
          });
          leaderContainer.appendChild(tab);
        });
      
        DEPTS.forEach((department) => {
          if (!usedKeys.has(department.key)) return;
          const tab = makeTab(department.label, department.color, () => {
            activeKey = activeKey === department.key ? "" : department.key;
            setActive(
              activeKey ? tab : allTabEl,
              activeKey ? department.color : "#8A97A5",
            );
            doFilter();
          });
          departmentContainer.appendChild(tab);
        });
      
        setActive(allTabEl, "#8A97A5");
      }
      
      function makeTab(label, color, onClick) {
        const button = createElement("button", "dept-tab");
        button.type = "button";
        button.setAttribute("aria-pressed", "false");
      
        const dot = createElement("span", "dept-dot");
        dot.style.backgroundColor = color;
        dot.setAttribute("aria-hidden", "true");
        button.append(dot, document.createTextNode(label));
        button.addEventListener("click", onClick);
        return button;
      }
      
      function setActive(target, color) {
        document.querySelectorAll(".dept-tab").forEach((tab) => {
          const isActive = tab === target;
          tab.classList.toggle("active", isActive);
          tab.setAttribute("aria-pressed", String(isActive));
          tab.style.backgroundColor = isActive ? color : "";
          tab.style.color = isActive ? "#fff" : "";
        });
      }
      
      function buildParishFilter() {
        const select = document.getElementById("f-parish");
        select.replaceChildren(new Option("전체 본당", ""));
      
        [...new Set(ALL.map((contact) => contact["본당"]).filter(Boolean))]
          .sort((left, right) => left.localeCompare(right, "ko"))
          .forEach((parish) => select.add(new Option(parish, parish)));
      }
      
      function onSearch() {
        curPage = 1;
        doFilter();
      }
      
      function doFilter() {
        const query = document.getElementById("q").value.trim().toLocaleLowerCase("ko-KR");
        const parish = document.getElementById("f-parish").value;
      
        FILTERED = ALL.filter((contact) => {
          const queryMatches =
            !query ||
            ["성명", "세례명", "본당"].some((key) =>
              String(contact[key] || "")
                .toLocaleLowerCase("ko-KR")
                .includes(query),
            );
          const parishMatches = !parish || contact["본당"] === parish;
          const roleMatches = !activeKey || getKey(contact["직책"]) === activeKey;
          return queryMatches && parishMatches && roleMatches;
        });
        renderPage();
      }
      
      function renderPage() {
        const total = FILTERED.length;
        const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
        curPage = Math.min(curPage, totalPages);
      
        document.getElementById("tot").textContent = String(ALL.length);
        document.getElementById("shown").textContent = String(total);
      
        const wrap = document.getElementById("wrap");
        if (!total) {
          wrap.replaceChildren(makeStateMessage("🔍", "검색 결과가 없습니다."));
          document.getElementById("pagination").replaceChildren();
          return;
        }
      
        const start = (curPage - 1) * PER_PAGE;
        const pageList = FILTERED.slice(start, start + PER_PAGE);
        const currentMonth = new Date().getMonth() + 1;
        const grid = createElement("div", "grid");
        pageList.forEach((contact) => grid.appendChild(makeContactCard(contact, currentMonth)));
        wrap.replaceChildren(grid);
        buildPagination(totalPages);
      }
      
      function makeContactCard(contact, currentMonth) {
        const style = getStyle(contact["직책"]);
        const feast = parseFeast(contact["축일"]);
        const isThisMonth = Boolean(feast && feast.month === currentMonth);
        const card = createElement("article", "card");
        if (isThisMonth) card.style.boxShadow = "0 0 0 2px #F5C842,var(--shadow)";
      
        const band = createElement("div", "band");
        band.style.backgroundColor = isThisMonth ? "#F5C842" : style.color;
        band.setAttribute("aria-hidden", "true");
      
        const body = createElement("div", "body");
        const cardTop = createElement("div", "ct");
        const avatar = createElement("div", "av");
        avatar.style.backgroundColor = style.color;
        avatar.append(
          createElement("span", "av-ico", style.icon),
          createElement("span", "av-lbl", style.label),
        );
      
        const identity = createElement("div");
        identity.appendChild(createElement("div", "c-name", contact["성명"] || "-"));
        if (contact["세례명"]) {
          identity.appendChild(
            createElement("div", "c-bap", `세례명 ${contact["세례명"]}`),
          );
        }
        cardTop.append(avatar, identity);
      
        const badges = createElement("div", "badges");
        const categoryBadge = createElement("span", "bdg", style.label);
        categoryBadge.style.backgroundColor = hexAlpha(style.color, 0.12);
        categoryBadge.style.color = style.color;
        badges.append(
          categoryBadge,
          createElement("span", "bdg bdg-role", contact["직책"] || "-"),
        );
      
        if (feast) {
          const feastBadge = createElement(
            "span",
            "bdg bdg-feast",
            `🕯️ ${feast.month}/${feast.day}`,
          );
          if (isThisMonth) {
            feastBadge.style.backgroundColor = "#FFF0A0";
            feastBadge.style.color = "#8B6A00";
            feastBadge.style.border = "1px solid #F5C842";
          }
          badges.appendChild(feastBadge);
        }
        if (contact["본당"]) {
          badges.appendChild(
            createElement("span", "bdg bdg-parish", `🏛 ${contact["본당"]}`),
          );
        }
        if (contact["차수"]) {
          badges.appendChild(
            createElement("span", "bdg bdg-no", `제${contact["차수"]}차`),
          );
        }
      
        const rows = createElement("div", "rows");
        if (contact["전화번호"]) {
          rows.appendChild(
            makeDetailRow("📞", contact["전화번호"], safeTelHref(contact["전화번호"])),
          );
        }
        if (contact["이메일"]) {
          rows.appendChild(
            makeDetailRow("✉️", contact["이메일"], safeMailHref(contact["이메일"])),
          );
        }
        if (contact["주소"]) {
          const addressRow = makeDetailRow("📍", contact["주소"]);
          if (contact["우편번호"]) {
            addressRow
              .querySelector(".r-val")
              .appendChild(createElement("span", "zip", `(${contact["우편번호"]})`));
          }
          rows.appendChild(addressRow);
        }
      
        body.append(cardTop, badges, rows);
        card.append(band, body);
        return card;
      }
      
      function makeDetailRow(icon, value, href = "") {
        const row = createElement("div", "row");
        const iconElement = createElement("div", "r-ico", icon);
        iconElement.setAttribute("aria-hidden", "true");
        const valueElement = createElement("div", "r-val");
      
        if (href) {
          const link = createElement("a", "", value);
          link.href = href;
          valueElement.appendChild(link);
        } else {
          valueElement.appendChild(document.createTextNode(String(value)));
        }
        row.append(iconElement, valueElement);
        return row;
      }
      
      function safeTelHref(value) {
        const telephone = String(value || "").trim();
        if (!/^\+?[0-9 ()-]{3,30}$/.test(telephone)) return "";
        return "tel:" + telephone.replace(/[ ()-]/g, "");
      }
      
      function safeMailHref(value) {
        const email = String(value || "").trim();
        if (email.length > 254 || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return "";
        return "mailto:" + email;
      }
      
      function buildPagination(totalPages) {
        const container = document.getElementById("pagination");
        container.replaceChildren();
        if (totalPages <= 1) return;
      
        container.appendChild(
          makePageButton("◀", curPage - 1, curPage === 1, "이전 페이지"),
        );
        pageRange(curPage, totalPages).forEach((page) => {
          if (page === "…") {
            container.appendChild(createElement("span", "pg-info", "…"));
            return;
          }
          const button = makePageButton(String(page), page, false, `${page}페이지`);
          if (page === curPage) {
            button.classList.add("active");
            button.setAttribute("aria-current", "page");
          }
          container.appendChild(button);
        });
        container.append(
          makePageButton("▶", curPage + 1, curPage === totalPages, "다음 페이지"),
          createElement("span", "pg-info", `${curPage} / ${totalPages} 페이지`),
        );
      }
      
      function makePageButton(label, page, disabled, ariaLabel) {
        const button = createElement("button", "pg-btn", label);
        button.type = "button";
        button.disabled = disabled;
        button.setAttribute("aria-label", ariaLabel);
        button.addEventListener("click", () => goPage(page));
        return button;
      }
      
      function pageRange(current, total) {
        if (total <= 5) return Array.from({ length: total }, (_, index) => index + 1);
        if (current <= 3) return [1, 2, 3, 4, "…", total];
        if (current >= total - 2) {
          return [1, "…", total - 3, total - 2, total - 1, total];
        }
        return [1, "…", current - 1, current, current + 1, "…", total];
      }
      
      function goPage(page) {
        const totalPages = Math.ceil(FILTERED.length / PER_PAGE);
        if (page < 1 || page > totalPages || page === curPage) return;
        curPage = page;
        renderPage();
        document.querySelector(".main").scrollIntoView({ behavior: "smooth", block: "start" });
      }
      
      function hexAlpha(hex, alpha) {
        const red = Number.parseInt(hex.slice(1, 3), 16);
        const green = Number.parseInt(hex.slice(3, 5), 16);
        const blue = Number.parseInt(hex.slice(5, 7), 16);
        return `rgba(${red},${green},${blue},${alpha})`;
      }
      
      function logout({ notifyServer = true, message = "" } = {}) {
        const oldToken = TOKEN;
        TOKEN = "";
        ALL = [];
        FILTERED = [];
        activeKey = "";
        allTabEl = null;
        curPage = 1;
        noticeMonth = new Date().getMonth() + 1;
        removeSessionValue("ec_tok");
      
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("pw").value = "";
        document.getElementById("q").value = "";
        document.getElementById("f-parish").replaceChildren(new Option("전체 본당", ""));
        document.getElementById("tabs-leader").replaceChildren();
        document.getElementById("tabs-dept").replaceChildren();
        document.getElementById("pagination").replaceChildren();
        document.getElementById("notice-cards").replaceChildren();
        document.getElementById("notice-wrap").style.display = "none";
        document.getElementById("tot").textContent = "0";
        document.getElementById("shown").textContent = "0";
        setLoadingState();
      
        if (message) showErr(message);
        else hideErr();
        document.getElementById("pw").focus();
      
        if (notifyServer && API_READY && oldToken) {
          api({ action: "logout", token: oldToken }).catch((error) => console.error(error));
        }
      }
      
      async function api(payload) {
        if (!API_READY || !API) throw new Error("API가 준비되지 않았습니다.");
      
        const controller = new AbortController();
        const timeoutId = window.setTimeout(() => controller.abort(), API_TIMEOUT_MS);
        try {
          const response = await fetch(API, {
            method: "POST",
            headers: {
              Accept: "application/json",
              "Content-Type": "text/plain;charset=UTF-8",
            },
            body: JSON.stringify(payload),
            cache: "no-store",
            redirect: "follow",
            referrerPolicy: "no-referrer",
            signal: controller.signal,
          });
          if (!response.ok) throw new Error(`API 응답 오류: ${response.status}`);
      
          const data = await response.json();
          if (!data || typeof data !== "object" || Array.isArray(data)) {
            throw new Error("잘못된 API 응답입니다.");
          }
          return data;
        } finally {
          window.clearTimeout(timeoutId);
        }
      }
      
      function createElement(tagName, className = "", text) {
        const element = document.createElement(tagName);
        if (className) element.className = className;
        if (text !== undefined && text !== null) element.textContent = String(text);
        return element;
      }
      
      function makeStateMessage(icon, message) {
        const element = createElement("div", "empty");
        element.append(
          createElement("span", "empty-ico", icon),
          document.createTextNode(message),
        );
        return element;
      }
      
      function setLoadingState() {
        const loading = createElement("div", "loading");
        const spinner = createElement("div", "spinner");
        spinner.setAttribute("aria-hidden", "true");
        loading.append(spinner, document.createTextNode("연락처를 불러오는 중…"));
        document.getElementById("wrap").replaceChildren(loading);
      }
      
      function setLoginButtonState(disabled, text) {
        const button = document.getElementById("login-btn");
        button.disabled = disabled;
        button.textContent = text;
      }
      
      function showErr(message) {
        const errorElement = document.getElementById("err");
        errorElement.textContent = message;
        errorElement.style.display = "block";
      }
      
      function hideErr() {
        const errorElement = document.getElementById("err");
        errorElement.textContent = "";
        errorElement.style.display = "none";
      }
      
      function getOrCreateClientId() {
        const existing = getSessionValue("ec_client_id");
        if (/^[A-Za-z0-9_-]{20,128}$/.test(existing)) return existing;
      
        let id;
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          id = window.crypto.randomUUID().replace(/-/g, "");
        } else if (window.crypto && typeof window.crypto.getRandomValues === "function") {
          const bytes = window.crypto.getRandomValues(new Uint8Array(24));
          id = Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("");
        } else {
          id = `${Date.now()}_${Math.random().toString(36).slice(2)}_${Math.random()
            .toString(36)
            .slice(2)}`;
        }
        setSessionValue("ec_client_id", id);
        return id;
      }
      
      function getSessionValue(key) {
        try {
          return sessionStorage.getItem(key) || "";
        } catch {
          return "";
        }
      }
      
      function setSessionValue(key, value) {
        try {
          sessionStorage.setItem(key, value);
        } catch (error) {
          console.error(error);
        }
      }
      
      function removeSessionValue(key) {
        try {
          sessionStorage.removeItem(key);
        } catch (error) {
          console.error(error);
        }
      }
      /*
       * 기존 CJS 보안 테스트 중 브라우저에서 검증 가능한 항목을 단일 HTML용
       * 자체검사로 변환했다. URL 끝에 ?selftest=1을 붙이면 콘솔과
       * <html data-security-self-test="passed|failed">에서 결과를 확인할 수 있다.
       */
      function runEmbeddedSecurityTests() {
        const results = [];
      
        function check(name, test) {
          try {
            const passed = Boolean(test());
            results.push({ name, passed, error: passed ? "" : "검증식이 false를 반환했습니다." });
          } catch (error) {
            results.push({ name, passed: false, error: String(error && error.message ? error.message : error) });
          }
        }
      
        function throws(test) {
          try {
            test();
            return false;
          } catch {
            return true;
          }
        }
      
        check("유효한 윤년 축일 파싱", () => {
          const feast = parseFeast("2/29");
          return feast && feast.month === 2 && feast.day === 29;
        });
        check("존재하지 않는 축일 거부", () => parseFeast("2/30") === null);
        check("전화 링크 속성 삽입 차단", () => safeTelHref('010" onclick="alert(1)') === "");
        check("이메일 링크 속성 삽입 차단", () => safeMailHref('a@b.org" onclick="alert(1)') === "");
        check("외부 API 호스트 거부", () =>
          throws(() => validateApiUrl("https://example.com/api")),
        );
        check("인라인 이벤트 핸들러 없음", () =>
          document.querySelector("[onclick],[onchange],[oninput],[onkeydown]") === null,
        );
        check("외부 애플리케이션 JS 의존성 없음", () =>
          document.querySelector('script[src*="index_cursillo_v0.2.js"]') === null,
        );
        check("해시 기반 CSP 적용", () => {
          const policy = document
            .querySelector('meta[http-equiv="Content-Security-Policy"]')
            ?.getAttribute("content");
          return Boolean(policy && /script-src 'sha256-[A-Za-z0-9+/=]+'/.test(policy));
        });
      
        const failed = results.filter((result) => !result.passed).length;
        const report = { passed: results.length - failed, failed, results };
        document.documentElement.dataset.securitySelfTest = failed ? "failed" : "passed";
        console.table(results);
        if (failed) console.error("내장 보안 자체검사 실패", report);
        else console.info("내장 보안 자체검사 통과", report);
        return report;
      }
      
      const selfTestEnabled =
        new URL(window.location.href).searchParams.get("selftest") === "1";
      
      initialize();
      if (selfTestEnabled) {
        window.addEventListener("load", runEmbeddedSecurityTests, { once: true });
      }
    </script>
  </body>
</html>
