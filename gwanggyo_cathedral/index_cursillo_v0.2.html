<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수원교구 꾸르실료 비상연락망</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #f7f3ef;
        --card: #ffffff;
        --primary: #1c2b3a;
        --primary-lt: #2d4a6b;
        --text: #1c2b3a;
        --sub: #7a8899;
        --border: #e8e2da;
        --radius: 14px;
        --shadow:
          0 1px 3px rgba(28, 43, 58, 0.05), 0 6px 24px rgba(28, 43, 58, 0.09);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          "Noto Sans KR", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── LOGIN ── */
      #login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        background: linear-gradient(
          145deg,
          #1c2b3a 0%,
          #2d4a6b 50%,
          #1c3a5a 100%
        );
      }
      .login-card {
        background: #fff;
        border-radius: 24px;
        padding: 52px 44px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.28);
      }
      .login-emblem {
        text-align: center;
        margin-bottom: 28px;
      }
      .login-emblem .cross {
        font-size: 36px;
        display: block;
        margin-bottom: 10px;
      }
      .login-emblem .org {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--sub);
        text-transform: uppercase;
      }
      .login-card h1 {
        font-size: 22px;
        font-weight: 800;
        text-align: center;
        margin-bottom: 6px;
        color: var(--primary);
      }
      .login-card p {
        color: var(--sub);
        font-size: 13px;
        text-align: center;
        margin-bottom: 36px;
        line-height: 1.7;
      }
      .field {
        margin-bottom: 16px;
      }
      .field label {
        display: block;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--sub);
        margin-bottom: 8px;
      }
      .field input {
        width: 100%;
        padding: 13px 16px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 15px;
        background: var(--bg);
        outline: none;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .field input:focus {
        border-color: #6941c6;
        background: #fff;
      }
      .btn-login {
        width: 100%;
        margin-top: 8px;
        padding: 14px;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      .btn-login:hover {
        background: var(--primary-lt);
      }
      .btn-login:active {
        transform: scale(0.99);
      }
      .btn-login:disabled {
        background: #b0b8c1;
        cursor: not-allowed;
      }
      .err {
        display: none;
        color: #e04d47;
        font-size: 13px;
        margin-top: 12px;
        text-align: center;
      }

      /* ── HEADER ── */
      #dashboard {
        display: none;
        flex-direction: column;
        flex: 1;
      }
      .hdr {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--primary);
        height: 64px;
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .hdr-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .hdr-badge {
        width: 36px;
        height: 36px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .hdr-titles .t1 {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.5);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .hdr-titles .t2 {
        font-size: 16px;
        font-weight: 800;
        color: #fff;
        margin-top: 1px;
      }
      .btn-out {
        padding: 8px 18px;
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        background: transparent;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.8);
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-out:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      /* ── NOTICE ── */
      #notice-wrap {
        display: none;
        padding: 20px 32px 0;
      }
      .notice {
        background: linear-gradient(135deg, #fffbf0 0%, #fff8e1 100%);
        border: 1.5px solid #f5c842;
        border-radius: 16px;
        padding: 18px 22px;
        display: flex;
        align-items: flex-start;
        gap: 16px;
      }
      .notice-icon {
        font-size: 28px;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .notice-body {
        flex: 1;
        min-width: 0;
      }
      .notice-title {
        font-size: 13px;
        font-weight: 800;
        color: #7b5200;
        letter-spacing: 0.03em;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .notice-nav {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: 4px;
      }
      .nav-btn {
        width: 26px;
        height: 26px;
        border: 1.5px solid #f5c842;
        border-radius: 7px;
        background: #fff;
        color: #7b5200;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .nav-btn:hover {
        background: #fff0a0;
      }
      .notice-month-badge {
        background: #f5c842;
        color: #5c3d00;
        font-size: 11px;
        font-weight: 800;
        padding: 2px 10px;
        border-radius: 20px;
        letter-spacing: 0.04em;
      }
      .notice-cards {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }
      .nc {
        background: #fff;
        border: 1.5px solid #f5c842;
        border-radius: 12px;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .nc-av {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        flex-shrink: 0;
        text-align: center;
        padding: 3px;
      }
      .nc-av-ico {
        font-size: 14px;
        line-height: 1;
        margin-bottom: 1px;
      }
      .nc-av-lbl {
        font-size: 8px;
        font-weight: 800;
        opacity: 0.9;
      }
      .nc-info {
        min-width: 0;
      }
      .nc-name {
        font-size: 14px;
        font-weight: 800;
        color: var(--text);
      }
      .nc-bap {
        font-size: 11px;
        color: var(--sub);
        margin-top: 1px;
      }
      .nc-feast {
        font-size: 11px;
        color: #b89b2b;
        font-weight: 700;
        margin-top: 2px;
      }

      /* ── MAIN ── */
      .main {
        padding: 20px 32px 28px;
        max-width: 1440px;
        margin: 0 auto;
        width: 100%;
        flex: 1;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .sw {
        flex: 1;
        min-width: 220px;
        position: relative;
      }
      .sw input {
        width: 100%;
        padding: 11px 16px 11px 42px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        background: var(--card);
        outline: none;
        transition: border-color 0.2s;
        color: var(--text);
      }
      .sw input::placeholder {
        color: #b0b8c1;
      }
      .sw input:focus {
        border-color: #6941c6;
      }
      .sw-ico {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #b0b8c1;
        font-size: 15px;
        pointer-events: none;
      }
      .sel {
        padding: 11px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        background: var(--card);
        color: var(--text);
        outline: none;
        cursor: pointer;
        min-width: 130px;
      }
      .sel:focus {
        border-color: #6941c6;
      }

      .tab-section {
        margin-bottom: 14px;
      }
      .tab-group-label {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--sub);
        margin-bottom: 8px;
      }
      .tab-row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .dept-tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border: 1.5px solid var(--border);
        border-radius: 20px;
        background: var(--card);
        font-size: 13px;
        font-weight: 600;
        color: var(--sub);
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .dept-tab:hover {
        border-color: #b0b8c1;
        color: var(--text);
      }
      .dept-tab.active {
        color: #fff;
        border-color: transparent;
      }
      .dept-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .chips {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .chip {
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 7px 18px;
        font-size: 13px;
        color: var(--sub);
      }
      .chip strong {
        color: var(--text);
        font-size: 15px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(308px, 1fr));
        gap: 16px;
      }

      /* ── CARD ── */
      .card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        display: flex;
        overflow: hidden;
        transition:
          transform 0.22s cubic-bezier(0.25, 0.8, 0.25, 1),
          box-shadow 0.22s;
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 48px rgba(28, 43, 58, 0.14);
      }
      .band {
        width: 5px;
        flex-shrink: 0;
      }
      .body {
        flex: 1;
        padding: 20px 20px 17px;
        min-width: 0;
      }
      .ct {
        display: flex;
        align-items: center;
        gap: 13px;
        margin-bottom: 11px;
      }
      .av {
        width: 50px;
        height: 50px;
        border-radius: 13px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        flex-shrink: 0;
        text-align: center;
        padding: 4px;
      }
      .av-ico {
        font-size: 18px;
        line-height: 1;
        margin-bottom: 2px;
      }
      .av-lbl {
        font-size: 9px;
        font-weight: 800;
        opacity: 0.9;
        letter-spacing: 0.02em;
      }
      .c-name {
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .c-bap {
        font-size: 12px;
        color: var(--sub);
        margin-top: 3px;
      }
      .badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .bdg {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 6px;
      }
      .bdg-role {
        background: #f0ece8;
        color: #6b7280;
      }
      .bdg-parish {
        background: #fdf0e0;
        color: #8b5e3c;
      }
      .bdg-no {
        background: #f0ebf8;
        color: #6941c6;
      }
      .bdg-feast {
        background: #fff8dc;
        color: #b89b2b;
      }
      .rows {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .row {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        font-size: 13px;
      }
      .r-ico {
        width: 26px;
        height: 26px;
        flex-shrink: 0;
        background: var(--bg);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        margin-top: 2px;
      }
      .r-val {
        line-height: 1.55;
        word-break: break-all;
        color: var(--text);
      }
      .r-val a {
        color: var(--text);
        text-decoration: none;
        transition: color 0.2s;
      }
      .r-val a:hover {
        color: #6941c6;
      }
      .zip {
        color: var(--sub);
        font-size: 11px;
        margin-left: 3px;
      }

      /* ── PAGINATION ── */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 28px;
        flex-wrap: wrap;
      }
      .pg-btn {
        min-width: 38px;
        height: 38px;
        padding: 0 12px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        background: var(--card);
        color: var(--sub);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }
      .pg-btn:hover:not(:disabled) {
        border-color: #6941c6;
        color: #6941c6;
      }
      .pg-btn.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .pg-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .pg-info {
        font-size: 13px;
        color: var(--sub);
        padding: 0 8px;
      }

      /* ── FOOTER ── */
      footer {
        background: var(--primary);
        padding: 28px 32px;
        margin-top: auto;
      }
      .footer-inner {
        max-width: 1440px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
      }
      .footer-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .footer-badge {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .footer-text .ft1 {
        font-size: 15px;
        font-weight: 800;
        color: #fff;
      }
      .footer-text .ft2 {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
        margin-top: 3px;
        letter-spacing: 0.03em;
      }
      .footer-vl {
        width: 1px;
        height: 36px;
        background: rgba(255, 255, 255, 0.15);
      }
      .footer-info {
        font-size: 12px;
        line-height: 1.9;
        color: rgba(255, 255, 255, 0.45);
      }
      .footer-copy {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3);
      }

      .loading,
      .empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px;
        gap: 16px;
        color: var(--sub);
        font-size: 14px;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid var(--border);
        border-top-color: #6941c6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .empty-ico {
        font-size: 48px;
      }

      @media (max-width: 640px) {
        .main {
          padding: 16px 14px 24px;
        }
        .hdr {
          padding: 0 16px;
        }
        footer {
          padding: 22px 16px;
        }
        #notice-wrap {
          padding: 16px 14px 0;
        }
        .login-card {
          padding: 40px 24px;
          margin: 16px;
        }
        .footer-inner {
          flex-direction: column;
          align-items: flex-start;
        }
        .footer-vl {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── LOGIN ── -->
    <div id="login-screen">
      <div class="login-card">
        <div class="login-emblem">
          <span class="cross">✝️</span>
          <span class="org">수원교구 꾸르실료 사무국</span>
        </div>
        <h1>비상연락망</h1>
        <p>권한이 있는 분만 접근 가능합니다.<br />비밀번호를 입력해 주세요.</p>
        <div class="field">
          <label>비밀번호</label>
          <input type="password" id="pw" placeholder="비밀번호를 입력하세요" />
        </div>
        <button class="btn-login" id="login-btn" onclick="login()">
          로그인
        </button>
        <div class="err" id="err"></div>
      </div>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="dashboard">
      <header class="hdr">
        <div class="hdr-left">
          <div class="hdr-badge">✝️</div>
          <div class="hdr-titles">
            <div class="t1">수원교구 꾸르실료 사무국</div>
            <div class="t2">비상연락망</div>
          </div>
        </div>
        <button class="btn-out" onclick="logout()">로그아웃</button>
      </header>

      <!-- 축일 공지 -->
      <div id="notice-wrap">
        <div class="notice">
          <div class="notice-icon">🕯️</div>
          <div class="notice-body">
            <div class="notice-title">
              이달의 축일자
              <div class="notice-nav">
                <button class="nav-btn" onclick="moveMonth(-1)">◀</button>
                <span class="notice-month-badge" id="notice-month"></span>
                <button class="nav-btn" onclick="moveMonth(1)">▶</button>
              </div>
            </div>
            <div
              id="notice-empty"
              style="
                display: none;
                font-size: 13px;
                color: #b89b2b;
                padding: 4px 0;
              "
            >
              이 달에 축일자가 없습니다.
            </div>
            <div class="notice-cards" id="notice-cards"></div>
          </div>
        </div>
      </div>

      <main class="main">
        <div class="toolbar">
          <div class="sw">
            <span class="sw-ico">🔍</span>
            <input
              type="text"
              id="q"
              placeholder="성명, 세례명, 본당으로 검색…"
              oninput="onSearch()"
            />
          </div>
          <select class="sel" id="f-parish" onchange="onSearch()">
            <option value="">전체 본당</option>
          </select>
        </div>

        <div class="tab-section">
          <div class="tab-group-label">임원</div>
          <div class="tab-row" id="tabs-leader"></div>
        </div>
        <div class="tab-section">
          <div class="tab-group-label">부서</div>
          <div class="tab-row" id="tabs-dept"></div>
        </div>

        <div class="chips">
          <div class="chip">전체 <strong id="tot">0</strong>명</div>
          <div class="chip">표시 <strong id="shown">0</strong>명</div>
        </div>

        <div id="wrap">
          <div class="loading">
            <div class="spinner"></div>
            연락처를 불러오는 중…
          </div>
        </div>
        <div class="pagination" id="pagination"></div>
      </main>

      <footer>
        <div class="footer-inner">
          <div class="footer-left">
            <div class="footer-badge">✝️</div>
            <div class="footer-text">
              <div class="ft1">수원교구 꾸르실료 사무국</div>
              <div class="ft2">CURSILLO MOVEMENT · SUWON DIOCESE</div>
            </div>
            <div class="footer-vl"></div>
            <div class="footer-info">
              비상연락망 · 내부용 문서<br />무단 열람 및 배포를 금합니다
            </div>
          </div>
          <div class="footer-copy">© 수원교구 꾸르실료 사무국</div>
        </div>
      </footer>
    </div>

    <script>
      /* ══════════════════════════════════════════════════
     분류 정의 (임원 / 부서)
  ══════════════════════════════════════════════════ */
      const LEADERS = [
        { key: "영성지도", color: "#6941C6", icon: "✝️", label: "영성지도" },
        { key: "부주간", color: "#0C7489", icon: "⭐", label: "부주간" }, // 부주간 먼저
        { key: "주간", color: "#1C4E80", icon: "👑", label: "주간" },
        { key: "감사", color: "#92600A", icon: "📋", label: "감사" },
      ];
      const DEPTS = [
        { key: "총무", color: "#2D7DD2", icon: "📁", label: "총무부" },
        { key: "교수", color: "#2D9B6F", icon: "📚", label: "교수부" },
        { key: "신심", color: "#9B5EA2", icon: "🙏", label: "신심부" },
        { key: "재무", color: "#D94F3D", icon: "💰", label: "재무부" },
        { key: "조직", color: "#D4762A", icon: "🔗", label: "조직부" },
        { key: "홍보", color: "#1A9BB5", icon: "📢", label: "홍보부" },
        { key: "행사", color: "#C4407A", icon: "🎉", label: "행사부" },
        { key: "음악", color: "#B89B2B", icon: "🎵", label: "음악부" },
      ];
      const DEFAULT_ST = { color: "#8A97A5", icon: "👤", label: "기타" };

      function getStyle(role) {
        if (!role) return DEFAULT_ST;
        const r = role.trim();
        return (
          LEADERS.find((l) => r.includes(l.key)) ||
          DEPTS.find((d) => r.includes(d.key)) ||
          DEFAULT_ST
        );
      }
      function getKey(role) {
        const s = getStyle(role);
        return s === DEFAULT_ST ? null : s.key;
      }

      /* ══════════════════════════════════════════════════
     축일 유틸 — 시트의 "축일" 열 값(M/D 문자열) 직접 사용
  ══════════════════════════════════════════════════ */
      const MONTH_KR = [
        "",
        "1월",
        "2월",
        "3월",
        "4월",
        "5월",
        "6월",
        "7월",
        "8월",
        "9월",
        "10월",
        "11월",
        "12월",
      ];

      /* "9/20" → { month:9, day:20 } / 파싱 실패 → null */
      function parseFeast(str) {
        if (!str) return null;
        const m = str.match(/^(\d{1,2})\/(\d{1,2})$/);
        if (!m) return null;
        return { month: parseInt(m[1]), day: parseInt(m[2]) };
      }

      /* ── 상수 ── */
      const PER_PAGE = 8;

      /* ── 상태 ── */
      let API = "",
        TOKEN = sessionStorage.getItem("ec_tok") || "",
        ALL = [];
      let FILTERED = [],
        curPage = 1;
      let activeKey = "",
        allTabEl = null;
      let noticeMonth = new Date().getMonth() + 1; // 공지 표시 월 (1~12)

      /* ── 초기화 ── */
      (async () => {
        try {
          const cfg = await fetch("index_cursillo_config.json").then((r) => r.json());
          API = cfg.api_url;
          if (TOKEN) showDash();
        } catch {
          showErr("⚠️ index_cursillo_config.json을 불러올 수 없습니다.");
        }
      })();

      /* ── 로그인 ── */
      async function login() {
        const pw = document.getElementById("pw").value.trim();
        const btn = document.getElementById("login-btn");
        if (!pw) return;
        btn.disabled = true;
        btn.textContent = "확인 중…";
        hideErr();
        try {
          const d = await api({ action: "login", password: pw });
          if (d.success) {
            TOKEN = d.token;
            sessionStorage.setItem("ec_tok", TOKEN);
            showDash();
          } else
            showErr("⚠️ " + (d.message || "비밀번호가 올바르지 않습니다."));
        } catch {
          showErr("⚠️ 서버에 연결할 수 없습니다.");
        }
        btn.disabled = false;
        btn.textContent = "로그인";
      }

      async function showDash() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display = "flex";
        await load();
      }

      async function load() {
        try {
          const d = await api({ action: "getContacts", token: TOKEN });
          if (d.success) {
            ALL = d.contacts;
            buildNotice();
            buildTabs();
            buildParishFilter();
            doFilter();
          } else logout();
        } catch {
          document.getElementById("wrap").innerHTML =
            `<div class="empty"><span class="empty-ico">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
        }
      }

      /* ══════════════════════════════════════════════════
     축일 공지 — 지정 월(noticeMonth) 기준으로 렌더
  ══════════════════════════════════════════════════ */
      function buildNotice() {
        renderNotice();
        document.getElementById("notice-wrap").style.display = "block";
      }

      function moveMonth(dir) {
        noticeMonth += dir;
        if (noticeMonth < 1) noticeMonth = 12;
        if (noticeMonth > 12) noticeMonth = 1;
        renderNotice();
      }

      function renderNotice() {
        document.getElementById("notice-month").textContent =
          MONTH_KR[noticeMonth];

        const celebrants = ALL.map((c) => {
          const feast = parseFeast(c["축일"]);
          if (!feast || feast.month !== noticeMonth) return null;
          return { c, feast };
        })
          .filter(Boolean)
          .sort((a, b) => a.feast.day - b.feast.day);

        const emptyEl = document.getElementById("notice-empty");
        const cardsEl = document.getElementById("notice-cards");

        if (!celebrants.length) {
          emptyEl.style.display = "block";
          cardsEl.innerHTML = "";
          return;
        }
        emptyEl.style.display = "none";

        cardsEl.innerHTML = celebrants
          .map(({ c, feast }) => {
            const st = getStyle(c["직책"]);
            return `
      <div class="nc">
        <div class="nc-av" style="background:${st.color}">
          <span class="nc-av-ico">${st.icon}</span>
          <span class="nc-av-lbl">${st.label}</span>
        </div>
        <div class="nc-info">
          <div class="nc-name">${c["성명"] || "-"}</div>
          <div class="nc-bap">세례명 ${c["세례명"] || "-"} · ${st.label}</div>
          <div class="nc-feast">🕯️ 축일 ${feast.month}월 ${feast.day}일 · ${c["본당"] || ""}</div>
        </div>
      </div>`;
          })
          .join("");
      }

      /* ── 탭 생성 ── */
      function buildTabs() {
        const usedKeys = new Set(
          ALL.map((c) => getKey(c["직책"])).filter(Boolean),
        );

        allTabEl = makeTab("전체", "#8A97A5", () => {
          activeKey = "";
          setActive(allTabEl, "#8A97A5");
          doFilter();
        });
        document.getElementById("tabs-leader").appendChild(allTabEl);

        LEADERS.forEach((l) => {
          if (!usedKeys.has(l.key)) return;
          const tab = makeTab(l.label, l.color, () => {
            activeKey = activeKey === l.key ? "" : l.key;
            setActive(
              activeKey ? tab : allTabEl,
              activeKey ? l.color : "#8A97A5",
            );
            doFilter();
          });
          document.getElementById("tabs-leader").appendChild(tab);
        });

        DEPTS.forEach((d) => {
          if (!usedKeys.has(d.key)) return;
          const tab = makeTab(d.label, d.color, () => {
            activeKey = activeKey === d.key ? "" : d.key;
            setActive(
              activeKey ? tab : allTabEl,
              activeKey ? d.color : "#8A97A5",
            );
            doFilter();
          });
          document.getElementById("tabs-dept").appendChild(tab);
        });

        setActive(allTabEl, "#8A97A5");
      }

      function makeTab(label, color, onClick) {
        const el = document.createElement("div");
        el.className = "dept-tab";
        el.dataset.color = color;
        el.innerHTML = `<span class="dept-dot" style="background:${color}"></span>${label}`;
        el.addEventListener("click", onClick);
        return el;
      }

      function setActive(target, color) {
        document.querySelectorAll(".dept-tab").forEach((t) => {
          t.classList.remove("active");
          t.style.background = "";
          t.style.color = "";
        });
        target.classList.add("active");
        target.style.background = color;
        target.style.color = "#fff";
      }

      /* ── 본당 필터 ── */
      function buildParishFilter() {
        const sel = document.getElementById("f-parish");
        [...new Set(ALL.map((c) => c["본당"]).filter(Boolean))].forEach((v) => {
          const o = document.createElement("option");
          o.value = v;
          o.textContent = v;
          sel.appendChild(o);
        });
      }

      function onSearch() {
        curPage = 1;
        doFilter();
      }

      function doFilter() {
        const q = document.getElementById("q").value.toLowerCase();
        const pa = document.getElementById("f-parish").value;
        FILTERED = ALL.filter((c) => {
          const mq =
            !q ||
            ["성명", "세례명", "본당"].some((k) =>
              (c[k] || "").toLowerCase().includes(q),
            );
          const mp = !pa || c["본당"] === pa;
          const mk = !activeKey || getKey(c["직책"]) === activeKey;
          return mq && mp && mk;
        });
        renderPage();
      }

      /* ── 페이지 렌더 ── */
      function renderPage() {
        const total = FILTERED.length;
        const totalPage = Math.max(1, Math.ceil(total / PER_PAGE));
        curPage = Math.min(curPage, totalPage);

        document.getElementById("tot").textContent = ALL.length;
        document.getElementById("shown").textContent = total;

        if (!total) {
          document.getElementById("wrap").innerHTML =
            `<div class="empty"><span class="empty-ico">🔍</span>검색 결과가 없습니다.</div>`;
          document.getElementById("pagination").innerHTML = "";
          return;
        }

        const nowMonth = new Date().getMonth() + 1;
        const start = (curPage - 1) * PER_PAGE;
        const pageList = FILTERED.slice(start, start + PER_PAGE);

        const html = pageList
          .map((c) => {
            const st = getStyle(c["직책"]);
            const feast = parseFeast(c["축일"]);
            const isThisMonth = feast && feast.month === nowMonth;
            const tel = c["전화번호"] || "";
            const mail = c["이메일"] || "";
            const addr = c["주소"] || "";
            const zip = c["우편번호"] || "";
            const no = c["차수"] || "";
            const bap = c["세례명"] ? `세례명 ${c["세례명"]}` : "";
            const catBg = hexAlpha(st.color, 0.12);

            const telRow = tel
              ? `<div class="row"><div class="r-ico">📞</div><div class="r-val"><a href="tel:${tel}">${tel}</a></div></div>`
              : "";
            const mailRow = mail
              ? `<div class="row"><div class="r-ico">✉️</div><div class="r-val"><a href="mailto:${mail}">${mail}</a></div></div>`
              : "";
            const addrRow = addr
              ? `<div class="row"><div class="r-ico">📍</div><div class="r-val">${addr}${zip ? `<span class="zip">(${zip})</span>` : ""}</div></div>`
              : "";
            /* 축일 배지 — 이달 축일자만 강조 */
            const feastBdg = feast
              ? `<span class="bdg bdg-feast"${isThisMonth ? ' style="background:#FFF0A0;color:#8B6A00;border:1px solid #F5C842"' : ""}>🕯️ ${feast.month}/${feast.day}</span>`
              : "";

            return `
      <div class="card"${isThisMonth ? ' style="box-shadow:0 0 0 2px #F5C842,var(--shadow)"' : ""}>
        <div class="band" style="background:${isThisMonth ? "#F5C842" : st.color}"></div>
        <div class="body">
          <div class="ct">
            <div class="av" style="background:${st.color}">
              <span class="av-ico">${st.icon}</span>
              <span class="av-lbl">${st.label}</span>
            </div>
            <div>
              <div class="c-name">${c["성명"] || "-"}</div>
              ${bap ? `<div class="c-bap">${bap}</div>` : ""}
            </div>
          </div>
          <div class="badges">
            <span class="bdg" style="background:${catBg};color:${st.color}">${st.label}</span>
            <span class="bdg bdg-role">${c["직책"] || "-"}</span>
            ${feastBdg}
            ${c["본당"] ? `<span class="bdg bdg-parish">🏛 ${c["본당"]}</span>` : ""}
            ${no ? `<span class="bdg bdg-no">제${no}차</span>` : ""}
          </div>
          <div class="rows">${telRow}${mailRow}${addrRow}</div>
        </div>
      </div>`;
          })
          .join("");

        document.getElementById("wrap").innerHTML =
          `<div class="grid">${html}</div>`;
        buildPagination(totalPage);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      /* ── 페이지네이션 ── */
      function buildPagination(totalPage) {
        if (totalPage <= 1) {
          document.getElementById("pagination").innerHTML = "";
          return;
        }
        let h = `<button class="pg-btn" onclick="goPage(${curPage - 1})" ${curPage === 1 ? "disabled" : ""}>◀</button>`;
        pageRange(curPage, totalPage).forEach((p) => {
          h +=
            p === "…"
              ? `<span class="pg-info">…</span>`
              : `<button class="pg-btn${p === curPage ? " active" : ""}" onclick="goPage(${p})">${p}</button>`;
        });
        h += `<button class="pg-btn" onclick="goPage(${curPage + 1})" ${curPage === totalPage ? "disabled" : ""}>▶</button>`;
        h += `<span class="pg-info">${curPage} / ${totalPage} 페이지</span>`;
        document.getElementById("pagination").innerHTML = h;
      }

      function pageRange(cur, total) {
        if (total <= 5) return Array.from({ length: total }, (_, i) => i + 1);
        if (cur <= 3) return [1, 2, 3, 4, "…", total];
        if (cur >= total - 2)
          return [1, "…", total - 3, total - 2, total - 1, total];
        return [1, "…", cur - 1, cur, cur + 1, "…", total];
      }

      function goPage(p) {
        const tp = Math.ceil(FILTERED.length / PER_PAGE);
        if (p < 1 || p > tp) return;
        curPage = p;
        renderPage();
      }

      /* ── 유틸 ── */
      function hexAlpha(hex, a) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${a})`;
      }

      function logout() {
        TOKEN = "";
        ALL = [];
        FILTERED = [];
        activeKey = "";
        allTabEl = null;
        curPage = 1;
        sessionStorage.removeItem("ec_tok");
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("pw").value = "";
        document.getElementById("f-parish").innerHTML =
          '<option value="">전체 본당</option>';
        document.getElementById("tabs-leader").innerHTML = "";
        document.getElementById("tabs-dept").innerHTML = "";
        noticeMonth = new Date().getMonth() + 1;
        document.getElementById("pagination").innerHTML = "";
      }

      async function api(p) {
        const r = await fetch(`${API}?${new URLSearchParams(p)}`);
        return r.json();
      }
      function showErr(m) {
        const e = document.getElementById("err");
        e.textContent = m;
        e.style.display = "block";
      }
      function hideErr() {
        document.getElementById("err").style.display = "none";
      }
      document.getElementById("pw").addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
    </script>
  </body>
</html>
